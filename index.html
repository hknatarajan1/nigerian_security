<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xuyou | Nigeria Operations Risk</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root {
  /* Xuyou palette — navy surfaces */
  --bg-deep: #0D2942;         /* deepest navy background */
  --bg-panel: #0F2D47;        /* panel bg */
  --bg-card: #142F4A;         /* card / row bg (slightly lighter) */
  --bg-card-hover: #1A3855;   /* card hover */
  --bg-input: #0A2036;        /* inputs/search */
  --rule: #2A4560;            /* hairline rules */
  --rule-strong: #345070;     /* stronger borders */
  --text-primary: #FFFFFF;    /* headings, strong text */
  --text-body: #D8E2F0;       /* body */
  --text-muted: #8AA0B8;      /* muted meta */
  --text-faint: #5A7090;      /* very faint */

  --amber: #F4A300;           /* primary brand accent — reserved for brand moments + italic insight lines */
  --amber-dark: #D98F00;      /* amber darker */
  --amber-text: #0D2942;      /* text on amber bg */

  /* Neutral functional tokens — active/hover/on states for UI controls.
     These replace amber in toggles, chips, tabs, section accents, section headers —
     so amber stops being the "everything is important" colour and starts being
     a real brand accent again. */
  --ui-active: #E8EEF6;       /* primary on-state fill for toggles and filled chips */
  --ui-active-text: #0D2942;  /* text on active fill */
  --ui-hover: #2E4866;        /* hover border / accent ring */
  --ui-section: #B8C8DC;      /* left-panel section header accent (replaces amber underline) */

  /* Risk pill red (matches deck slide 4 HIGH/ELEVATED treatment) */
  --risk-red: #A03B1F;
  --risk-red-bg: rgba(160, 59, 31, 0.08);

  /* Cream surfaces — for the right panel (analytical content), matching the
     deck's cream-on-navy rhythm. Body text is deep navy, accents stay amber. */
  --cream-bg: #F2EBDD;        /* warm cream surface (matches deck) */
  --cream-card: #EBE3D2;      /* slightly deeper cream for cards/sections */
  --cream-card-hover: #E2D9C3;
  --cream-rule: #DCD2BC;      /* cream hairline rule */
  --cream-rule-strong: #C9BFA8;
  --cream-text-primary: #0D2942;  /* navy-on-cream for primary text */
  --cream-text-body: #2A3F5A;     /* slightly softer navy for body */
  --cream-text-muted: #6B7B92;    /* muted meta on cream */
  --cream-text-faint: #94A0B5;

  /* Ring colours — kept as semantic coding, but tuned for dark background */
  --ring-1: #FF3B4A;          /* Chinese direct — hot red, high contrast on navy */
  --ring-3: #F4A300;          /* Other foreign — amber (matches brand!) */
  --ring-4: #C08A5A;           /* Host security — warm tan */
  --ring-5: #7FA0C5;          /* Commercial — steel blue */
  --ring-6: #4A6B8A;          /* Civilian background — faded blue */

  --serif: 'Fraunces', 'Times New Roman', serif;
  --sans: 'Inter Tight', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'Menlo', monospace;

  --panel-left-width: 320px;
  --panel-right-width: 440px;
}

html[lang="zh"] {
  --serif: 'Noto Serif SC', 'Fraunces', serif;
  --sans: 'Noto Sans SC', 'Inter Tight', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  font-family: var(--sans);
  background: var(--bg-deep);
  color: var(--text-body);
  font-size: 14px;
  line-height: 1.45;
  height: 100vh;
  overflow: hidden;
}

/* TOP BAR */
.topbar {
  height: 64px;
  background: var(--bg-deep);
  color: var(--text-primary);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 24px;
  border-bottom: 1px solid var(--rule);
  position: relative;
  z-index: 1000;
}

/* Xuyou logo block */
.xy-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.xy-logo-img {
  height: 36px;
  width: auto;
  display: block;
  /* The logo JPEG has a black background; navy topbar lets it blend naturally.
     Use a subtle screen blend so pure-black edges dissolve into the navy. */
  mix-blend-mode: screen;
}

.topbar .divider { width: 1px; height: 28px; background: var(--rule-strong); flex-shrink: 0; }

.topbar .product {
  font-family: var(--sans);
  font-weight: 600;
  font-size: 13px;
  color: var(--text-primary);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  flex-shrink: 0;
}

html[lang="zh"] .topbar .product {
  font-family: var(--serif);
  font-size: 17px;
  letter-spacing: 0.04em;
  text-transform: none;
  font-weight: 500;
}

.topbar .meta {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  text-align: right;
  line-height: 1.3;
  flex-shrink: 0;
}

html[lang="zh"] .topbar .meta {
  font-family: var(--sans);
  letter-spacing: 0.02em;
}

.topbar .meta strong { color: var(--text-primary); font-weight: 500; }

.topbar .dossier-ref {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
  flex-shrink: 0;
  padding-right: 16px;
}
html[lang="zh"] .topbar .dossier-ref {
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: none;
  font-family: var(--serif);
}

.topbar .lang-toggle {
  display: flex;
  border: 1px solid var(--rule-strong);
  overflow: hidden;
  flex-shrink: 0;
}

.topbar .lang-toggle button {
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-family: var(--sans);
  font-size: 11px;
  padding: 6px 12px;
  cursor: pointer;
  letter-spacing: 0.08em;
  font-weight: 500;
  transition: background 0.15s, color 0.15s;
}

.topbar .lang-toggle button.active {
  background: var(--ui-active);
  color: var(--ui-active-text);
  font-weight: 600;
}

.topbar .lang-toggle button:not(.active):hover {
  background: var(--bg-card);
  color: var(--text-primary);
}

/* APP LAYOUT */
.app {
  display: grid;
  grid-template-columns: var(--panel-left-width) 1fr var(--panel-right-width);
  height: calc(100vh - 64px);
  transition: grid-template-columns 0.3s ease;
  position: relative;
  min-height: 0; /* critical for nested scroll */
}

.app.left-collapsed { grid-template-columns: 44px 1fr var(--panel-right-width); }
.app.right-collapsed { grid-template-columns: var(--panel-left-width) 1fr 44px; }
.app.left-collapsed.right-collapsed { grid-template-columns: 44px 1fr 44px; }

/* PANELS — overflow visible lets toggle buttons stick out; min-height:0 lets inner scroll work */
.panel-left {
  background: var(--bg-panel);
  border-right: 1px solid var(--rule);
  position: relative;
  overflow: visible;
  display: flex;
  flex-direction: column;
  min-width: 0;
  min-height: 0;
  height: 100%;
}

/* THIS is the scrolling region fix — min-height:0 on a flex-grow child lets it actually overflow its parent */
.panel-left-content {
  padding: 24px 22px;
  overflow-y: auto;
  overflow-x: hidden;
  flex: 1 1 0;
  min-height: 0;
  min-width: 0;
}

.panel-left-collapsed-strip {
  display: none;
  flex-direction: column;
  align-items: center;
  padding-top: 48px;
  gap: 14px;
}

.app.left-collapsed .panel-left-content { display: none; }
.app.left-collapsed .panel-left-collapsed-strip { display: flex; }

.panel-right {
  background: var(--bg-panel);
  border-left: 1px solid var(--rule);
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: visible;
  position: relative;
  min-width: 0;
  min-height: 0;
}

.panel-right-content {
  flex: 1 1 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

.panel-right-collapsed-strip {
  display: none;
  flex-direction: column;
  align-items: center;
  padding-top: 48px;
  gap: 14px;
}

.app.right-collapsed .panel-right-content { display: none; }
.app.right-collapsed .panel-right-collapsed-strip { display: flex; }

.vertical-label {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  font-family: var(--serif);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-muted);
  white-space: nowrap;
  margin-top: 12px;
}

html[lang="zh"] .vertical-label {
  text-transform: none;
  letter-spacing: 0.12em;
  writing-mode: vertical-rl;
  transform: none;
  font-size: 12px;
}

/* COLLAPSE BUTTONS */
.collapse-btn {
  position: absolute;
  top: 18px;
  width: 24px;
  height: 26px;
  background: var(--bg-panel);
  border: 1px solid var(--rule-strong);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-primary);
  z-index: 1001;
  font-family: var(--mono);
  font-size: 14px;
  line-height: 1;
  transition: all 0.15s;
  padding: 0;
}

.collapse-btn:hover {
  background: var(--ui-active);
  color: var(--ui-active-text);
  border-color: var(--ui-active);
}

.collapse-btn.left-toggle {
  right: -12px;
  border-radius: 0 3px 3px 0;
  box-shadow: 2px 0 6px rgba(0,0,0,0.25);
}

.collapse-btn.right-toggle {
  left: -12px;
  border-radius: 3px 0 0 3px;
  box-shadow: -2px 0 6px rgba(0,0,0,0.25);
}

/* LEFT PANEL CONTENT */
.panel-left h2 {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-primary);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

html[lang="zh"] .panel-left h2 {
  text-transform: none;
  letter-spacing: 0.06em;
  font-size: 14px;
}

.panel-left h2:not(:first-child) { margin-top: 32px; }

.panel-left h2 .h-accent {
  display: inline-block;
  width: 18px;
  height: 2px;
  background: var(--ui-section);
  margin-right: 10px;
  vertical-align: middle;
}

.panel-left .hint {
  font-size: 11.5px;
  color: var(--text-muted);
  margin-bottom: 12px;
  line-height: 1.55;
}

html[lang="zh"] .panel-left .hint { font-size: 12px; line-height: 1.7; }

.ring-control { display: flex; flex-direction: column; }

.ring-row {
  display: flex;
  align-items: center;
  padding: 9px 0;
  cursor: pointer;
  border-bottom: 1px solid var(--rule);
  transition: background 0.12s;
}

.ring-row:hover { background: rgba(255,255,255,0.03); }

.ring-row input {
  margin: 0 10px 0 2px;
  cursor: pointer;
  accent-color: var(--ui-active);
}

.ring-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 10px;
  flex-shrink: 0;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.15);
}

.ring-label {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text-body);
  flex: 1;
}

html[lang="zh"] .ring-label { font-size: 13px; }

.ring-count {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--text-muted);
  margin-left: 8px;
  min-width: 22px;
  text-align: right;
}

/* Chip-style filters */
.chip-grid { display: flex; flex-wrap: wrap; gap: 5px; }

.filter-chip {
  border: 1px solid var(--rule-strong);
  background: transparent;
  font-family: var(--sans);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.06em;
  padding: 6px 10px;
  cursor: pointer;
  color: var(--text-body);
  transition: all 0.15s;
  text-transform: uppercase;
}

html[lang="zh"] .filter-chip {
  text-transform: none;
  letter-spacing: 0.02em;
  font-size: 12px;
}

.filter-chip:hover { border-color: var(--ui-hover); color: var(--text-primary); }

.filter-chip.active {
  background: var(--ui-active);
  color: var(--ui-active-text);
  border-color: var(--ui-active);
  font-weight: 600;
}

.filter-chip-all { width: 100%; text-align: left; margin-bottom: 5px; }

.cat-chip {
  border: 1px solid var(--rule-strong);
  background: transparent;
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.04em;
  padding: 4px 8px;
  cursor: pointer;
  color: var(--text-body);
  transition: all 0.15s;
  white-space: nowrap;
}

html[lang="zh"] .cat-chip { font-size: 11.5px; letter-spacing: 0; }

.cat-chip:hover { border-color: var(--ui-hover); color: var(--text-primary); }

.cat-chip.active {
  background: var(--ui-active);
  color: var(--ui-active-text);
  border-color: var(--ui-active);
  font-weight: 600;
}

.cat-clear {
  font-family: var(--sans);
  font-size: 10px;
  color: var(--text-muted);
  background: transparent;
  border: none;
  padding: 4px 2px;
  cursor: pointer;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.cat-clear:hover { color: var(--ui-active); }

html[lang="zh"] .cat-clear { text-transform: none; font-size: 11px; }

/* Toggle switches */
.toggle-row {
  display: flex;
  align-items: center;
  padding: 8px 0;
  cursor: pointer;
  gap: 12px;
  border-bottom: 1px solid var(--rule);
}

.toggle-row:last-of-type { border-bottom: none; }

.toggle-row input[type="checkbox"] {
  position: absolute;
  opacity: 0;
  pointer-events: none;
  width: 0;
  margin: 0;
  padding: 0;
}

.toggle-switch {
  position: relative;
  width: 32px;
  height: 18px;
  background: var(--bg-input);
  border: 1px solid var(--rule-strong);
  border-radius: 10px;
  flex-shrink: 0;
  transition: background 0.18s, border-color 0.18s;
}

.toggle-knob {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 12px;
  height: 12px;
  background: var(--text-faint);
  border-radius: 50%;
  transition: left 0.18s, background 0.18s;
}

.toggle-row input:checked + .toggle-switch { background: var(--ui-active); border-color: var(--ui-active); }
.toggle-row input:checked + .toggle-switch .toggle-knob { left: 16px; background: var(--bg-deep); }

.toggle-label {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text-body);
  flex: 1;
}

html[lang="zh"] .toggle-label { font-size: 13px; }

/* Choropleth legend inside map overlay */
.choro-legend {
  position: absolute;
  bottom: 22px;
  right: 16px;
  z-index: 500;
  background: rgba(15, 45, 71, 0.97);
  backdrop-filter: blur(10px);
  border: 1px solid var(--rule-strong);
  padding: 14px 16px 12px;
  font-size: 10.5px;
  color: var(--text-body);
  min-width: 220px;
  max-width: 280px;
}

.choro-legend.hidden { display: none; }

.choro-legend-title {
  font-family: var(--mono);
  font-weight: 500;
  font-size: 9.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ui-section);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--rule);
}

html[lang="zh"] .choro-legend-title {
  text-transform: none;
  letter-spacing: 0.04em;
  font-size: 11px;
  font-family: var(--serif);
}

/* Discrete risk pills — matches deck slide 4 HIGH/ELEVATED/LOWER red-rectangle treatment */
.choro-pill-row {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 10px;
  align-items: center;
  margin-bottom: 5px;
  font-size: 10.5px;
  color: var(--text-body);
  line-height: 1.3;
}
html[lang="zh"] .choro-pill-row { font-size: 12px; }

/* State Risk pills colour-matched to the new steel-blue choropleth scale */
.choro-pill {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  text-align: center;
  padding: 3px 6px;
  border: 1px solid #143B6B;
  color: #C8D6E8;
  background: #143B6B;
  font-weight: 600;
  white-space: nowrap;
}
html[lang="zh"] .choro-pill { letter-spacing: 0.04em; font-size: 10.5px; text-transform: none; }

.choro-pill.high     { border-color: #2E5784; background: #2E5784; color: #DDE6F2; }
.choro-pill.elevated { border-color: #4F759C; background: #4F759C; color: #FFFFFF; }
.choro-pill.lower    { border-color: #7595B5; background: #7595B5; color: #FFFFFF; }

.choro-legend-note {
  font-size: 10px;
  color: var(--text-muted);
  font-style: italic;
  margin-top: 10px;
  line-height: 1.5;
  padding-top: 8px;
  border-top: 1px solid var(--rule);
}

html[lang="zh"] .choro-legend-note { font-size: 11px; line-height: 1.7; font-style: normal; }

.choro-legend-note .swatch-grey {
  display: inline-block;
  width: 10px;
  height: 10px;
  background: #3A5070;
  border: 1px solid var(--rule);
  vertical-align: middle;
  margin-right: 5px;
}

/* Choropleth state popup */
.state-popup .sp-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule);
}

.state-popup .sp-name {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 14px;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}

.state-popup .sp-score {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-primary);
  font-weight: 500;
}

.state-popup .sp-band {
  font-size: 9.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
}

html[lang="zh"] .state-popup .sp-band {
  text-transform: none;
  letter-spacing: 0.04em;
  font-size: 10.5px;
}

.state-popup .sp-breakdown {
  font-size: 11px;
  line-height: 1.55;
  color: var(--text-body);
}

.state-popup .sp-breakdown strong { color: var(--text-primary); font-weight: 500; }

.state-popup .sp-breakdown .sp-row {
  display: flex;
  justify-content: space-between;
  padding: 2px 0;
}

.state-popup .sp-sparse {
  background: rgba(138, 160, 184, 0.1);
  border-left: 2px solid var(--text-muted);
  padding: 6px 8px;
  margin-top: 6px;
  font-size: 10.5px;
  color: var(--text-body);
  line-height: 1.5;
}

html[lang="zh"] .state-popup .sp-sparse { font-size: 11.5px; }

input[type="text"], input[type="date"], select {
  width: 100%;
  padding: 9px 10px;
  border: 1px solid var(--rule-strong);
  background: var(--bg-input);
  font-family: var(--sans);
  font-size: 12px;
  color: var(--text-primary);
  margin-bottom: 8px;
}

input[type="text"]::placeholder { color: var(--text-faint); }

input[type="text"]:focus, select:focus, input[type="date"]:focus {
  outline: none;
  border-color: var(--ui-active);
}

input[type="date"] {
  color-scheme: dark; /* makes native date picker icon visible on dark bg */
}

.date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

/* Stats */
.stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border: 1px solid var(--rule);
  background: var(--bg-card);
  margin-bottom: 16px;
}

.stat {
  padding: 12px;
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}

.stat:nth-child(2n) { border-right: none; }
.stat:nth-last-child(-n+2) { border-bottom: none; }

.stat-num {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 500;
  color: var(--text-primary);
  line-height: 1;
  letter-spacing: -0.02em;
}

.stat-num.accent { color: var(--text-primary); }

.stat-lbl {
  font-size: 9.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 5px;
  line-height: 1.3;
}

html[lang="zh"] .stat-lbl {
  text-transform: none;
  letter-spacing: 0.02em;
  font-size: 10.5px;
}

/* MAP */
.map-wrap {
  position: relative;
  background: var(--bg-deep);
  overflow: hidden;
  min-width: 0;
}

#map {
  width: 100%;
  height: 100%;
  background: var(--bg-deep);
}

/* Make Leaflet controls match dark theme */
.leaflet-bar a {
  background: var(--bg-panel) !important;
  color: var(--text-primary) !important;
  border-color: var(--rule-strong) !important;
}

.leaflet-bar a:hover {
  background: var(--ui-active) !important;
  color: var(--ui-active-text) !important;
}

.leaflet-control-attribution {
  background: rgba(13, 41, 66, 0.85) !important;
  color: var(--text-muted) !important;
  font-size: 10px !important;
}

.leaflet-control-attribution a { color: var(--text-body) !important; }

/* Help button in top-right of map */
.map-help-btn {
  position: absolute;
  top: 16px;
  right: 16px;
  z-index: 500;
  width: 30px;
  height: 30px;
  background: rgba(15, 45, 71, 0.94);
  backdrop-filter: blur(10px);
  border: 1px solid var(--rule-strong);
  border-radius: 50%;
  color: var(--ui-active);
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  padding: 0;
}

.map-help-btn:hover {
  background: var(--ui-active);
  color: var(--ui-active-text);
  border-color: var(--ui-active);
}

/* Legend toggle pill — sits bottom-left of the map, mirrors the help button aesthetic */
.legend-toggle-btn {
  position: absolute;
  bottom: 22px;
  left: 16px;
  z-index: 500;
  background: rgba(15, 45, 71, 0.94);
  backdrop-filter: blur(10px);
  border: 1px solid var(--rule-strong);
  color: var(--text-body);
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 8px 12px;
  transition: all 0.15s;
  white-space: nowrap;
}
html[lang="zh"] .legend-toggle-btn {
  font-family: var(--serif);
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: none;
}
.legend-toggle-btn:hover {
  background: var(--ui-active);
  color: var(--ui-active-text);
  border-color: var(--ui-active);
}
.legend-toggle-btn.active {
  background: var(--ui-active);
  color: var(--ui-active-text);
  border-color: var(--ui-active);
}

.legend.hidden,
.choro-legend.hidden { display: none !important; }

/* Close X button on each legend panel */
.legend-close {
  position: absolute;
  top: 6px;
  right: 8px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 16px;
  line-height: 1;
  cursor: pointer;
  padding: 2px 6px;
  font-family: var(--sans);
  transition: color 0.12s;
}
.legend-close:hover { color: var(--ui-active); }

.map-help-popover {
  position: absolute;
  top: 56px;
  right: 16px;
  z-index: 500;
  background: rgba(15, 45, 71, 0.97);
  backdrop-filter: blur(10px);
  border: 1px solid var(--rule-strong);
  padding: 14px 18px;
  max-width: 340px;
  font-size: 11.5px;
  color: var(--text-body);
  line-height: 1.6;
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
  display: none;
}

.map-help-popover.visible { display: block; }

html[lang="zh"] .map-help-popover { font-size: 12.5px; line-height: 1.75; }

.map-help-popover .help-title {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 11.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ui-section);
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule);
}

html[lang="zh"] .map-help-popover .help-title {
  text-transform: none;
  letter-spacing: 0.06em;
  font-size: 13px;
}

.map-help-popover p {
  margin-bottom: 8px;
}

.map-help-popover p:last-child {
  margin-bottom: 0;
}

.map-help-popover .help-closing {
  font-family: var(--serif);
  font-style: italic;
  color: var(--amber);
  border-top: 1px solid var(--rule);
  padding-top: 10px;
  margin-top: 10px;
  font-size: 12.5px;
  line-height: 1.55;
}
html[lang="zh"] .map-help-popover .help-closing {
  font-style: normal;
  font-size: 13px;
  line-height: 1.7;
}

.map-help-popover .help-close {
  position: absolute;
  top: 8px;
  right: 10px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
  padding: 2px 6px;
}

.map-help-popover .help-close:hover { color: var(--text-primary); }

.legend {
  position: absolute;
  bottom: 22px;
  left: 16px;
  z-index: 500;
  background: rgba(15, 45, 71, 0.97);
  backdrop-filter: blur(10px);
  border: 1px solid var(--rule-strong);
  padding: 14px 16px;
  font-size: 11px;
  color: var(--text-body);
}

.legend-title {
  font-family: var(--mono);
  font-weight: 500;
  font-size: 9.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ui-section);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--rule);
}

html[lang="zh"] .legend-title {
  text-transform: none;
  letter-spacing: 0.04em;
  font-size: 11px;
  font-family: var(--serif);
}

.legend-row {
  display: flex;
  align-items: center;
  margin-bottom: 6px;
  font-size: 11px;
  color: var(--text-body);
}

html[lang="zh"] .legend-row { font-size: 12px; }

.legend-row:last-child { margin-bottom: 0; }

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 9px;
  border: 1.5px solid var(--bg-panel);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.2);
}

/* RIGHT PANEL */
.panel-right-header {
  padding: 22px 24px 18px;
  border-bottom: 1px solid var(--rule);
  background: var(--bg-panel);
  flex-shrink: 0;
}

/* Small mono category label above the headline (deck pattern: small-caps mono → headline) */
.panel-right-header .eyebrow {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ui-section);
  margin-bottom: 8px;
  display: block;
}
html[lang="zh"] .panel-right-header .eyebrow {
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: none;
  font-family: var(--serif);
}

.panel-right-header h2 {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 22px;
  color: var(--text-primary);
  letter-spacing: -0.015em;
  line-height: 1.15;
  margin-bottom: 3px;
}

html[lang="zh"] .panel-right-header h2 { font-size: 22px; letter-spacing: 0; }

/* The italicised punchline word — deck signature treatment */
.panel-right-header h2 em {
  font-style: italic;
  color: var(--amber-dark);
  font-weight: 500;
}
html[lang="zh"] .panel-right-header h2 em {
  font-style: normal;
  color: var(--amber-dark);
}

.panel-right-header .subtitle {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  margin-top: 8px;
}

html[lang="zh"] .panel-right-header .subtitle {
  font-size: 12px;
  letter-spacing: 0.02em;
}

.panel-right-header .subtitle span {
  font-family: var(--mono);
  color: var(--text-primary);
  font-weight: 500;
}

.panel-tabs {
  display: flex;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  background: var(--bg-deep);
  flex-shrink: 0;
}

.panel-tab {
  flex: 1;
  padding: 10px 12px;
  font-family: var(--sans);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  border-right: 1px solid var(--rule);
  transition: all 0.15s;
}

html[lang="zh"] .panel-tab {
  text-transform: none;
  letter-spacing: 0.04em;
  font-size: 12px;
}

.panel-tab:last-child { border-right: none; }
.panel-tab:hover { color: var(--text-primary); }
.panel-tab.active {
  background: var(--bg-panel);
  color: var(--text-primary);
  position: relative;
}

.panel-tab.active::after {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  bottom: -1px;
  height: 2px;
  background: var(--ui-active);
}

/* THIS is the scrolling region fix for the right panel */
.panel-body {
  flex: 1 1 0;
  overflow-y: auto;
  overflow-x: hidden;
  min-height: 0;
  background: var(--bg-panel);
}

.incident-card {
  /* Fixed-height card — every row scans at the same rhythm, regardless of
     content length. Title truncates to one line, chip row caps at 3 visible. */
  height: 88px;
  padding: 12px 24px;
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
  background: var(--bg-panel);
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow: hidden;
  box-sizing: border-box;
}

.incident-card:hover { background: var(--bg-card); }
.incident-card.flagship .card-flagship-dot {
  display: inline-block;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--amber);
  margin-right: 6px;
  vertical-align: middle;
  flex-shrink: 0;
}
.incident-card:not(.flagship) .card-flagship-dot { display: none; }

.incident-card .card-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 3px;
  flex-shrink: 0;
}

.incident-card .card-date {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.03em;
  flex-shrink: 0;
}

.incident-card .card-state {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-body);
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
  flex: 1 1 auto;
}

html[lang="zh"] .incident-card .card-state {
  text-transform: none;
  letter-spacing: 0.02em;
  font-size: 11px;
}

.incident-card .card-ring {
  margin-left: auto;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.15);
  flex-shrink: 0;
}

.incident-card .card-title {
  font-family: var(--serif);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text-primary);
  line-height: 1.3;
  letter-spacing: -0.01em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 4px;
}

html[lang="zh"] .incident-card .card-title { font-size: 14px; letter-spacing: 0; }

.incident-card .card-chips {
  display: flex;
  gap: 5px;
  flex-wrap: nowrap;
  overflow: hidden;
  flex-shrink: 0;
}

.incident-card .chip-more {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.05em;
  color: var(--text-faint);
  padding: 2px 4px;
  white-space: nowrap;
  flex-shrink: 0;
}

.chip {
  font-size: 9.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 7px;
  border: 1px solid var(--rule-strong);
  background: transparent;
  color: var(--text-muted);
  font-weight: 500;
}

html[lang="zh"] .chip {
  text-transform: none;
  letter-spacing: 0.02em;
  font-size: 10.5px;
}

.chip.sector { color: var(--text-body); border-color: var(--rule-strong); }
.chip.chinese { background: var(--ring-1); color: #fff; border-color: var(--ring-1); }
.chip.foreign { background: var(--amber); color: var(--amber-text); border-color: var(--amber); font-weight: 600; }
.chip.fatal { background: var(--text-primary); color: var(--bg-deep); border-color: var(--text-primary); }
.chip.captive { background: var(--bg-card); color: var(--text-body); border-color: var(--rule-strong); }

/* DETAIL */
.detail {
  padding: 24px 26px 40px;
  display: none;
  background: var(--bg-panel);
}
.detail.active { display: block; }

.detail-back {
  font-family: var(--sans);
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  margin-bottom: 16px;
  font-weight: 500;
}

html[lang="zh"] .detail-back {
  text-transform: none;
  letter-spacing: 0.04em;
  font-size: 12px;
}

.detail-back:hover { color: var(--ui-active); }

.detail-ring-strip {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}

html[lang="zh"] .detail-ring-strip {
  text-transform: none;
  letter-spacing: 0.04em;
  font-size: 12px;
}

.detail-ring-strip .dot { width: 11px; height: 11px; border-radius: 50%; box-shadow: 0 0 0 1px rgba(255,255,255,0.15); }

.detail-category-tag {
  display: inline-block;
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ui-active-text);
  background: var(--ui-active);
  padding: 4px 10px;
  margin-bottom: 10px;
}

html[lang="zh"] .detail-category-tag {
  text-transform: none;
  letter-spacing: 0.04em;
  font-size: 11.5px;
}

.detail h1 {
  font-family: var(--serif);
  font-size: 21px;
  font-weight: 500;
  color: var(--text-primary);
  line-height: 1.25;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}

html[lang="zh"] .detail h1 { font-size: 22px; letter-spacing: 0; }

.detail-meta-line {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.04em;
  color: var(--text-muted);
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--rule);
}

.detail-meta-line strong { color: var(--text-primary); font-weight: 500; }

.detail-facts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border: 1px solid var(--rule);
  background: var(--bg-card);
  margin-bottom: 18px;
}

.fact {
  padding: 11px 13px;
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}

.fact:nth-child(2n) { border-right: none; }
.fact:nth-last-child(-n+2) { border-bottom: none; }

.fact-val {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 500;
  color: var(--text-primary);
  line-height: 1;
}

.fact-val.accent { color: var(--text-primary); }
.fact-val.small { font-size: 13px; }

.fact-lbl {
  font-size: 9.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 5px;
}

html[lang="zh"] .fact-lbl {
  text-transform: none;
  letter-spacing: 0.02em;
  font-size: 10.5px;
}

.detail-section { margin-bottom: 20px; }

.detail-section h3 {
  font-family: var(--serif);
  font-size: 11.5px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ui-section);
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule);
}

html[lang="zh"] .detail-section h3 {
  text-transform: none;
  letter-spacing: 0.06em;
  font-size: 13px;
}

.detail-section p {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-body);
  margin-bottom: 8px;
}

html[lang="zh"] .detail-section p { font-size: 13.5px; line-height: 1.8; }

.detail-section .kv {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 4px 14px;
  font-size: 12px;
  line-height: 1.5;
}

html[lang="zh"] .detail-section .kv {
  grid-template-columns: 90px 1fr;
  font-size: 13px;
}

.detail-section .kv dt {
  font-size: 9.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding-top: 3px;
}

html[lang="zh"] .detail-section .kv dt {
  text-transform: none;
  letter-spacing: 0.02em;
  font-size: 11px;
}

.detail-section .kv dd { color: var(--text-body); }

.cross-sector-box {
  background: var(--bg-card);
  border-left: 3px solid var(--ui-section);
  padding: 12px 14px;
  font-size: 12px;
  line-height: 1.55;
  color: var(--text-body);
}

html[lang="zh"] .cross-sector-box { font-size: 13px; line-height: 1.75; }

.cross-sector-box .label {
  font-family: var(--sans);
  font-size: 9.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ui-section);
  font-weight: 600;
  margin-bottom: 6px;
}

html[lang="zh"] .cross-sector-box .label {
  text-transform: none;
  letter-spacing: 0.04em;
  font-size: 11.5px;
}

.sources {
  font-size: 10.5px;
  color: var(--text-muted);
  line-height: 1.55;
}

html[lang="zh"] .sources { font-size: 11.5px; line-height: 1.75; }

.sources strong { color: var(--text-body); font-weight: 500; }
.sources .src-bullet {
  color: var(--text-muted);
  font-size: 8px;
  vertical-align: middle;
  margin-right: 4px;
}

/* Chinese projects & infrastructure section in the detail view */
.detail-projects {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.detail-project-card {
  padding: 12px 14px;
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-left: 3px solid var(--ui-section);
}
.dpc-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.dpc-marker {
  width: 10px;
  height: 10px;
  flex-shrink: 0;
  transform: rotate(45deg);
  display: inline-block;
}
.dpc-marker.cat-port            { background: #4FB3A9; }
.dpc-marker.cat-rail            { background: #4A90D9; }
.dpc-marker.cat-power           { background: #F4A300; }
.dpc-marker.cat-industrial_zone { background: #A569BD; }
.dpc-marker.cat-mining_cluster  { background: #D76A1F; }
.dpc-marker.cat-oil_infra       { background: #5A7090; }
.dpc-marker.cat-commercial_site,
.dpc-marker.cat-other           { background: #8899AA; }

.dpc-name {
  font-family: var(--serif);
  font-size: 13px;
  color: var(--text-primary);
  font-weight: 500;
  flex: 1;
  line-height: 1.3;
}
html[lang="zh"] .dpc-name { font-size: 14px; }

.dpc-cat {
  font-family: var(--mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  padding: 2px 6px;
  border: 1px solid var(--rule-strong);
}
html[lang="zh"] .dpc-cat { text-transform: none; letter-spacing: 0.02em; font-size: 11px; }

.dpc-meta {
  font-size: 10.5px;
  color: var(--text-body);
  line-height: 1.5;
  margin-bottom: 4px;
}
html[lang="zh"] .dpc-meta { font-size: 12px; line-height: 1.7; }

.dpc-meta strong { color: var(--text-muted); font-weight: 400; }

.dpc-notes {
  font-size: 11px;
  color: var(--text-body);
  line-height: 1.55;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--rule);
}
html[lang="zh"] .dpc-notes { font-size: 12.5px; line-height: 1.75; }

.view { display: none; padding: 0; }
.view.active { display: block; }

.lang-note {
  display: none;
  background: rgba(184, 200, 220, 0.08);
  border-left: 3px solid var(--ui-section);
  padding: 10px 14px;
  font-size: 11px;
  color: var(--text-body);
  margin: 12px 24px;
  line-height: 1.55;
}

html[lang="zh"] .lang-note.show-in-zh { display: block; }

/* Captivity */
.captivity-bar-row {
  display: grid;
  grid-template-columns: 1fr 40px;
  gap: 10px;
  align-items: center;
  padding: 7px 24px;
  font-size: 11px;
  border-bottom: 1px solid var(--rule);
}

.captivity-bar-wrap {
  position: relative;
  height: 14px;
  background: var(--bg-card);
  border: 1px solid var(--rule);
}

.captivity-bar {
  position: absolute; top: 0; left: 0; bottom: 0;
}

.captivity-days {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-primary);
  font-weight: 500;
  text-align: right;
}

/* Pattern */
.pattern-group {
  padding: 14px 24px;
  border-bottom: 1px solid var(--rule);
}

.pattern-group h4 {
  font-family: var(--serif);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 4px;
}

html[lang="zh"] .pattern-group h4 { font-size: 14px; }

.pattern-group .count-line {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}

html[lang="zh"] .pattern-group .count-line {
  font-family: var(--sans);
  font-size: 11.5px;
}

.pattern-group .bar-track {
  height: 4px;
  background: var(--bg-card);
  margin-top: 8px;
  position: relative;
}

.pattern-group .bar-fill { height: 100%; background: #4F759C; }

/* Leaflet popup — dark theme */
.leaflet-popup-content-wrapper {
  border-radius: 2px;
  background: var(--bg-panel);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  border: 1px solid var(--rule-strong);
}

.leaflet-popup-content {
  margin: 10px 14px;
  font-family: var(--sans);
  font-size: 12px;
  line-height: 1.4;
  color: var(--text-body);
}

.leaflet-popup-close-button {
  color: var(--text-muted) !important;
}

.leaflet-popup-content .pop-date {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.03em;
  margin-bottom: 3px;
}

.leaflet-popup-content .pop-category {
  font-family: var(--sans);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ui-section);
  font-weight: 600;
  margin-bottom: 3px;
}

html[lang="zh"] .leaflet-popup-content .pop-category {
  text-transform: none;
  letter-spacing: 0.04em;
  font-size: 10.5px;
}

.leaflet-popup-content .pop-title {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 13px;
  color: var(--text-primary);
  line-height: 1.3;
  margin-bottom: 4px;
}

.leaflet-popup-content .pop-loc {
  font-size: 11px;
  color: var(--text-muted);
}

.leaflet-popup-content .pop-action {
  margin-top: 6px;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ui-section);
  font-weight: 600;
  cursor: pointer;
}

html[lang="zh"] .leaflet-popup-content .pop-action {
  text-transform: none;
  letter-spacing: 0.04em;
  font-size: 11px;
}

.leaflet-popup-tip { background: var(--bg-panel) !important; border: 1px solid var(--rule-strong); }

/* Scrollbars */
.panel-left-content::-webkit-scrollbar,
.panel-body::-webkit-scrollbar { width: 8px; }
.panel-left-content::-webkit-scrollbar-track,
.panel-body::-webkit-scrollbar-track { background: var(--bg-deep); }
.panel-left-content::-webkit-scrollbar-thumb,
.panel-body::-webkit-scrollbar-thumb { background: var(--rule-strong); border-radius: 4px; }
.panel-left-content::-webkit-scrollbar-thumb:hover,
.panel-body::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

.map-loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-deep);
  color: var(--text-muted);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  z-index: 400;
}

.map-loading.hidden { display: none; }

/* State tooltip / popup for choropleth */
.state-tooltip {
  position: absolute;
  background: rgba(15, 45, 71, 0.97);
  backdrop-filter: blur(10px);
  border: 1px solid var(--rule-strong);
  padding: 12px 14px;
  font-size: 11px;
  color: var(--text-body);
  line-height: 1.5;
  pointer-events: none;
  z-index: 600;
  min-width: 220px;
  max-width: 300px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  display: none;
}

.state-tooltip.visible { display: block; }

.state-tooltip .st-insight {
  font-family: var(--serif);
  font-style: italic;
  color: var(--amber);
  border-top: 1px solid var(--rule);
  padding-top: 8px;
  margin-top: 10px;
  font-size: 11.5px;
  line-height: 1.5;
}
html[lang="zh"] .state-tooltip .st-insight {
  font-style: normal;
  font-size: 12px;
  line-height: 1.7;
}

.state-tooltip .st-name {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 14px;
  color: var(--text-primary);
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}

.state-tooltip .st-score {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-primary);
  font-weight: 500;
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--rule);
}

.state-tooltip .st-score.sparse {
  color: var(--text-faint);
}

.state-tooltip .st-breakdown {
  font-size: 10.5px;
  color: var(--text-muted);
  line-height: 1.6;
}

.state-tooltip .st-breakdown strong {
  color: var(--text-body);
  font-weight: 500;
}

.state-tooltip .st-note {
  font-size: 10px;
  color: var(--text-faint);
  font-style: italic;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--rule);
}

.state-tooltip .st-composite {
  margin: 8px 0;
  padding: 8px 0;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}
.state-tooltip .st-comp-row {
  display: flex;
  justify-content: space-between;
  font-size: 10.5px;
  line-height: 1.55;
  color: var(--text-body);
}
.state-tooltip .st-comp-row.footprint { color: var(--text-primary); }
.state-tooltip .st-comp-lbl { color: var(--text-muted); }
.state-tooltip .st-comp-val { font-family: var(--mono); font-weight: 500; }

.state-tooltip .st-section-rule {
  height: 1px;
  background: var(--rule);
  margin: 9px 0 7px;
}

.state-tooltip .st-no-direct { color: var(--text-faint); font-style: italic; }

.state-tooltip .st-footprint-flag {
  display: inline-block;
  background: var(--amber);
  color: var(--amber-text);
  font-family: var(--mono);
  font-size: 9px;
  padding: 1px 5px;
  margin-left: 6px;
  letter-spacing: 0.06em;
  font-weight: 600;
  vertical-align: middle;
}
html[lang="zh"] .state-tooltip .st-footprint-flag { letter-spacing: 0; font-size: 10px; }

/* Choropleth legend — for the 5-band scale */
.choropleth-legend {
  position: absolute;
  bottom: 22px;
  right: 16px;
  z-index: 500;
  background: rgba(15, 45, 71, 0.97);
  backdrop-filter: blur(10px);
  border: 1px solid var(--rule-strong);
  padding: 12px 14px;
  font-size: 10.5px;
  color: var(--text-body);
  min-width: 160px;
}

.choropleth-legend.hidden { display: none; }

.choropleth-legend .cl-title {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ui-section);
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule);
}

html[lang="zh"] .choropleth-legend .cl-title {
  text-transform: none;
  letter-spacing: 0.06em;
  font-size: 12px;
}

.choropleth-legend .cl-scale {
  display: flex;
  height: 10px;
  border: 1px solid var(--rule);
  margin-bottom: 6px;
}

.choropleth-legend .cl-band { flex: 1; }

.choropleth-legend .cl-labels {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.choropleth-legend .cl-sparse {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  color: var(--text-muted);
  padding-top: 6px;
  border-top: 1px solid var(--rule);
}

.choropleth-legend .cl-sparse-sq {
  width: 14px;
  height: 10px;
  background: #3A4A5C;
  border: 1px solid var(--rule);
  flex-shrink: 0;
}

/* Leaflet state-layer styles */
.leaflet-interactive.state-layer-path {
  transition: fill-opacity 0.15s, stroke-width 0.15s;
}

/* Projects / Infrastructure markers */
.proj-marker {
  display: block;
  width: 16px;
  height: 16px;
  transform: rotate(45deg);
  border: 1.5px solid #FFFFFF;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.35), 0 2px 6px rgba(0,0,0,0.4);
}
.proj-marker.cat-port {         background: #00B3C3; }   /* teal */
.proj-marker.cat-rail {         background: #0F8FD1; }   /* china blue */
.proj-marker.cat-power {        background: #F4A300; }   /* amber */
.proj-marker.cat-industrial_zone { background: #7A5CCF; } /* purple */
.proj-marker.cat-mining_cluster {
  background: #C46A1E;                                    /* burnt orange */
  border-style: dashed;
  border-color: #FFE5B4;
}
.proj-marker.cat-oil_infra {    background: #4E6B8C; }   /* steel blue */
.proj-marker.cat-commercial_site { background: #8A8A8A; } /* neutral grey */

/* Non-Chinese projects get a subtler ring */
.proj-marker.non-chinese {
  opacity: 0.75;
  border-style: dotted;
}

.proj-popup .pp-cat {
  font-family: var(--mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 4px;
}
html[lang="zh"] .proj-popup .pp-cat { text-transform: none; letter-spacing: 0.05em; font-size: 11px; }

.proj-popup .pp-name {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 6px;
  line-height: 1.25;
}

.proj-popup .pp-meta {
  font-size: 11px;
  color: var(--text-body);
  margin-bottom: 4px;
  line-height: 1.45;
}

.proj-popup .pp-meta strong { color: var(--text-body); font-weight: 500; }
.proj-popup .pp-meta .lbl { color: var(--text-muted); font-weight: 500; font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
html[lang="zh"] .proj-popup .pp-meta .lbl { text-transform: none; letter-spacing: 0; font-size: 11px; }

.proj-popup .pp-notes {
  font-size: 11px;
  color: var(--text-body);
  line-height: 1.55;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--rule);
}
html[lang="zh"] .proj-popup .pp-notes { font-size: 12px; line-height: 1.7; }

.proj-popup .pp-chinese-flag {
  display: inline-block;
  background: var(--amber);
  color: var(--amber-text);
  font-family: var(--mono);
  font-size: 9px;
  padding: 1px 5px;
  margin-left: 6px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 600;
  vertical-align: middle;
}
html[lang="zh"] .proj-popup .pp-chinese-flag { text-transform: none; letter-spacing: 0; font-size: 10px; }
</style>
</head>

rrative":"On 19 November 2024 a 20-person NSCDC convoy escorted mining surveyors (including 2 Chinese nationals) to a site on the Niger-Kaduna border. Returning, the convoy was ambushed by Boko Haram fighters from elevated hill positions. 4 soldiers killed, 6 police and 1 Chinese national wounded. First confirmed Chinese-national casualty in a Boko Haram attack in Nigeria. Incident was reported in Chinese sources on 24 December 2024 — 35-day delay before public reporting.","source_1":"国复咨询 Goalfore Nigeria Risk Monthly (2025-01-12)","source_2":"Chinese-language Nigerian security reports","source_3":null,"source_confidence":2,"language_of_primary_source":"Chinese","cross_sector_notes":"HIGH STRATEGIC SIGNIFICANCE — marks evolution of threat: Boko Haram now willing/able to target Chinese nationals directly. Niger-Kaduna mining corridor previously treated as banditry zone is now ALSO subject to jihadi threat. Widens the threat matrix for mining sector. Under-reported in English sources.","captivity_duration_days":null,"resolution_pathway":"Not applicable (injured not abducted)","salience_ring":1,"category_t2_zh":"博科圣地袭击矿业勘查车队","target_profile_zh":"NSCDC护卫的矿业勘查车队，含2名中国公民","narrative_zh":"2024年11月19日，一支20人的NSCDC车队护送矿业勘查人员（含2名中国公民）前往尼日尔-卡杜纳交界矿区。返程途中，车队在高地山岗遭博科圣地武装分子伏击。4名士兵殉职、6名警员及1名中国公民受伤。为中国公民在尼日利亚博科圣地袭击中首次确认的伤亡案例。此事件2024年12月24日在中国媒体首次公开报道——延迟35天。"},{"incident_id":"NG-AN-2024-001","record_tier":"Flagship","date":"2024-12-07","state":"Anambra","lga":"Unspecified (Anambra State)","location_detail":"Anambra State","lat":6.21,"lng":7.07,"geo_confidence":1,"category_t1":"Regulatory/Legal Action","category_t2":"Illegal mining arrest — Chinese national","sector_relevance":"Mining","target_profile":"1 Chinese national + 5 Nigerians","chinese_nationals_affected":"Yes — 1 arrested","foreign_nationals_affected":"Yes — 1 Chinese","fatalities":0,"injuries":0,"kidnapped":0,"ransom_reported_ngn":null,"outcome":"Arrest and detention pending prosecution under Nigerian Mineral and Mining d_ngn":null,"outcome":"Remanded at Kuje Correctional Centre pending trial","actor_attribution":"Mining Marshals (NSCDC) / Federal High Court, Abuja","actor_confidence":3,"narrative":"Eight Chinese nationals (Shen Yongchan, Mo Baixian, Xiao Bin, Huang Xu Fa, Ma Bingli, Yang Jian, Li Peiyin, Que Wenyong), one Nigerian (Hiyk Edward Desmond) and Wanda Company Limited were arraigned before Justice J.K. Omotosho of the Federal High Court Abuja on three counts including mining without lawful authority and obstruction of lawful mining operations. Remanded at Kuje pending continuation of trial. [Note: 10th defendant is corporate entity Wanda Company Limited; arresting unit was NSCDC Mining Marshals, Operation Hayakin Kogo; site: Lokpaukwu community, Umuchieze.] Arrested by Mining Marshals in Lokpaukwu community, Umuchieze, Umunneochi LGA, Abia State.","source_1":"allAfrica (2024-07-12)","source_2":"Federal High Court Abuja records (court proceedings)","source_3":null,"source_confidence":3,"language_of_primary_source":"English","cross_sector_notes":"REGULATORY RISK — largest single-incident arraignment of Chinese nationals for mining offences. Corporate defendant (Wanda Company Limited) indicates the regulatory exposure extends to the operating company itself, not just individuals.","captivity_duration_days":null,"resolution_pathway":"Arrest + remanded at Kuje","salience_ring":1,"category_t2_zh":"非法采矿提审——8名中国公民","target_profile_zh":"8名中国公民、1名尼日利亚人及企业被告（万达公司）","narrative_zh":"8名中国公民（沈永禅、莫百先、肖斌、黄旭发、马炳丽、杨健、李培寅、阙文勇）、1名尼日利亚人（Hiyk Edward Desmond）及万达公司一同出庭阿布贾联邦高等法院J.K. Omotosho法官席，面临三项指控，包括无合法授权采矿及妨碍合法采矿作业。在库杰监狱候审。[注：第10名被告为企业法人——万达公司；逮捕部门为NSCDC矿业巡守队，执行Hayakin Kogo行动；作业点：阿比亚州乌蒙内奥奇地方政府辖区乌穆切泽社区Lokpaukwu。]由矿业巡守队在阿比亚州乌蒙内奥奇地方政府辖区乌穆切泽Lokpaukwu社区逮捕。"},{"incident_id":"NG-KD-2026-001","record_tier":"Flagship","date":"2025-10-27","state":"Kaduna","lga":"Unknown (Gada Mallam Maman community)","location_detail":"Gada Mallam Maman community, Kaduna State","lat":10.2,"lng":7.6,"geo_confidence":2,"category_t1":"Kidnap for Ransom","category_t2":"Community raid — long-hold abduction","sector_relevance":"None direct","target_profile":"Civilian community members","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":null,"injuries":null,"kidnapped":11,"ransom_reported_ngn":null,"outcome":"All 11 rescued 26 January 2026 after 92 days captivity","actor_attribution":"Bandit group (unnamed)","actor_confidence":2,"narrative":"Eleven victims (5 men, 3 women, 3 children) abducted from Gada Mallam Maman community in Kaduna State in October 2025 and held for 92 days. Rescued overnight on 26 January 2026 by troops from Forward Operating Base Doka using long-range surveillance equipment; troops intercepted captors moving hostages along bush path. Case illustrates bandit long-hold capacity along Kaduna-Abuja highway corridor — hostages moved through forest reserves for months.","source_1":"Africanews (2026-01-28)","source_2":"Nigerian Army statement (2026-01-27)","source_3":null,"source_confidence":3,"language_of_primary_source":"English","cross_sector_notes":"LOGISTICS CORRIDOR — demonstrates threat persistence even after target extraction. Bandits' 92-day hold capacity is relevant for duty-of-care/insurance assessments for Chinese expats traveling the corridor.","captivity_duration_days":92,"resolution_pathway":"Rescued (after 92 days)","salience_ring":6,"category_t2_zh":"社区袭击——长期扣押绑架","target_profile_zh":"社区平民","narrative_zh":"11名受害者（5男、3女、3名儿童）于2025年10月被从卡杜纳州加达·马拉姆·马曼社区绑架并扣押92天。2026年1月26日深夜，Doka前沿作战基地部队使用远距离侦察设备在匪徒沿丛林小道转移人质时实施拦截救援。此案例反映匪徒在卡杜纳-阿布贾高速公路走廊的长期关押能力——人质数月间被穿越森林保护区转移。"},{"incident_id":"NG-KD-2026-002","record_tier":"Standard","date":"2026-01-06","state":"Kaduna","lga":"Kachia (approx — Nasarawan Doka)","location_detail":"Nasarawan Doka, Abuja-Kaduna highway","lat":9.88,"lng":7.51,"geo_confidence":3,"category_t1":"Armed Robbery","category_t2":"Highway attack — attempt foiled","sector_relevance":"Logistics","target_profile":"Commuters on Abuja-Kaduna highway","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":0,"injuries":null,"kidnapped":0,"ransom_reported_ngn":null,"outcome":"Attack repelled; 1 suspect arrested; commuters unharmed","actor_attribution":"Armed robbers (unidentified group)","actor_confidence":2,"narrative":"Troops of 1 Division Nigerian Army / Sector 1 Operation FANSAN YAMMA intercepted armed robbers at Nasarawan Doka on the Abuja-Kaduna highway on 6 January 2026. Distress call led to rapid patrol response; criminals forced to retreat; one suspect arrested.","source_1":"Legit.ng (2026-01-07)","source_2":"Nigerian Army 1 Division statement","source_3":null,"source_confidence":2,"language_of_primary_source":"English","cross_sector_notes":"LOGISTICS CORRIDOR — confirms continued threat activity on Abuja-Kaduna axis despite heavy military presence in both termini cities. Nasarawan Doka is between the two cities and is a recurring attack location.","captivity_duration_days":null,"resolution_pathway":"Not applicable (foiled)","salience_ring":5,"category_t2_zh":"高速公路袭击——未遂","target_profile_zh":"阿布贾-卡杜纳高速公路通勤者"},{"incident_id":"NG-ZM-2024-001","record_tier":"Flagship","date":"2024-07-14","state":"Zamfara","lga":"Kaura Namoda","location_detail":"Dan Isa village, c.14 km from Gusau","lat":12.5,"lng":6.6,"geo_confidence":3,"category_t1":"Kidnap for Ransom","category_t2":"Mass abduction — village raid","sector_relevance":"None direct","target_profile":"Rural community — including infants","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":4,"injuries":null,"kidnapped":150,"ransom_reported_ngn":null,"outcome":"Mass abduction; no immediate rescue; villagers fled to Kasuwar Daji, Rawayya, Gyambarawa and Gusau","actor_attribution":"Bandits on c.150 motorcycles (3 per bike)","actor_confidence":2,"narrative":"Bandits arrived Dan Isa at approximately 15:00 Sunday on approximately 150 motorcycles (three per bike). Six-hour attack killed 4, abducted approximately 150 including infants. Came approximately one week after release of 46 hostages from Dogon Kade village following payment of ₦21 million ransom. Zamfara State Police Commissioner Muhammad Shehu Dalijan initially claimed force had no report of attack but confirmed parallel incident at Gusau (5 killed, 11 abducted previous week).","source_1":"Aminiya (2024-07-16) — Hausa-language","source_2":null,"source_3":null,"source_confidence":2,"language_of_primary_source":"Hausa","cross_sector_notes":"Dan Isa village is on approach corridor to Gusau — Zamfara state capital. Attack on populated area 14 km from capital shows banditry is no longer confined to rural hinterland.","captivity_duration_days":null,"resolution_pathway":"Unknown","salience_ring":6,"category_t2_zh":"大规模绑架——村庄袭击","target_profile_zh":"乡村社区——包括婴幼儿","narrative_zh":"匪徒于周日下午约15时抵达丹伊萨，约150辆摩托车（每车三人）。6小时袭击致4人遇害、约150人遭绑，含婴幼儿。此次袭击发生于支付2,100万奈拉赎金、46名多贡卡德村人质获释约一周后。桑法拉州警察局长穆罕默德·谢胡·达利詹起初声称警方未收到袭击报告，但确认前一周在古绍发生平行事件（5人遇害、11人被绑）。"},{"incident_id":"NG-ZM-2025-001","record_tier":"Flagship","date":"2025-08-07","state":"Zamfara","lga":"Kaura Namoda","location_detail":"Dan Isa district (35 villages)","lat":12.5,"lng":6.6,"geo_confidence":2,"category_t1":"Banditry","category_t2":"Protection-racket extortion (farming levy)","sector_relevance":"Multi-sector","target_profile":"Subsistence farmers in 35 villages","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":0,"injuries":0,"kidnapped":0,"ransom_reported_ngn":56000000,"outcome":"Ongoing extortion structure; villages paying to farm and harvest","actor_attribution":"Bandit warlord Dan Sadiya (+ subordinate commanders)","actor_confidence":3,"narrative":"In Dan Isa district, 35 villages were compelled to pay ₦800,000 each for permission to farm in 2025 wet season, extracted by bandit commander Dan Sadiya. A further ₦800,000 per village would be payable for harvest permission. Total extraction approximately ₦56 million from this district alone. Ward Head Hassan Yarima confirmed the structure to Daily Trust/Aminiya. Pattern replicated across multiple Zamfara LGAs.","source_1":"Aminiya (2025-08-07) — Hausa-language","source_2":"Daily Trust (2025-08-07)","source_3":null,"source_confidence":3,"language_of_primary_source":"Hausa","cross_sector_notes":"STRUCTURAL RISK SIGNAL — bandit groups operate as de facto parallel government extracting tax from rural populations. Any Chinese operator in Zamfara is operating in this governance environment: local labour forces, local suppliers and local security arrangements are entangled with bandit economic networks. This is not captured in event-based incident data alone but is critical context for client briefing.","captivity_duration_days":null,"resolution_pathway":"Not applicable (ongoing extortion)","salience_ring":5,"category_t2_zh":"保护费勒索（农业摊派）","target_profile_zh":"35个村庄的自给型农户","narrative_zh":"丹伊萨区35个村庄被迫每村缴纳80万奈拉，以换取2025年雨季耕作许可，由匪首Dan Sadiya征收。若要获取收割许可，每村须再缴80万奈拉。仅此一区总勒索金额便达约5,600万奈拉。村长Hassan Yarima向《Daily Trust》／《Aminiya》证实此结构。该模式在桑法拉州多个地方政府辖区均有复现。"},{"incident_id":"NG-ZM-2025-002","record_tier":"Flagship","date":"2025-09-15","state":"Zamfara","lga":"Tsafe","location_detail":"Gidan Turbe mosque","lat":11.95,"lng":6.92,"geo_confidence":3,"category_t1":"Kidnap for Ransom","category_t2":"Mass abduction — religious site, dawn prayer","sector_relevance":"None direct","target_profile":"Worshippers at dawn prayer","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":null,"injuries":null,"kidnapped":40,"ransom_reported_ngn":null,"outcome":"Worshippers taken to Gohori forest in Tsafe","actor_attribution":"Bandits","actor_confidence":2,"narrative":"Bandits surrounded Gidan Turbe mosque at approximately 05:30 during dawn (fajr) prayer on Monday 15 September 2025 and abducted 40 worshippers, taking them to Gohori forest in Tsafe LGA. Reporting framed the attack as a collapse of the Katsina-Zamfara peace accord brokered in Wurma forest with bandit commanders Alhaji Usman Kachalla Ruga, Muhindinge, Yahaya Sani (Hayyu) and Shu'aibu. Less than a month after agreement, mass abduction occurred.","source_1":"Aminiya (2025-09-15) — Hausa-language","source_2":null,"source_3":null,"source_confidence":2,"language_of_primary_source":"Hausa","cross_sector_notes":"PEACE-ACCORD FRAGILITY — informal state-level negotiated settlements with bandit commanders have short half-lives. Any operational risk assessment relying on a ceasefire or regional stabilisation should account for <30-day accord collapse window seen here.","captivity_duration_days":null,"resolution_pathway":"Unknown","salience_ring":6,"category_t2_zh":"大规模绑架——宗教场所，黎明祷告","target_profile_zh":"黎明祷告礼拜者","narrative_zh":"匪徒于2025年9月15日周一清晨约5时30分晨礼（fajr）祷告时包围吉丹图尔贝清真寺，绑架40名礼拜者，带至察费地方政府辖区戈霍里森林。报道将此次袭击定性为Wurma森林与匪首Alhaji Usman Kachalla Ruga、Muhindinge、Yahaya Sani（Hayyu）及Shu'aibu斡旋的卡齐纳-桑法拉州和平协定破裂。协议达成不足一月，便发生大规模绑架。"},{"incident_id":"NG-ZM-2024-002","record_tier":"Flagship","date":"2024-12-08","state":"Zamfara","lga":"Maradun","location_detail":"Kakin Dawa village, Gidan Goga ward","lat":12.22,"lng":6.22,"geo_confidence":3,"category_t1":"Kidnap for Ransom","category_t2":"Mass abduction — women and children","sector_relevance":"None direct","target_profile":"Women and girls","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":null,"injuries":null,"kidnapped":50,"ransom_reported_ngn":null,"outcome":"No immediate rescue","actor_attribution":"Bandits","actor_confidence":2,"narrative":"Bandits arrived at Kakin Dawa village at approximately 01:30 Sunday night 8 December 2024, going house to house and abducting over 50 women and girls including married women. Residents reported Kakin Dawa as a recurring target for the group.","source_1":"Aminiya (2024-12-09) — Hausa-language","source_2":null,"source_3":null,"source_confidence":2,"language_of_primary_source":"Hausa","cross_sector_notes":null,"captivity_duration_days":null,"resolution_pathway" nationals_affected":"No","foreign_nationals_affected":"No","fatalities":null,"injuries":null,"kidnapped":"unspecified (many)","ransom_reported_ngn":150000000,"outcome":"Hostages in bandit hands; ₦150m ransom demanded","actor_attribution":"Suspected Malam Ikku group (local bandit commander)","actor_confidence":2,"narrative":"Bandits entered Zangon Kankara town under cover of darkness on night of Saturday 11 April 2026 and abducted multiple residents. Kidnappers subsequently contacted families by phone demanding ₦150 million ransom. Local bandit commander known as Malam Ikku is suspected of involvement; hostages believed held in his camp.","source_1":"Aminiya (2026) — Hausa-language","source_2":null,"source_3":null,"source_confidence":2,"language_of_primary_source":"Hausa","cross_sector_notes":"KATSINA — Kankara LGA was site of December 2020 Kankara schoolboys abduction. Continued activity demonstrates that despite years of intervention, the LGA remains a bandit stronghold. Ransom amount (₦150m) is significant — indicates sophisticated pricing by bandit economies.","captivity_duration_days":null,"resolution_pathway":"Still captive / ransom demanded N150m","salience_ring":6,"category_t2_zh":"大规模绑架——市镇袭击","target_profile_zh":"市镇居民（人数未指明）","narrative_zh":"匪徒于2026年4月11日周六夜色掩护下进入赞贡卡纳拉镇，绑架多名居民。绑匪随后通过电话与家属联系，索要1.5亿奈拉赎金。当地匪首Malam Ikku涉嫌牵涉其中；人质据信关押于其营地。"},{"incident_id":"NG-KD-2025-001","record_tier":"Flagship","date":"2025-10-16","state":"Kaduna","lga":"Birnin Gwari","location_detail":"Kuyello Ward mining site + Layin Danauta village","lat":11.05,"lng":6.78,"geo_confidence":3,"category_t1":"Banditry","category_t2":"Bandit vs miner reprisal / village raid","sector_relevance":"Mining","target_profile":"Artisanal miners + village residents","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":17,"injuries":13,"kidnapped":"several (unspecified)","ransom_reported_ngn":null,"outcome":"Mining site abandoned; police wife among casualties; peace accord under strain","actor_attribution":"Zamfara-based bandit group (retaliating after their envoy killed)","actor_confidence":3,"narrative":"On 16 October 2025 at approximately 11:00 a Zamfara-based bandit arrived at Kuyello Ward ASM gold mining site to demand a levy. Miners mobilised, killed him and buried him in a shallow grave. His group returned and raided the site, killing 7 miners. Later the same day bandits raided nearby Layin Danauta village, killing 9 (including three minors and the wife of a police officer), injuring 13, kidnapping several. Total toll 17 killed. Families publicly rejected government/police framing of the victims as 'illegal miners' — calling it cover for protecting the 'non-kinetic peace model' negotiated in November 2024 with bandit groups in Birnin Gwari, Giwa and Igabi LGAs.","source_1":"TheCable (2025-10-18)","source_2":"Channels TV (2025-10-17)","source_3":"Sahara Reporters (2025-10-18)","source_confidence":3,"language_of_primary_source":"English","cross_sector_notes":"FLAGSHIP FOR MINING NEXUS — single best case study of how ASM mining sites are NOT neutral economic zones but active nodes in the bandit economy. Any Chinese operator in Kaduna mining needs to understand: (1) paying or refusing to pay levies is both dangerous, (2) state peace deals do not extend to mining site conflicts, (3) narrative framing by authorities systematically under-counts civilian toll at mining-associated sites.","captivity_duration_days":null,"resolution_pathway":"Unknown (mixed mining/village)","salience_ring":5,"category_t2_zh":"匪徒与矿工报复性冲突／村庄袭击","target_profile_zh":"手工矿工及村民","narrative_zh":"2025年10月16日约11时，一名桑法拉州匪徒抵达Kuyello Ward的手工及小规模金矿矿区索取摊派。矿工集结将其击毙并草草掩埋。其团伙随后返回袭击矿区，击毙7名矿工。同日稍晚匪徒袭击附近Layin Danauta村，致9人遇害（含3名未成年人及1名警员的妻子）、13人受伤、数人被绑。总计17人遇害。遇难者家属公开驳斥政府／警方将受害者定性为\"非法矿工\"的说法——称此为掩护2024年11月与比尔宁格瓦里、吉瓦及伊加比地方政府辖区各匪团达成的\"非动能和平模式\"。"},{"incident_id":"NG-KB-2025-001","record_tier":"Flagship","date":"2025-11-17","state":"Kebbi","lga":"Danko-Wasagu","location_detail":"Government Girls Comprehensive Secondary School, Maga","lat":11.28,"lng":5.05,"geo_confidence":3,"category_t1":"Kidnap for Ransom","category_t2":"Mass abduction — school / institutional target","sector_relevance":"None direct","target_profile":"Secondary school girls + school staff","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":1,"injuries":null,"kidnapped":25,"ransom_reported_ngn":null,"outcome":"Vice Principal killed; 1 girl escaped independently; 24 rescued approximately one week later","actor_attribution":"Unknown bandit group (intelligence later 'closing in')","actor_confidence":2,"narrative":"Bandits attacked GGCSS Maga on 17 November 2025, abducting 25 students and killing the Vice Principal. One student escaped home independently. Governor demanded probe after soldiers reportedly left their post one hour before the attack — significant chain-of-custody question. 24 students rescued approximately a week later following coordinated ops across Kebbi, Zamfara and Niger states. Follow-on attacks in the same LGA within days (Gandun Wasagu farmers 22 November, Kurmaci scores abducted 26 November) indicate bandit control of the area was not diminished by the rescue.","source_1":"National Accord (2025-11-23)","source_2":"21st Century Chronicle (2025-11-28)","source_3":"Daily Post Nigeria (2025-11-22)","source_confidence":3,"language_of_primary_source":"English","cross_sector_notes":"KEBBI CONTEXT — Danko-Wasagu LGA hosts the Zuru Emirate and borders Zamfara and Niger states via the Kamuku Forest Reserve. This is a major bandit trans-state corridor. Any Chinese mining operation in southern Kebbi (particularly near ASM gold/tantalite sites) must treat the LGA as hostile-controlled territory.","captivity_duration_days":7,"resolution_pathway":"Rescued (after ~7 days, 24 of 25 recovered)","salience_ring":6,"category_t2_zh":"大规模绑架——学校／机构目标","target_profile_zh":"中学女生及校内教职员","narrative_zh":"2025年11月17日，匪徒袭击马加公立中学，绑架25名学生并杀害副校长。1名学生自行逃回家中。据报士兵在袭击发生前一小时撤离岗位——重大监管责任追溯问题，州长要求调查。约一周后，在凯比、桑法拉及尼日尔三州协同行动下，24名学生获救。然而同一地方政府辖区数日内连续发生后续袭击（11月22日Gandun Wasagu农民袭击、11月26日Kurmaci大规模绑架），表明该地区并未因救援行动摆脱匪徒掌控。"},{"incident_id":"NG-SO-2025-001","record_tier":"Flagship","date":"2025-02-20","state":"Sokoto","lga":"Sabon Birni","location_detail":"Four villages (incl. Garin Idi — Deputy Governor's hometown)","lat":13.65,"lng":6.3,"geo_confidence":2,"category_t1":"Banditry","category_t2":"Protection-racket / collective-punishment levy","sector_relevance":"Multi-sector","target_profile":"Rural communities","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":1,"injuries":null,"kidnapped":12,"ransom_reported_ngn":28000000,"outcome":"Levy negotiated down from N25m to N22m; 7 of 12 worshippers released, 5 remain; 1 bandit killed by villagers","actor_attribution":"Bello Turji Kachalla group","actor_confidence":3,"narrative":"Bandits under Bello Turji imposed a ₦25 million collective levy on four Sabon Birni villages — including Garin Idi, hometown of Sokoto Deputy Governor Idris Mohammed Gobir — as retaliation for villagers killing one of his fighters and recovering weapons during a military-backed confrontation. Separately, 12 worshippers from four villages were held to ransom at ₦250,000 each. House of Assembly members Ibrahim Saidu Naino (Sabon Birni East) and Aminu Boza (Sabon Birni West) confirmed. Levy later negotiated down to ₦22m. Five worshippers remained in captivity at time of reporting. Six Sokoto Community Guards killed in same operational window.","source_1":"Vanguard (2025-02-23)","source_2":"Sokoto State House of Assembly (statements from Naino, Boza)","source_3":null,"source_confidence":3,"language_of_primary_source":"English","cross_sector_notes":"STRUCTURAL — demonstrates bandit parallel-governance: fines, taxes, and collective punishment as standard tools. Garin Idi being the Deputy Governor's hometown shows state actors cannot protect even their own. Bandit group discipline (levy negotiation, structured ransom pricing) indicates organisational sophistication beyond a criminal gang.","captivity_duration_days":null,"resolution_pathway":"Released partially after levy negotiation + ransom (7 of 12 released, 5 captive)","salience_ring":5,"category_t2_zh":"保护费勒索／连坐惩罚性摊派","target_profile_zh":"乡村社区","narrative_zh":"Bello Turji手下匪徒对Sabon Birni四个村庄——包括索科托州副州长Idris Mohammed Gobir家乡Garin Idi——摊派2,500万奈拉集体罚金，作为村民在军方支援对抗行动中击毙其部下并缴获武器的报复。另有4个村庄12名礼拜者被以每人25万奈拉赎金扣押。州议会议员Ibrahim Saidu Naino（Sabon Birni东选区）及Aminu Boza（Sabon Birni西选区）证实情况。摊派后经谈判降至2,200万奈拉。报道时5名礼拜者仍在囚禁中。同一作战窗口期内6名索科托社区自卫队员殉职。"},{"incident_id":"NG-KT-2025-001","record_tier":"Flagship","date":"2025-01-03","state":"Katsina","lga":"Faskari","location_detail":"Funtua-Gusau highway (crossing Faskari LGA)","lat":11.62,"lng":7.05,"geo_confidence":3,"category_t1":"Kidnap for Ransom","category_t2":"Highway ambush — attempt foiled","sector_relevance":"Logistics","target_profile":"18 commercial passengers (4 vehicles)","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":0,"injuries":null,"kidnapped":0,"ransom_reported_ngn":null,"outcome":"All 18 passengers rescued unharmed after gun battle; vehicles (Avensis, 3 DAF trucks) returned to owners","actor_attribution":"Armed bandits (AK-47)","actor_confidence":2,"narrative":"On 3 January 2025 at approximately 21:30 bandits ambushed 4 vehicles on the Funtua-Gusau highway — 1 Toyota Avensis (en route Batsari to Yankara), 3 DAF trucks (en route Gusau to Funtua). Faskari DPO mobilised patrol which engaged the attackers; all 18 passengers rescued unharmed. Separate incident same night 23:00: bandits rustled cattle from Gidan Gada village in Kafur LGA.","source_1":"Daily Post Nigeria (2025-01-05)","source_2":"Katsina State Police Command statement (DSP Abubakar Sadiq)","source_3":null,"source_confidence":3,"language_of_primary_source":"English","cross_sector_notes":"LOGISTICS — Funtua-Gusau highway is a key axis linking Katsina farming zone to Zamfara state capital. Nighttime transit on the route is consistently targeted. Daytime-only movement recommended. Note that cross-LGA bandit operations (same night, different LGA) suggest coordinated group activity rather than isolated criminals.","captivity_duration_days":null,"resolution_pathway":"Rescued same day (no captivity)","salience_ring":5,"category_t2_zh":"高速公路伏击——袭击未遂","target_profile_zh":"4辆车载18名商业乘客","narrative_zh":"2025年1月3日约21时30分，匪徒在丰图阿-古绍高速公路伏击4辆车——1辆丰田雅凌（Batsari驶往Yankara）、3辆DAF卡车（古绍驶往丰图阿）。Faskari分局警长调动巡逻队交火；18名乘客全部安全获救。同夜23时另发生独立事件：匪徒于卡富地方政府辖区Gidan Gada村盗取牲畜。"},{"incident_id":"NG-KT-2025-002","record_tier":"Flagship","date":"2025-08-15","state":"Katsina","lga":"18 LGAs (state-wide pattern)","location_detail":"Katsina State — 18 LGAs in peace agreements with bandit groups","lat":12.99,"lng":7.6,"geo_confidence":1,"category_t1":"Banditry","category_t2":"Structural — informal peace deals with bandits","sector_relevance":"Multi-sector","target_profile":"Rural LGAs state-wide","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":null,"injuries":null,"kidnapped":null,"ransom_reported_ngn":null,"outcome":"Ongoing pattern of ad hoc accords with short half-lives","actor_attribution":"Multiple bandit commanders incl. Isya Akwashi Garwa (Faskari)","actor_confidence":3,"narrative":"By August 2025, 18 Katsina LGAs — Kankara, Kafur, Malumfashi, Funtua, Batagarawa, Charanchi, Sabuwa, Dandume, Faskari, Matazu, Musawa, Safana, Kurfi, Dutsinma, Jibia, Batsari, Danmusa and Bakori — had entered peace agreements with bandit groups. Agreements are brokered by community leaders rather than state government directly. State government publicly maintains it will not negotiate but permits local-level pacts. Deals are fragile: by November-December 2025, reports of renewed attacks on Faskari, Kankara, Safana and Matazu; attacks explained as (1) migration of bandits from Zamfara/Kaduna military pressure, (2) rainy-season bush cover, (3) economic hardship. As of early 2026, killings and kidnappings had 'returned' per Daily Trust coverage.","source_1":"Daily Trust (2026-01-07) 'Katsina: Killings, Kidnappings Return'","source_2":"Daily Trust (2025-07-31) 'Bandits on renewed rampage in Katsina'","source_3":"PRNigeria (2025-09-23) Madobi analysis","source_confidence":3,"language_of_primary_source":"English","cross_sector_notes":"STRUCTURAL FOR CLIENT BRIEFING — any Katsina operation should not rely on active peace deals as a durable security input. The pattern shows accords collapse within 3-6 months typically; they may reduce incidents during harvest but don't change underlying threat posture.","captivity_duration_days":null,"resolution_pathway":"Not applicable (structural)","salience_ring":5,"category_t2_zh":"结构性——与匪徒达成非正式和谈","target_profile_zh":"全州乡村地方政府辖区","narrative_zh":"截至2025年8月，卡齐纳州18个地方政府辖区——Kankara、Kafur、Malumfashi、Funtua、Batagarawa、Charanchi、Sabuwa、Dandume、Faskari、Matazu、Musawa、Safana、Kurfi、Dutsinma、Jibia、Batsari、Danmusa及Bakori——已与各匪团签订和平协议。协议由社区领袖直接促成，非州政府出面。州政府公开宣称不谈判，但允许地方层面达成协议。协议脆弱：截至2025年11至12月，Faskari、Kankara、Safana及Matazu出现袭击复发报告；归因包括：（1）匪徒因桑法拉／卡杜纳军事压力迁移；（2）雨季丛林掩护；（3）经济困难。截至2026年初，据《Daily Trust》报道，杀戮与绑架已\"卷土重来\"。"},{"incident_id":"NG-KD-2026-003","record_tier":"Flagship","date":"2025-10-15","state":"Kaduna","lga":"Lere","location_detail":"Akurmi, Gidan-Waya, Jan-Tsauni, Mai-Yamma, Majagada, Gurza, Garun-Kurama, Biman-Kurama communities","lat":10.38,"lng":8.57,"geo_confidence":2,"category_t1":"Kidnap for Ransom","category_t2":"Sustained multi-community campaign","sector_relevance":"None direct","target_profile":"Rural communities","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":12,"injuries":null,"kidnapped":59,"ransom_reported_ngn":null,"outcome":"59 in captivity at February 2026; families selling harvested grain to pay ransoms","actor_attribution":"Bandit groups (unattributed)","actor_confidence":2,"narrative":"Akurmi Development Association (Lere LGA, Kaduna) reported in February 2026 that 59 community members remained in captivity from attacks dating to October 2025. At least 12 killed across Akurmi communities in the campaign. A separate round of attacks in November 2025 across Gidan-Waya, Jan-Tsauni and Mai-Yamma killed 4 and abducted 13. Families selling grain harvested for year's food to pay ransoms. Similar warning from Birnin Gwari Emirate Progressives Union about fragile peace reversing and farmland destruction.","source_1":"Punch (2026-02-03)","source_2":"Akurmi Development Association press conference","source_3":null,"source_confidence":2,"language_of_primary_source":"English","cross_sector_notes":"STRUCTURAL — demonstrates bandit long-hold capacity translating into community economic collapse (grain sold for ransom). For client briefing, this shows how insecurity creates cascading supply-chain and labour availability problems even where the client's own personnel are not targeted.","captivity_duration_days":null,"resolution_pathway":"Still captive / ongoing (59 held since Oct 2025)","salience_ring":6,"category_t2_zh":"持续性多社区袭击战役","target_profile_zh":"乡村社区","narrative_zh":"卡杜纳州Lere地方政府辖区Akurmi发展协会于2026年2月报告，自2025年10月起遭袭击的社区仍有59人被扣押。此次袭击战役中共击毙12名Akurmi社区成员。2025年11月另一轮袭击波及Gidan-Waya、Jan-Tsauni及Mai-Yamma，致4人遇害、13人被绑。家属变卖全年口粮用的粮食以支付赎金。比尔宁格瓦里酋长国Progressives Union亦发出类似警告，指和平脆弱、农田遭毁。"},{"incident_id":"NG-SO-2026-001","record_tier":"Flagship","date":"2026-01-15","state":"Sokoto","lga":"Sabon Birni","location_detail":"Kyara village — remote community near Niger Republic border","lat":13.85,"lng":6.38,"geo_confidence":3,"category_t1":"Banditry","category_t2":"Cross-border raid — no network coverage area","sector_relevance":"None direct","target_profile":"Rural community","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":7,"injuries":2,"kidnapped":3,"ransom_reported_ngn":null,"outcome":"7 killed, 2 injured, 3 kidnapped, livestock rustled; security response delayed by remoteness and no-coverage area","actor_attribution":"Bandits (large force, sophisticated weapons)","actor_confidence":2,"narrative":"At approximately 04:00 Thursday 15 January 2026 a large bandit force attacked Kyara village in Sabon Birni LGA — close to Niger Republic border, no mobile phone network coverage. 7 killed, 2 wounded by gunfire, 3 kidnapped, livestock rustled. Security forces deployed after incident reported post-attack.","source_1":"Zagazola Makama (2026-01-16)","source_2":null,"source_3":null,"source_confidence":2,"language_of_primary_source":"English","cross_sector_notes":"OPERATIONAL — zero-coverage areas are blind spots for any duty-of-care communications protocol. Any logistics routing through Sokoto's eastern border zone must assume comms blackout and pre-plan check-in/escalation windows.","captivity_duration_days":null,"resolution_pathway":"Unknown","salience_ring":6,"category_t2_zh":"跨境袭击——无通讯信号地带","target_profile_zh":"乡村社区","narrative_zh":"2026年1月15日周四约04时，大批匪徒袭击Sabon Birni地方政府辖区Kyara村——靠近尼日尔共和国边境、无手机信号覆盖。7人遇害、2人枪伤、3人被绑、牲畜被盗。安全部队在袭击报告后才赶赴现场。"},{"incident_id":"NG-KB-2025-002","record_tier":"Flagship","date":"2025-07-09","state":"Kebbi","lga":"Danko-Wasagu","location_detail":"Ribah town","lat":11.3,"lng":5.35,"geo_confidence":3,"category_t1":"Banditry","category_t2":"Large-scale attack — repelled","sector_relevance":"None direct","target_profile":"Town-wide (population)","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":null,"injuries":null,"kidnapped":0,"ransom_reported_ngn":null,"outcome":"Attack repelled; multiple bandit bodies recovered; weapons seized","actor_attribution":"400+ heavily armed bandits","actor_confidence":3,"narrative":"223 Light Battalion of Nigerian Army at Zuru repelled attempted overrun of Ribah town by over 400 heavily armed bandits on 9 July 2025. Protracted firefight; many attackers killed; some bodies retrieved by comrades, others left behind; weapons cache recovered. Director of Security (Kebbi Cabinet Office) Ab
