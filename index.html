on_days":null,"resolution_pathway":"Mixed (pattern-level)","salience_ring":6,"category_t2_zh":"跨地方政府辖区协同作战（周度频率）","target_profile_zh":"跨5个地方政府辖区的15个村庄","narrative_zh":"据桑法拉州Circle Community Initiative情况报告，2025年8月4至10日，Bakura、察费、Mafara、Gummi及布库尤姆5个地方政府辖区15个村庄遭袭击，单周内发生144起绑架、24起杀戮及16起伤害。此状况凸显全州协同作战特征——袭击地理分散，并非单一匪团的扫荡行动。"},{"incident_id":"NG-PL-2025-001","record_tier":"Flagship","date":"2025-02-28","state":"Plateau","lga":"State-wide","location_detail":"All LGAs","lat":9.9,"lng":8.9,"geo_confidence":1,"category_t1":"Regulatory/Legal Action","category_t2":"Structural — full state mining suspension","sector_relevance":"Mining","target_profile":"All mining operators (legal and illegal)","chinese_nationals_affected":"Yes — affected sector-wide","foreign_nationals_affected":"Yes — all foreign miners","fatalities":0,"injuries":0,"kidnapped":0,"ransom_reported_ngn":null,"outcome":"Full suspension February 2025; 159 companies cleared to resume by May 2025; ban on uncleared operators maintained","actor_attribution":"Plateau State Government — Governor Caleb Mutfwang","actor_confidence":3,"narrative":"Governor Caleb Mutfwang signed Executive Order 001 in February 2025 suspending all mining activities (legal and illegal) state-wide with immediate effect. Governor cited illegal tin mining's role in fuelling banditry, kidnapping, drug trafficking, illegal firearms, and influx of unregulated foreign miners. Technical Committee on Artisanal Mining established to review sector and gather site data. By May 2025, 159 mining companies were cleared to resume; all others remained banned. Ban enforced against uncleared operators including via EFCC arrests (see NG-PL-2025-002).","source_1":"ENACT Africa (2025-12)","source_2":"Plateau State Government gazette","source_3":"Kolaking Substack / Prima News (2026-03)","source_confidence":3,"language_of_primary_source":"English","cross_sector_notes":"REGULATORY STRUCTURAL RECORD — any Chinese mining client with Plateau exposure must be compliance-cleared. State has demonstrated willingness and capacity to shut the entire sector, not just selectively prosecute. Sector-wide suspensions are a risk factor in themselves: even compliant operators face revenue loss during review periods.","captivity_duration_days":null,"resolution_pathway":"Not applicable (structural)","salience_ring":1,"category_t2_zh":"结构性——全州采矿暂停","target_profile_zh":"所有采矿经营者（合法及非法）","narrative_zh":"高原州州长Caleb Mutfwang于2025年2月签署第001号行政令，即时暂停全州全部采矿活动（合法及非法）。州长援引非法锡矿开采助长匪患、绑架、毒品走私、非法枪支及未受管制外籍矿工涌入等问题。设立手工采矿技术委员会以审查行业并收集矿区数据。截至2025年5月，已批准159家采矿公司复工；其余仍被禁。禁令通过经济与金融犯罪委员会逮捕等方式对未获批经营者实施（见NG-PL-2025-002）。"},{"incident_id":"NG-PL-2025-002","record_tier":"Flagship","date":"2025-03-11","state":"Plateau","lga":"Jos area (exact LGA unspecified in reporting)","location_detail":"Jiasheng Nigeria Limited premises","lat":9.9,"lng":8.9,"geo_confidence":1,"category_t1":"Regulatory/Legal Action","category_t2":"EFCC arrest — Chinese nationals + Nigerians","sector_relevance":"Mining","target_profile":"4 Chinese + 27 Nigerian suspects","chinese_nationals_affected":"Yes — 4 arrested","foreign_nationals_affected":"Yes — 4 Chinese","fatalities":0,"injuries":0,"kidnapped":0,"ransom_reported_ngn":null,"outcome":"Arrests + seizure of processed monazite (truck load); company had no mining licence","actor_attribution":"EFCC","actor_confidence":3,"narrative":"Following Mutfwang's February 2025 mining suspension, EFCC arrested 4 Chinese nationals and 27 Nigerians at Jiasheng Nigeria Limited — a company operating without a mining licence. Truck load of processed monazite (tin ore by-product) seized on site. ENACT Africa report flagged 'scant information on further government action' post-arrest, raising state-capture concerns. The case represents both a regulatory enforcement action and a compliance-risk flag: the company was operating without licence despite the Chinese nationals being on site.","source_1":"Daily Post Nigeria (2025-03-11)","source_2":"ENACT Africa (2025-12)","source_3":null,"source_confidence":3,"language_of_primary_source":"English","cross_sector_notes":"REGULATORY RISK — corporate defendant (Jiasheng Nigeria Limited) plus individual Chinese nationals. Demonstrates: (1) state-level mining bans are enforced against Chinese nationals; (2) operating through a locally-registered vehicle does not shield foreign nationals from personal arrest; (3) monazite — a by-product of tin mining with rare-earth content — is specifically monitored. Clients with tin or rare-earth interests in Plateau need direct compliance verification.","captivity_duration_days":null,"resolution_pathway":"Arrests (4 Chinese + 27 Nigerians)","salience_ring":1,"category_t2_zh":"经济与金融犯罪委员会逮捕——中国公民及尼日利亚人","target_profile_zh":"4名中国公民及27名尼日利亚嫌疑人","narrative_zh":"在Mutfwang州长2025年2月采矿暂停令后，经济与金融犯罪委员会在Jiasheng Nigeria Limited公司——一家无采矿许可证经营的公司——逮捕4名中国公民及27名尼日利亚人。现场查获一卡车加工过的独居石（锡矿副产品）。ENACT Africa报告指逮捕后\"政府后续行动信息稀少\"，引发国家俘获忧虑。此案既是监管执法行动，也是合规风险警示：中国公民在场的情况下，该公司仍无许可证经营。"},{"incident_id":"NG-PL-2025-003","record_tier":"Flagship","date":"2025-12-16","state":"Plateau","lga":"Barkin Ladi","location_detail":"Ratoso community, Fan District mining site","lat":9.53,"lng":8.9,"geo_confidence":3,"category_t1":"Communal/Farmer-Herder Violence","category_t2":"Mass-casualty mining site attack (herder-attributed)","sector_relevance":"Mining","target_profile":"Artisanal miners (night shift)","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":12,"injuries":5,"kidnapped":3,"ransom_reported_ngn":null,"outcome":"Attackers fled with some mined minerals and 3 captives taken on motorcycles","actor_attribution":"Suspected armed herdsmen","actor_confidence":2,"narrative":"At approximately 21:00-21:30 on Tuesday 16 December 2025, gunmen in large numbers attacked miners at an ASM site in Ratoso community, Fan District, Barkin Ladi LGA. Attackers had hidden in the community before the attack. Miners working night shift were caught unawares. 12 killed on site; 5 injured attempting to flee; 3 abducted and taken on motorcycles; some minerals looted. Channels TV reported site as 'legal mining' but note this was challenged elsewhere. Attributed to armed herdsmen — illustrating that mining-site violence in Plateau draws multiple perpetrator types (bandits, herders, local criminal networks).","source_1":"Tribune Online (2025-12-17)","source_2":"TheCable (2025-12-17)","source_3":"Channels TV (2025-12-17)","source_confidence":3,"language_of_primary_source":"English","cross_sector_notes":"MINING SECTOR FLAGSHIP — large mass casualty. Fan District is part of Plateau tin belt. Incident occurred 10 months after state mining suspension, during the cleared-company re-authorisation window — shows that formal licencing does not translate to physical security on the ground.","captivity_duration_days":null,"resolution_pathway":"Still captive (3 abducted at reporting)","salience_ring":5,"category_t2_zh":"矿区大规模伤亡袭击（疑为牧民所为）","target_profile_zh":"手工矿工（夜班）","narrative_zh":"2025年12月16日周二约21时至21时30分，大批持枪分子袭击巴金拉迪地方政府辖区Fan区Ratoso社区一处手工及小规模采矿矿区。袭击者袭击前已隐匿于社区内。夜班矿工被打个措手不及。12人当场遇害；5人逃跑时受伤；3人被摩托车掳走；部分矿产被劫。Channels TV将矿区报道为\"合法开采\"，但此说法在其他处遭质疑。袭击归咎于武装牧民——说明高原州矿区暴力涉及多类作案者（匪徒、牧民、本地犯罪网络）。"},{"incident_id":"NG-PL-2026-001","record_tier":"Flagship","date":"2026-01-22","state":"Plateau","lga":"Jos South","location_detail":"Capitex area, Kuru community","lat":9.72,"lng":8.87,"geo_confidence":3,"category_t1":"Banditry","category_t2":"Mass-casualty illegal mining site attack","sector_relevance":"Mining","target_profile":"Young artisanal miners","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":7,"injuries":null,"kidnapped":0,"ransom_reported_ngn":null,"outcome":"7 miners killed; attackers not identified or arrested","actor_attribution":"Unknown armed group","actor_confidence":1,"narrative":"At approximately 01:00 on 22 January 2026 suspected bandits attacked an illegal mining site in the Capitex area of Kuru community, Jos South LGA. 7 young miners killed. No attackers identified or apprehended. Incident occurred at unlicensed site despite state ban — reflecting continuing defiance by local youth.","source_1":"Kolaking Substack / Prima News (2026-03)","source_2":null,"source_3":null,"source_confidence":2,"language_of_primary_source":"English","cross_sector_notes":"Incident on unlicensed site reinforces the point that even if a Chinese client operates legally, the ASM sector's continued informal presence creates security externalities (bandits attracted to sites, retaliation cycles) that affect legal operators.","captivity_duration_days":null,"resolution_pathway":"Not applicable (fatalities, no abduction)","salience_ring":5,"category_t2_zh":"非法采矿矿区大规模伤亡袭击","target_profile_zh":"年轻手工矿工","narrative_zh":"2026年1月22日约01时，疑为匪徒袭击乔斯南地方政府辖区Kuru社区Capitex地区一处非法采矿矿区。7名年轻矿工遇害。无袭击者被辨识或逮捕。事件发生于未获许可矿区，即便在州级禁令下——反映本地青年持续无视禁令。"},{"incident_id":"NG-PL-2024-001","record_tier":"Standard","date":"2024-05-15","state":"Plateau","lga":"Wase","location_detail":"Mining community (specific village unspecified)","lat":9.1,"lng":9.95,"geo_confidence":1,"category_t1":"Communal/Farmer-Herder Violence","category_t2":"Mining community raid — resource dispute","sector_relevance":"Mining","target_profile":"Mining community residents","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":40,"injuries":null,"kidnapped":null,"ransom_reported_ngn":null,"outcome":"Homes torched; 40+ killed","actor_attribution":"Gunmen (resource-dispute framing)","actor_confidence":1,"narrative":"Gunmen killed over 40 in raid on mining community in Wase LGA. Homes torched. Attack framed as resource dispute in the mineral-rich LGA.","source_1":"ENACT Africa (2025-12)","source_2":null,"source_3":null,"source_confidence":2,"language_of_primary_source":"English","cross_sector_notes":null,"captivity_duration_days":null,"resolution_pathway":"Not applicable","salience_ring":6,"category_t2_zh":"矿业社区袭击——资源纠纷","target_profile_zh":"矿区社区居民"},{"incident_id":"NG-NI-2023-001","record_tier":"Flagship","date":"2023-09-15","state":"Niger","lga":"Shiroro","location_detail":"ASM mining sites within Shiroro LGA","lat":9.95,"lng":6.83,"geo_confidence":2,"category_t1":"Banditry","category_t2":"Structural — protection payments by mining operators to terror faction","sector_relevance":"Mining","target_profile":"Chinese-affiliated mining operators","chinese_nationals_affected":"Yes — as paying parties","foreign_nationals_affected":"Yes — Chinese","fatalities":null,"injuries":null,"kidnapped":null,"ransom_reported_ngn":null,"outcome":"Ongoing — established pattern of access-fee payments to terror-faction leadership","actor_attribution":"Dogo Gide faction (bandit commander in Shiroro-Rafi-Munya corridor)","actor_confidence":3,"narrative":"Investigation by WikkiTimes (Bauchi-based grassroots paper, September 2023) documented that Chinese-affiliated miners paid the Dogo Gide terror faction for access to ASM mining sites in Shiroro LGA. Audio recording cited in the investigation captured negotiations with Dogo Gide's mother before operations began. Named Chinese-affiliated entities in WikkiTimes investigation: Eso Terra Investment Limited and Majelo Global Resources Limited. Ming Xin Mineral Separation Nigeria Limited joined co-plaintiffs in a ₦10 billion defamation suit against WikkiTimes (November 2023) claiming audio was doctored — litigation ongoing, caveat applies. SBM Intelligence head of research Ikemesit Effiong publicly characterised Chinese mining company willingness to 'pay off whoever needs to be paid off'. Senator Adams Oshiomole (Edo North) in January 2025 accused retired Nigerian army officers of conniving with Chinese nationals to supply militants and engage in illegal gold mining. US lawmakers in February 2026 formally linked Chinese illegal mining to terrorism funding in Nigeria.","source_1":"WikkiTimes investigation (September 2023)","source_2":"Premium Times (2026-02-12) citing WikkiTimes","source_3":"Truth Nigeria (2026-02-21)","source_confidence":3,"language_of_primary_source":"English","cross_sector_notes":"CRITICAL STRUCTURAL RECORD — highest-priority item for client briefing. This is the 'reputational risk' layer the client must confront. Regardless of whether an individual Chinese operator engages in such payments: (1) the sector-wide perception is that Chinese miners do pay, (2) this perception is now embedded in US legislative discourse post-December 2025 US airstrikes on Nigeria, (3) it creates both regulatory exposure (Nigerian prosecution) and geopolitical exposure (US sanctions risk). Any client-facing Nigeria product must address this dimension head-on rather than treat Chinese nationals as simple victims of security threat.","captivity_duration_days":null,"resolution_pathway":"Not applicable (structural — protection payments pattern)","salience_ring":1,"category_t2_zh":"结构性——矿业经营者向恐怖派别缴纳保护费","target_profile_zh":"中方关联采矿经营者","narrative_zh":"WikkiTimes（鲍奇州草根报刊，2023年9月）调查记录中方关联矿工向Dogo Gide恐怖派别缴费以进入希罗罗地方政府辖区手工及小规模采矿矿区。调查援引的录音捕捉到作业启动前与Dogo Gide母亲的谈判。WikkiTimes调查点名的中方关联实体：Eso Terra Investment Limited及Majelo Global Resources Limited。Ming Xin Mineral Separation Nigeria Limited加入共同原告方，于2023年11月提起100亿奈拉诽谤诉讼，称录音经过篡改——诉讼仍在进行中，此项须谨慎参考。SBM Intelligence研究主管Ikemesit Effiong公开将中国采矿企业定性为愿\"花钱摆平一切需要摆平的人\"。参议员Adams Oshiomole（埃多州北部选区）2025年1月指控尼日利亚退役陆军军官与中国公民勾结，为武装分子提供补给并参与非法金矿开采。美国国会议员于2026年2月正式将中国在尼日利亚的非法采矿与恐怖主义融资挂钩。"},{"incident_id":"NG-NI-2022-001","record_tier":"Flagship","date":"2022-06-29","state":"Niger","lga":"Shiroro","location_detail":"Ajata-Aboki mine, Gurmana Ward, Shiroro LGA","lat":9.87,"lng":6.78,"geo_confidence":3,"category_t1":"Kidnap for Ransom","category_t2":"Mining site attack — mass casualty — Chinese abducted","sector_relevance":"Mining","target_profile":"Chinese miners + NSCDC security detail + civilians","chinese_nationals_affected":"Yes — 4 originally (Wikipedia); 7 later rescued (includes other Chinese added to hostage pool)","foreign_nationals_affected":"Yes — Chinese","fatalities":20,"injuries":null,"kidnapped":7,"ransom_reported_ngn":null,"outcome":"7 Chinese rescued 7 December 2022 by Nigerian Air Force special forces raid on mining area (approximately 161 days captivity); 2 hostages in stable condition, others under medical evaluation","actor_attribution":"Bandits (Shiroro-based — Dogo Gide area of operations)","actor_confidence":3,"narrative":"Historical anchor case. On 29 June 2022 at 16:00, bandits on motorbikes and in trucks attacked Ajata-Aboki mine, killing 7 policemen immediately plus additional security forces (Nigerian military initial estimate: 20 servicemen + 7 police + 'scores' civilians; Reuters: 30 security forces). 4 Chinese nationals and other mine workers abducted. Chinese government issued November 2021 travel advisory preceding this attack. After c.161 days in captivity, Nigerian Air Force special forces raid on 17 December 2022 rescued 7 Chinese nationals (pool expanded during captivity; captors moved victims to Birnin Gwari LGA, Kaduna for the rescue). Hostages transferred to NAF 271 Detachment medical centre.","source_1":"Al Jazeera (2022-06-30)","source_2":"ThisDay / NAF Gp Capt Edward Gabkwet statement (2022-12-17) — confirms rescue date 17 Dec, Birnin Gwari LGA, Kaduna","source_3":"Wikipedia Shiroro ambush article","source_confidence":3,"language_of_primary_source":"English","cross_sector_notes":"HISTORICAL FLAGSHIP — longest-documented captivity case for Chinese nationals in Nigeria. Establishes (1) Shiroro ASM mining as a persistent Chinese-targeting zone, (2) multi-month captivity is possible, (3) military rescue can be achieved but took over 5 months. Client decision-making should plan for ransom-negotiation + diplomatic + military-rescue pathway all running in parallel, with months-long horizons.","captivity_duration_days":171,"resolution_pathway":"Rescued by NAF special forces (7 Chinese total)","salience_ring":1,"category_t2_zh":"矿区袭击——大规模伤亡——中国公民遭绑架","target_profile_zh":"中国矿工、NSCDC护卫队及平民","narrative_zh":"历史锚点案例。2022年6月29日16时，匪徒乘摩托车及卡车袭击Ajata-Aboki矿，当场击毙7名警员及其他安保人员（尼日利亚军方初估：20名官兵、7名警员及\"大量\"平民；路透社：30名安保人员）。4名中国公民及其他矿工遭绑架。此次袭击发生前，中国政府曾于2021年11月发布旅行警示。在被囚禁约161天后，尼日利亚空军特种部队于2022年12月17日实施突袭救援，救出7名中国公民（囚禁期间被扣押人数扩充；匪徒将受害者转移至卡杜纳州比尔宁格瓦里地方政府辖区进行救援）。人质被转送至空军271分遣队医疗中心。"},{"incident_id":"NG-NI-2024-002","record_tier":"Flagship","date":"2024-11-05","state":"Niger","lga":"Rafi (Sabon-Gari District — Wayam and Belu-Belu villages)","location_detail":"Zungeru town + farming communities across multiple LGAs","lat":9.8,"lng":6.15,"geo_confidence":2,"category_t1":"Banditry","category_t2":"Mass-casualty beheading — Chinese among dead","sector_relevance":"Multi-sector","target_profile":"Farmers including 1 Chinese national","chinese_nationals_affected":"Disputed/unverified — claim not corroborated by any primary or international source","foreign_nationals_affected":"Yes — 1 Chinese","fatalities":10,"injuries":null,"kidnapped":"several","ransom_reported_ngn":null,"outcome":"10 farmers beheaded (1 Chinese national); further abductions from Zungeru town including residents taken from homes and a hotel","actor_attribution":"Bandits","actor_confidence":1,"narrative":"Bandits killed 10 farmers during harvest season in Rafi LGA (Wayam and Belu-Belu villages, Sabon-Gari District) on 5 November 2024 — 6 of the 10 were beheaded, attackers carrying the heads away. Daily Trust (2 Nov 2024, separate event) reported 2 Indian nationals kidnapped from a rice farm in Borgu LGA on 2 November. ⚠ DISPUTED: The 'Chinese national beheaded' claim (in Sahara Reporters / Daily Post headlines) is not corroborated by any international source, Chinese MOFA/embassy statement, Xinhua, Premium Times, HumAngle, Punch or TheCable. The Sahara Reporters/Daily Post claim appears to misread or confuse sources. A Sino-Hydro Nigerian staff member (Saidu Yakubu/'Abacha') was separately kidnapped in Wushishi LGA in the same period. Claim downgraded to disputed/unverified — Chinese national involvement should not be stated as confirmed.","source_1":"Nigerian Eye (2024-11)","source_2":"Niger State Homeland Security statements","source_3":null,"source_confidence":1,"language_of_primary_source":"English","cross_sector_notes":"CHINESE CASUALTY CASE — first documented Chinese fatality in a bandit attack in Niger State farming context (as opposed to mining). Target profile suggests the Chinese national was likely involved in agricultural operations or adjacent activity. Expands the Chinese-client threat profile beyond mining to include all rural operations.","captivity_duration_days":null,"resolution_pathway":"Killed (1 Chinese beheaded)","salience_ring":1,"category_t2_zh":"大规模伤亡斩首——中国公民在遇难者之列","target_profile_zh":"农业从业人员，其中1名为中国公民","narrative_zh":"2024年11月5日，匪徒在Rafi地方政府辖区（Wayam及Belu-Belu村，Sabon-Gari区）丰收季杀害10名农业从业人员——其中6人遭斩首，袭击者将首级带走。《Daily Trust》（2024年11月2日，独立事件）报道当日2名印度公民在Borgu地方政府辖区一处水稻农场遭绑架。⚠ 存疑：\"中国公民遭斩首\"说法（出自Sahara Reporters／Daily Post头条）未获任何国际来源、中国外交部／使馆声明、新华社、《Premium Times》、HumAngle、《Punch》或TheCable佐证。Sahara Reporters／Daily Post说法似乎误读或混淆来源。一名中水尼日利亚籍员工（Saidu Yakubu／\"Abacha\"）在同一时期于Wushishi地方政府辖区独立遭绑架。说法降级为存疑／未证实——不应将中国公民涉及定性为已确认。"},{"incident_id":"NG-NI-2022-002","record_tier":"Flagship","date":"2022-07-04","state":"Niger","lga":"Shiroro + Munya + Rafi","location_detail":"Three-LGA mining suspension zone","lat":9.9,"lng":6.5,"geo_confidence":1,"category_t1":"Regulatory/Legal Action","category_t2":"Structural — three-LGA mining suspension","sector_relevance":"Mining","target_profile":"All mining operators in 3 LGAs","chinese_nationals_affected":"Yes — affected sector-wide","foreign_nationals_affected":"Yes","fatalities":0,"injuries":0,"kidnapped":0,"ransom_reported_ngn":null,"outcome":"Suspension issued by Governor Abubakar Sani Bello; directed security agencies to profile all mining sites","actor_attribution":"Niger State Government","actor_confidence":3,"narrative":"Governor Abubakar Sani Bello ordered immediate suspension of all mining activities in ng Marshals (NSCDC unit)","actor_confidence":3,"narrative":"Mining Marshals — NSCDC elite unit established 2024, grown to 2,670 officers by July 2025 — evacuated over 3,000 illegal miners from Kogi State. Nationally, unit recovered 98 mining sites from illegal occupation and arrested 327+ illegal miners including Chinese nationals. Federal enforcement mechanism is active and expanding.","source_1":"Africa Defense Forum (2025-10)","source_2":"The Guardian Nigeria","source_3":null,"source_confidence":3,"language_of_primary_source":"English","cross_sector_notes":"REGULATORY SCALE — Kogi demonstrates federal capacity to evacuate thousands in a single state. Compliant Chinese clients operating legally still face operational disruption from site profiling, roadblock searches, and guilt-by-association enforcement during Marshal sweeps.","captivity_duration_days":null,"resolution_pathway":"Enforcement action (3,000+ evacuated)","salience_ring":5,"category_t2_zh":"结构性——矿业巡守队大规模撤离","target_profile_zh":"非法矿工，含外籍人员","narrative_zh":"矿业巡守队——2024年成立的NSCDC精锐部队，截至2025年7月已扩至2,670名警官——已从科吉州撤离3,000余名非法矿工。全国范围内，该部队从非法占用手中收回98处矿区，逮捕327余名非法矿工，含中国公民。联邦执法机制正在运转并持续扩张。"},{"incident_id":"NG-KW-2023-001","record_tier":"Flagship","date":"2023-07-20","state":"Kwara","lga":"Unknown (state-level)","location_detail":"Kwara State mining site","lat":8.5,"lng":4.6,"geo_confidence":1,"category_t1":"Regulatory/Legal Action","category_t2":"Mass arrest — 13 Chinese illegal miners","sector_relevance":"Mining","target_profile":"13 Chinese nationals","chinese_nationals_affected":"Yes — 13 arrested","foreign_nationals_affected":"Yes — 13 Chinese","fatalities":0,"injuries":0,"kidnapped":0,"ransom_reported_ngn":null,"outcome":"Arrested for involvement in illegal mining","actor_attribution":"Nigerian security operatives","actor_confidence":3,"narrative":"13 Chinese nationals arrested by Nigerian security operatives for involvement in illegal mining in Kwara State. Largest single-incident Chinese-national arrest i nstruction","target_profile":"5 Chinese BUA Cement expatriates + NSCDC CNAI escort","chinese_nationals_affected":"Yes — 5 in convoy, 1 abducted, 4 rescued unharmed","foreign_nationals_affected":"Yes — 5 Chinese","fatalities":9,"injuries":4,"kidnapped":1,"ransom_reported_ngn":null,"outcome":"Abducted Chinese national released after over 3 months in captivity (December 2025); 8 NSCDC killed, 1 civilian driver killed, 4 injured","actor_attribution":"Armed kidnappers (sophisticated weapons) — unattributed; Etsako East/Okpella forest belt","actor_confidence":1,"narrative":"At approximately 22:30 Friday 5 September 2025, armed attackers ambushed a 12-person NSCDC CNAI (Critical National Assets and Infrastructure) escort detail returning 5 Chinese BUA Cement expatriates from routine patrol to the factory base at Okpella, Etsako East LGA, Edo State. Attackers opened sustained fire; 8 NSCDC personnel killed, 1 civilian driver killed, 4 injured. Four Chinese rescued unharmed on site; one Chinese national abducted into surrounding forest. Abducted Chinese national (identified as Mr. Wang) was released at approximately 23:30 on 2 December 2025 in Kabba, Kogi State — joint Edo/Kogi Police + vigilante/local-hunter operation; ransom neither confirmed nor denied (Edo Police PRO Moses Yamu statement). BUA Group publicly condemned the attack.","source_1":"Sahara Reporters (2025-09-06)","source_2":"NSCDC official statement (5 September 2025, 22:30 timing)","source_3":"Daily Post Nigeria (2025-09-06) + Daily Post (2025-12-08) release confirmation","source_confidence":3,"language_of_primary_source":"English","cross_sector_notes":"CRITICAL FLAGSHIP FOR CONSTRUCTION/INFRASTRUCTURE SECTOR. Key lessons: (1) NSCDC CNAI escort detail — the *official* protection for Critical National Assets — was catastrophically overmatched. 8 dead from a 12-person detail is near-total loss of the escort. (2) The attack occurred at the factory entrance on the *return leg* of routine patrol — a predictable journey pattern that attackers exploited. (3) Edo State was not previously categorised as a high-risk operating environment for Chinese nationals; this incident represents a geographic expansion of the threat. (4) 3-month captivity duration is the baseline realistic planning horizon even for high-profile kidnap cases at major industrial facilities. Mandatory inclusion in client briefing.","captivity_duration_days":89,"resolution_pathway":"Military/police rescue operation (joint Edo/Kogi State Police, vigilantes, local hunters) — Kabba, Kogi State, 2 Dec 2025","salience_ring":1,"category_t2_zh":"安保护卫车队伏击——工厂入口","target_profile_zh":"5名BUA水泥中国外派人员及NSCDC的CNAI护卫","narrative_zh":"2025年9月5日周五约22时30分，武装袭击者伏击了一支12人的NSCDC CNAI（关键国家资产与基础设施）护卫队，该队正护送5名BUA水泥中国外派人员自例行巡逻返回埃多州Etsako东地方政府辖区Okpella工厂驻地。袭击者持续开火；8名NSCDC人员殉职、1名平民司机遇害、4人受伤。4名中国公民在现场安全获救；1名中国公民被劫入周边森林。被绑中国公民（确认为王先生）于2025年12月2日约23时30分在科吉州Kabba获释——埃多／科吉警方及社区自卫队／本地猎人联合行动；赎金既未确认亦未否认（埃多警方新闻官Moses Yamu声明）。BUA集团公开谴责此次袭击。"},{"incident_id":"NG-NI-2022-003","record_tier":"Flagship","date":"2022-01-04","state":"Niger","lga":"Wushishi / Shiroro","location_detail":"Sino-Hydro Zungeru Dam transmission tower site, Gussase village","lat":9.82,"lng":6.15,"geo_confidence":3,"category_t1":"Kidnap for Ransom","category_t2":"Power-project construction — transmission line attack","sector_relevance":"Construction","target_profile":"Chinese Sino-Hydro workers + local staff + 2 security guards","chinese_nationals_affected":"Yes — 3 abducted (initial), 4 rescued, 1 Chinese + 1 local staff shot and injured","foreign_nationals_affected":"Yes — Chinese","fatalities":2,"injuries":2,"kidnapped":3,"ransom_reported_ngn":null,"outcome":"3 Chinese abducted; 4 other Chinese rescued in gun battle; 1 wounded Chinese + 1 wounded local staff evacuated; 2 guards killed","actor_attribution":"Bandits on motorcycles (Shiroro corridor)","actor_confidence":2,"narrative":"On 4 January 2022 at approximately 16:30, armed bandits on motorcycles attacked Sino-Hydro Electric Power Dam transmission line tower worksite at Gussase village (Wushishi/Shiroro LGA border area, Niger State). Workers (mixed Chinese expatriates and local staff) were building 330kV transmission infrastructure from Zungeru Dam to Gusase community. Police tactical team attached to the facility engaged attackers in gun duel; 4 expatriates rescued (1 Chinese and 1 local shot); 3 Chinese could not be accounted for in the scrambling during the firefight. Niger SSG Ahmed Ibrahim Matane confirmed the incident. Historical: the $1.3 billion 700MW Zungeru project (built by consortium of China National Electric Engineering Company and Sinohydro Corporation) faced repeated armed-robbery and kidnap incidents over its 2013-2024 construction period — cited by Nigerian power minister as a cause of delays.","source_1":"The Guardian Nigeria (2022-01-05)","source_2":"Daily Trust (2022-01-05)","source_3":"Niger State Police Command (DSP Wasiu Abiodun)","source_confidence":3,"language_of_primary_source":"English","cross_sector_notes":"POWER SECTOR FLAGSHIP — longest-running Chinese infrastructure exposure case. Demonstrates: (1) transmission line construction = geographically distributed target profile (can't all be defended like a single plant); (2) armed police tactical team attached to site was insufficient despite being on-site; (3) repeated incidents over a decade on the same project = recurring vulnerability not resolved by initial mitigation. Directly relevant for any Chinese power/transmission client — Mambilla project remains in arbitration and not under construction, but any resumption would face equivalent risks.","captivity_duration_days":null,"resolution_pathway":"Mixed — 4 rescued, 3 unaccounted at reporting","salience_ring":1,"category_t2_zh":"电力项目建设——输电线路袭击","target_profile_zh":"中水工人、本地员工及2名保安","narrative_zh":"2022年1月4日约16时30分，骑摩托车的武装匪徒袭击位于尼日尔州Gussase村（Wushishi／希罗罗地方政府辖区交界地带）的中水电水电站大坝输电线路塔施工点。工人（中国外派人员与本地员工混编）正在修建宗格鲁水坝至Gusase社区的330千伏输电基础设施。配属该设施的警方战术队与袭击者交火；4名外派人员获救（1名中国公民及1名本地人员受伤）；火力对射混乱中3名中国公民下落不明。尼日尔州政府秘书长Ahmed Ibrahim Matane确认事件。历史背景：造价13亿美元的700兆瓦宗格鲁项目（由中国电气工程集团与中水电集团联合体建设）在其2013至2024年施工期内反复遭遇武装抢劫及绑架事件——尼日利亚电力部长将其列为项目延误的原因之一。"},{"incident_id":"NG-IM-2022-001","record_tier":"Flagship","date":"2022-08-01","state":"Imo","lga":"Okigwe (Leru junction-Ihube axis)","location_detail":"Enugu-Port Harcourt Expressway between Leru junction and Ihube — between three military checkpoints","lat":5.83,"lng":7.35,"geo_confidence":3,"category_t1":"Kidnap for Ransom","category_t2":"Mass highway blockade — pose as police","sector_relevance":"Logistics","target_profile":"3 full commercial buses of passengers","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":null,"injuries":null,"kidnapped":"3 busloads (estimated dozens)","ransom_reported_ngn":null,"outcome":"3 buses taken into bush; military patrol van burnt; 100+ vehicles abandoned on both lanes as motorists fled","actor_attribution":"30+ heavily armed gunmen posing as police (suspected Fulani herdsmen per community framing; 'Fulani bandits' per IPOB/ESN framing)","actor_confidence":2,"narrative":"Approximately 30 heavily armed gunmen blocked Enugu-Port Harcourt Expressway between Leru junction and Ihube, Okigwe area of Imo State — between three existing military checkpoints. Drivers mistook kidnappers for police at a checkpoint. 3 full buses taken into the bush. Soldiers alerted to the blockade were fired on; their patrol van burnt. Motorists abandoned 100+ vehicles on both lanes and fled. Community youth subsequently protested soldier inability to stop daily kidnappings and asked the Army to leave. Template case: the Enugu-Okigwe axis pattern continued through 2023 (Arondizuogu Junction, 9 kidnapped 2 killed) and 2025 (Ezinnachi/Okigwe July 2025 daylight attack).","source_1":"Point Blank News (2022-08-01)","source_2":"Vanguard / Gistmania (2022-08-02)","source_3":null,"source_confidence":2,"language_of_primary_source":"English","cross_sector_notes":"LOGISTICS FLAGSHIP — Enugu-PH expressway is the single most important north-south logistics artery between the South-East and the oil-producing Niger Delta. Attack pattern shows: (1) bandits pose as police — standard tactic; (2) military checkpoint presence has failed to prevent mass incidents; (3) the Leru-Ihube-Okigwe-Arondizuogu-Ezinnachi segment is a persistent hotspot over 3+ years; (4) Lokpanta Cattle Market (Abia/Imo border) is cited by IPOB/ESN as the operational hideout — this is actionable intelligence for journey planning.","captivity_duration_days":null,"resolution_pathway":"Unknown (3 busloads)","salience_ring":5,"category_t2_zh":"大规模高速公路封锁——冒充警察","target_profile_zh":"3辆满载商业乘客的客车","narrative_zh":"约30名重武装持枪分子在伊莫州Okigwe地区Leru路口与Ihube之间封锁埃努古-哈尔科特港高速公路——恰好位于三个现存军方检查站之间。司机误将绑匪当作检查站警察。3辆满载客车被劫入丛林。被调往封锁点的士兵遭开火；巡逻车被焚毁。100余名司机将车辆弃于双向车道逃离。社区青年随后抗议士兵无力阻止日常绑架，要求陆军撤离。标志性案例：埃努古-Okigwe轴线模式延续至2023年（Arondizuogu路口，9人被绑、2人遇害）及2025年（2025年7月Ezinnachi/Okigwe白昼袭击）。"},{"incident_id":"NG-IM-2025-001","record_tier":"Flagship","date":"2025-07-09","state":"Imo","lga":"Okigwe","location_detail":"Enugu-PH Expressway, Ezinnachi/Okigwe axis, near hospital under construction","lat":5.83,"lng":7.36,"geo_confidence":3,"category_t1":"Kidnap for Ransom","category_t2":"Daylight highway blockade","sector_relevance":"Logistics","target_profile":"Highway passengers","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":null,"injuries":null,"kidnapped":"unspecified","ransom_reported_ngn":null,"outcome":"Passengers shot and abducted; vehicles abandoned; other travellers U-turned","actor_attribution":"Unidentified gunmen (operating 'unchallenged')","actor_confidence":1,"narrative":"Between 09:00 and 10:00 on Wednesday 9 July 2025, gunmen blocked the Enugu-Port Harcourt Expressway at the Ezinnachi/Okigwe axis near a hospital under construction. Operated unchallenged. Shot some passengers; abducted unspecified number; other travellers U-turned back to Okigwe or Umuahia. Confirms persistence of 2022 Leru junction pattern (NG-IM-2022-001) three years on, now occurring in broad daylight rather than at night.","source_1":"Vanguard (2025-07-09)","source_2":"Eagle Online (2025-07-09)","source_3":null,"source_confidence":2,"language_of_primary_source":"English","cross_sector_notes":"Daylight operation (09:00-10:00) is the threat evolution. Any client protocol assuming 'daylight transit is safer' is outdated for the Okigwe axis.","captivity_duration_days":null,"resolution_pathway":"Unknown","salience_ring":5,"category_t2_zh":"白昼高速公路封锁","target_profile_zh":"高速公路上的乘客","narrative_zh":"2025年7月9日周三09时至10时之间，持枪分子在医院施工现场附近封锁埃努古-哈尔科特港高速公路Ezinnachi/Okigwe轴线。行动毫无阻拦。对部分乘客开枪；绑架人数不详；其他出行者折返Okigwe或乌穆阿希亚。此事件确认2022年Leru路口模式（NG-IM-2022-001）在三年后仍在延续，且由夜间转为白昼实施。"},{"incident_id":"NG-IM-2023-001","record_tier":"Standard","date":"2023-06-24","state":"Imo","lga":"Ideato North","location_detail":"Arondizuogu Junction on Enugu-PH Expressway — diverted to Arondizuogu Road bush hamlet","lat":5.88,"lng":7.15,"geo_confidence":3,"category_t1":"Kidnap for Ransom","category_t2":"Bus hijack + diversion","sector_relevance":"Logistics","target_profile":"Sienna bus passengers (travelling to burial)","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":2,"injuries":null,"kidnapped":9,"ransom_reported_ngn":null,"outcome":"Bus diverted into Imo bush; 2 killed, 9 abducted, others robbed","actor_attribution":"Unidentified hoodlums","actor_confidence":1,"narrative":"Gunmen flagged down Sienna bus at Arondizuogu Junction on Enugu-PH Expressway on Saturday 24 June 2023. Passengers from Amangwo Olokoro (Umuahia) en route to burial in Enugu. Vehicle diverted off expressway to Arondizuogu Road, then to bush hamlet. 9 abducted, 2 killed, other passengers robbed.","source_1":"Prompt News (2023-06-25) / NAN","source_2":null,"source_3":null,"source_confidence":2,"language_of_primary_source":"English","cross_sector_notes":null,"captivity_duration_days":null,"resolution_pathway":"Mixed — 2 killed, 9 abducted","salience_ring":5,"category_t2_zh":"客车劫持及改道","target_profile_zh":"Sienna小巴乘客（赴葬途中）"},{"incident_id":"NG-AB-2024-002","record_tier":"Flagship","date":"2024-01-15","state":"Abia","lga":"Umunneochi","location_detail":"Lokpanta Cattle Market — Abia/Imo/Enugu intersection","lat":6.05,"lng":7.42,"geo_confidence":3,"category_t1":"Banditry","category_t2":"Structural — operational base for highway attacks","sector_relevance":"Logistics","target_profile":"Travellers on Enugu-Umuahia-Aba-PH corridor","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":null,"injuries":null,"kidnapped":null,"ransom_reported_ngn":null,"outcome":"Ongoing — repeatedly identified as perpetrator base for corridor attacks","actor_attribution":"'Fulani bandits' per IPOB/ESN framing; herders per community framing","actor_confidence":2,"narrative":"Lokpanta Cattle Market, sited at the Abia/Imo/Enugu state intersection in Umunneochi LGA, Abia State, is repeatedly identified by IPOB/ESN statements and independent commentary (Daily Post column, former Methodist prelate Kanu-Uche, Spiritan University lecturer kidnap survivors) as the operational base for the perpetrators of attacks along the Enugu-Umuahia-Aba-Port Harcourt Expressway. ESN issued a December 2023 warning threatening to dislodge the Fulani presence; state security response has been limited. The market's state-intersection siting means cross-jurisdictional coordination is required for any enforcement — a classic Nigerian governance gap.","source_1":"Daily Post Nigeria (2022-08-22) — Joe Chukindi column","source_2":"IPOB ESN 3rd Anniversary statement (2023-12-19)","source_3":"Daily Post Nigeria (2023-12-19)","source_confidence":2,"language_of_primary_source":"English","cross_sector_notes":"LOGISTICS STRUCTURAL — Chinese clients moving product or personnel between Aba (manufacturing hub) and Port Harcourt (petrochemicals, port access) must treat the Lokpanta corridor as the single most critical risk segment on the eastern trunk. Practical mitigation: convoy timing before 08:00; stop for rest at Enugu or Umuahia, not en route; avoid Okigwe-Leru-Ihube segment where possible.","captivity_duration_days":null,"resolution_pathway":"Not applicable (structural — operating base)","salience_ring":5,"category_t2_zh":"结构性——高速公路袭击的作战基地","target_profile_zh":"埃努古-乌穆阿希亚-阿巴-哈尔科特港走廊的出行者","narrative_zh":"Lokpanta牛市位于阿比亚／伊莫／埃努古三州交界处，坐落于阿比亚州乌蒙内奥奇地方政府辖区，IPOB／ESN声明及独立评论（《Daily Post》专栏、前卫理公会高级教长Kanu-Uche、Spiritan大学被绑讲师幸存者陈述）多次将其指认为埃努古-乌穆阿希亚-阿巴-哈尔科特港高速公路沿线袭击作案者的作战基地。ESN于2023年12月发出警告，威胁要驱逐富拉尼存在；州级安保响应有限。该集市三州交界地点意味着任何执法行动都需跨辖区协调——尼日利亚典型治理真空。"},{"incident_id":"NG-FC-2024-001","record_tier":"Standard","date":"2024-05-08","state":"FCT","lga":"Bwari Area Council","location_detail":"Piko, remote FCT community","lat":9.28,"lng":7.38,"geo_confidence":2,"category_t1":"Kidnap for Ransom","category_t2":"Capital-area abduction","sector_relevance":"None direct","target_profile":"Residents","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":null,"injuries":null,"kidnapped":13,"ransom_reported_ngn":null,"outcome":"13 abducted","actor_attribution":"Suspected bandits","actor_confidence":1,"narrative":"13 persons abducted from Piko, a remote community in Bwari Area Council of the FCT. HURIWA publicly condemned the abduction. FCT-based incidents demonstrate that the capital's rural fringes are permeable to the same bandit networks operating in Niger and Kaduna states.","source_1":"Guardian Nigeria (2024-05-10)","source_2":null,"source_3":null,"source_confidence":2,"language_of_primary_source":"English","cross_sector_notes":"FCT proximity is not a risk buffer — Bwari is approximately 35 km north of central Abuja.","captivity_duration_days":null,"resolution_pathway":"Unknown","salience_ring":6,"category_t2_zh":"首都地区绑架","target_profile_zh":"居民"},{"incident_id":"NG-KW-2025-002","record_tier":"Standard","date":"2025-12-02","state":"Kwara","lga":"Patigi","location  armed robbery syndicates + 'one-chance' transport impersonators + occasional kidnap groups","actor_confidence":2,"narrative":"Lagos-Ibadan Expressway presents a different logistics risk profile to northern corridors: accident volume (11,000+ vehicles in collisions over 27-month period to 2025) dominates over kidnap/robbery, but a May 2024 resurgence of kidnapping and robbery on the corridor prompted Oyo State Police Command troop deployment. Lagos records 14.3 transport crimes per 10,000 passengers vs Abuja 8.7. 'One-chance' operations (criminals posing as legitimate transport operators) are a distinct urban-Lagos risk. Petrol tanker fire June 2025 at NASFAT Camp, Otedola Bridge tanker fire 2018 (50+ vehicles, 9 dead) illustrate traffic-hazard cascades as primary loss exposure on this corridor.","source_1":"Guardian Nigeria (2024-05-10) Oyo Police deployment","source_2":"Springer/Discover Cities (2025-10) Lagos/Abuja transport crime data","source_3":"Punch (2025-06-13) structural reporting","source_confidence":2,"language_of_primary_source":"English","cross_sector_notes":"LOGISTICS DIFFERENTIATION — Lagos-Ibadan corridor risk is meaningfully different from Kaduna-Abuja or Enugu-PH. Primary exposure is road-traffic accidents and petty/armed robbery in daylight urban sections; kidnap risk is lower. Different duty-of-care protocols apply. Client journey planning should distinguish corridor archetypes.","captivity_duration_days":null,"resolution_pathway":"Not applicable (structural)","salience_ring":5,"category_t2_zh":"结构性——高速公路抢劫及道路犯罪特征","target_profile_zh":"商业车辆及乘客"},{"incident_id":"NG-BE-2025-001","record_tier":"Standard","date":"2025-07-05","state":"Benue","lga":"Unknown","location_detail":"Benue State highway","lat":7.19,"lng":8.13,"geo_confidence":1,"category_t1":"Kidnap for Ransom","category_t2":"Highway bus hijack — traders","sector_relevance":"Logistics","target_profile":"Traders travelling Enugu-bound","chinese_nationals_affected":"No","foreign_nationals_affe mpany — nationwide","lat":9.1,"lng":7.4,"geo_confidence":1,"category_t1":"Regulatory/Legal Action","category_t2":"Structural — Chinese infrastructure footprint / attack surface","sector_relevance":"Construction","target_profile":"All Chinese construction sector personnel in-country","chinese_nationals_affected":"Yes — all active projects","foreign_nationals_affected":"Yes","fatalities":null,"injuries":null,"kidnapped":null,"ransom_reported_ngn":null,"outcome":"Active construction across multiple high-risk geographies","actor_attribution":"Multiple (CCECC = China Civil Engineering Construction Corporation; Sinohydro; CNEEC)","actor_confidence":3,"narrative":"Structural reference record mapping Chinese construction/infrastructure footprint in Nigeria to inform threat-surface analysis. Active Chinese-built projects include: (1) Zungeru 700MW Hydropower Plant, Niger State (99.8% complete 2024, operational 2024 onwards) — Sinohydro + CNEEC consortium, $1.3bn; (2) Mambilla 3,050MW Hydropower, Taraba State — $5.8bn, stalled in international arbitration since 2017; (3) CCECC 7.2km road reconstruction, Rigasa, Kaduna State (commenced September 2025); (4) CCECC 7km rural road Tunga Madaki Settlement + 4-span bridge, FCT (commenced September 2025, commissioning June 2026); (5) CCECC Collector Road C01 emergency project, FCT (commenced October 2025, 6-month timeline); (6) BUA Bode Saadu-Kaiama-Kosubosu road, Kwara (active — Chinese subcontractors); (7) Ajaokuta-Kaduna-Kano gas pipeline (Chinese-financed). Each project is a discrete attack surface; incidents to date in this database affect 5 of these 7 classes.","source_1":"Xinhua (2025-09-30, 2025-10-18, 2025-09-13)","source_2":"Afripoli (2026-03-17) Chinese energy investment mapping","source_3":"Business Day 7-Projects article (2023-04-11)","source_confidence":3,"language_of_primary_source":"English / Chinese","cross_sector_notes":"MASTER STRUCTURAL RECORD — use this entry as the spine for client-product sector mapping. Cross-reference to incident records confirms: Zungeru (2022 attack NG-NI-2022-003), Kwara BUA (Dec 2025 NG-KW-2025-001), Edo BUA Cement (Sep 2025 NG-ED-2025-001 — not Chinese-built but Chinese personnel present). Mambilla is inactive but retains latent exposure risk if arbitration resolves.","captivity_duration_days":null,"resolution_pathway":"Not applicable (master structural)","salience_ring":1,"category_t2_zh":"结构性——中国基础设施布局／攻击面","target_profile_zh":"尼日利亚境内全部中国建筑业人员","narrative_zh":"结构性参考记录，梳理中国在尼日利亚的建筑／基础设施布局，服务于威胁面分析。在建中国项目包括：（1）尼日尔州宗格鲁700兆瓦水电厂（2024年完工度99.8%，2024年起投运）——中水电与中电工联合体，13亿美元；（2）塔拉巴州Mambilla 3,050兆瓦水电，造价58亿美元，自2017年起因国际仲裁停滞；（3）卡杜纳州Rigasa CCECC 7.2公里道路重建（2025年9月开工）；（4）联邦首都领地Tunga Madaki定居点CCECC 7公里乡村道路及4跨桥梁（2025年9月开工，2026年6月竣工）；（5）联邦首都领地CCECC收集道路C01应急项目（2025年10月开工，6个月工期）；（6）夸拉州BUA博德萨杜-凯阿马-科苏博苏公路（在建——中方分包商）；（7）阿贾奥库塔-卡杜纳-卡诺天然气管道（中资融资）。每个项目构成独立的攻击面；本数据库现有事件影响其中5类。"},{"incident_id":"NG-BA-2013-001","record_tier":"Flagship","date":"2013-02-16","state":"Bauchi","lga":"Jama'are","location_detail":"Setraco construction site, Jama'are town","lat":11.67,"lng":9.93,"geo_confidence":3,"category_t1":"Terrorism","category_t2":"Construction site raid — multi-national expatriate target","sector_relevance":"Construction","target_profile":"Setraco construction workers — Lebanese, Italian, Greek, British","chinese_nationals_affected":"No","foreign_nationals_affected":"Yes — 7 total: 4 Lebanese, 1 Italian, 1 British, 1 Greek (per Bauchi police); Lebanese MFA counted 2 Lebanese","fatalities":1,"injuries":null,"kidnapped":7,"ransom_reported_ngn":null,"outcome":"7 foreign workers later killed during February 2013 rescue attempt (subsequent reporting)","actor_attribution":"Ansaru (claimed) — Boko Haram offshoot","actor_confidence":3,"narrative":"Gunmen stormed the Setraco construction site in Jama'are town, Bauchi State, on night of Saturday 16 February 2013, killing a security guard and abducting 7 foreign construction workers — 4 Lebanese, 1 Italian, 1 British, 1 Greek per Bauchi State Police spokesman Hassan Auyo. Lebanese government confirmed 2 of its citizens. Ansaru — Boko Haram offshoot — made abduction of foreigners a priority after claiming kidnap of a French national in December 2012. Hostages subsequently killed. Historical anchor for multi-national construction target profile in northern Nigeria.","source_1":"AFP via Emirates 24/7 (2013-02-17)","source_2":"Lebanese Foreign Ministry statement","source_3":"Greek Foreign Minister Dimitris Avramopoulos statement","source_confidence":3,"language_of_primary_source":"English","cross_sector_notes":"HISTORICAL FLAGSHIP — establishes that (1) multi-national construction sites are a proven target class; (2) Ansaru/Boko Haram has historical capability and intent to target foreign nationals en masse; (3) rescue-attempt outcomes for foreign hostages can be catastrophic. Relevant threat-matrix context for any Chinese construction client operating in Bauchi/Yobe/Borno/Gombe corridor.","captivity_duration_days":null,"resolution_pathway":"Killed (subsequent rescue attempt; all 7 dead)","salience_ring":3,"category_t2_zh":"建筑工地袭击——多国外派人员目标","target_profile_zh":"Setraco建筑工人——黎巴嫩、意大利、希腊、英国籍","narrative_zh":"2013年2月16日周六深夜，持枪分子突袭鲍奇州Jama'are镇Setraco建筑工地，击毙1名保安，绑架7名外籍建筑工人——据鲍奇州警方发言人Hassan Auyo，为4名黎巴嫩、1名意大利、1名英国、1名希腊公民。黎巴嫩政府确认其中2名为其公民。Ansaru——博科圣地分裂派——自2012年12月宣称绑架一名法国公民以来，将绑架外国人列为优先任务。人质其后遭杀害。尼日利亚北部多国籍建筑目标画像的历史锚点。"},{"incident_id":"NG-KW-2019-001","record_tier":"Flagship","date":"2019-07-20","state":"Kwara","lga":"Edu","location_detail":"Gbale village local drinking joint","lat":8.88,"lng":5.15,"geo_confidence":3,"category_t1":"Kidnap for Ransom","category_t2":"Abduction from social venue — foreign construction workers","sector_relevance":"Construction","target_profile":"4 Turkish nationals — Instabul Concrete Limited employees","chinese_nationals_affected":"No","foreign_nationals_affected":"Yes — 4 Turkish: Yasin Colak (33), Senerapal (40), Ergun Yurdakul (35), Seyit Keklik (25)","fatalities":0,"injuries":null,"kidnapped":4,"ransom_reported_ngn":null,"outcome":"All 4 rescued 26 July 2019 — no ransom paid; 3 suspects arrested","actor_attribution":"6-man armed gang","actor_confidence":2,"narrative":"At approximately 22:00 Saturday 20 July 2019, 6 armed men stormed a local drinking joint in Gbale village, Edu LGA, Kwara State, abducting 4 Turkish construction workers (Yasin Colak, Senerapal, Ergun Yurdakul, Seyit Keklik) employed by Instabul Concrete Limited. Kwara State Police spokesperson Ajayi Okasanmi confirmed the abduction. Same Edu/Moro LGA corridor that has subsequently seen multiple Chinese-national incidents at the BUA road project (NG-KW-2025-001). All 4 workers rescued Friday 26 July 2019 by Kwara State Police (Operation Puff Adder) with vigilante support; 3 suspects arrested. $1 million ransom demanded but NOT paid. Village name variant: 'Gbugbu' in post-rescue reports vs. initial 'Gbale.'","source_1":"Business Day Nigeria (2019-07)","source_2":"Pulse.ng (2019-07-22)","source_3":"TheNation","source_confidence":3,"language_of_primary_source":"English","cross_sector_notes":"PATTERN CONTINUITY — same Edu/Moro LGA corridor targeted in both 2019 (Turkish) and 2025 (Chinese) construction-sector incidents. Historical depth across the same corridor supports forward risk modelling. Off-duty social venues are also exposure points, not just construction sites themselves.","captivity_duration_days":6,"resolution_pathway":"Police rescue — Operation Puff Adder, Kwara State Police; vigilante support; no ransom","salience_ring":3,"category_t2_zh":"社交场所绑架——外籍建筑工人","target_profile_zh":"4名土耳其公民——Instabul Concrete Limited公司员工","narrative_zh":"2019年7月20日周六约22时，6名武装男子突袭夸拉州Edu地方政府辖区Gbale村一处本地酒吧，绑架4名土耳其籍建筑工人（Yasin Colak、Senerapal、Ergun Yurdakul、Seyit Keklik），他们受雇于Instabul Concrete Limited公司。夸拉州警方发言人Ajayi Okasanmi证实绑架事件。同一Edu／Moro地方政府辖区走廊此后多次发生涉中国公民事件，均涉及BUA公路项目（NG-KW-2025-001）。4名工人于2019年7月26日周五由夸拉州警方（Puff Adder行动）联合社区自卫队救出；3名嫌犯被捕。绑匪索要100万美元赎金，但未支付。村名异写：救援后报道中作\"Gbugbu\"，与最初的\"Gbale\"有别。"},{"incident_id":"NG-CR-2016-001","record_tier":"Flagship","date":"2016-06-22","state":"Cross River","lga":"Calabar Municipality area (outskirts)","location_detail":"Outskirts of Calabar","lat":4.95,"lng":8.32,"geo_confidence":2,"category_t1":"Kidnap for Ransom","category_t2":"Mining/cement contractor abduction","sector_relevance":"Mining","target_profile":"5 expatriates (3 Australians, 1 South African + 1 other) + 2 Nigerians — Macmahon Holdings contractors working for Lafarge Africa","chinese_nationals_affected":"No","foreign_nationals_affected":"Yes — 3 Australians, 1 New Zealander, 1 South African, 2 Nigerians (7 total kidnapped); driver Matthew Odok killed","fatalities":1,"injuries":null,"kidnapped":7,"ransom_reported_ngn":null,"outcome":"Released unhurt after four days; medical checks pronounced fit","actor_attribution":"Unidentified","actor_confidence":1,"narrative":"⚠ DATE CORRECTION: Original database entry gave '2024-06-17' — WRONG BY 8 YEARS. Actual incident: Wednesday 22 June 2016. Seven contractors of Macmahon Holdings Limited (Australian mining services company, subcontractor to UniCem — a LafargeHolcim/Flour Mills JV) kidnapped near Calabar, Cross River State. Driver Matthew Odok was KILLED in the ambush. A 4th Australian (mechanic Tim Croot) escaped. Actual victim nationalities: 3 Australians, 1 New Zealander (Jamal Khan), 1 South African, 2 Nigerians. Previous entry omitted the New Zealander and both Nigerian victims. All 7 kidnapped released Sunday 26 June 2016 after 4 days. Macmahon subsequently terminated the Calabar contract (28 October 2016) and exited Nigeria entirely. [Historical anchor record — outside 2018+ primary window; retained for pattern reference.]","source_1":"Al Jazeera (2016-06-23); Reuters; Mining Technology (2016-06-27) — confirms release","source_2":"Australian Mining Review — \"Macmahon exits Nigeria\" (Oct 2016)","source_3":"Cross River State Police Command","source_confidence":3,"language_of_primary_source":"English","cross_sector_notes":"SECTOR-TEMPLATE RECORD — Australian mining-services contractors targeted in southern Nigeria mining/cement operations. Template for Chinese mining-services risk exposure in any cement/aggregates operation. Resolution pathway (4-day release, 'unhurt') is atypically fast and suggests different actor type than the 94-day Edo BUA case.","captivity_duration_days":4,"resolution_pathway":"Released 26 June 2016 (~4 days); Macmahon exited Nigeria 28 Oct 2016","salience_ring":3,"category_t2_zh":"采矿／水泥承包商绑架","target_profile_zh":"5名外派人员（3名澳大利亚、1名南非、1名其他）及2名尼日利亚人——麦克马洪控股为Lafarge Africa承包作业","narrative_zh":"⚠ 日期更正：原数据库条目登记为\"2024-06-17\"——偏差8年。实际事件日期：2016年6月22日周三。麦克马洪控股有限公司（澳大利亚矿业服务公司，为Lafarge非洲与Flour Mills合资公司UniCem的分包商）7名承包商在克罗斯河州卡拉巴附近遭绑架。司机Matthew Odok在伏击中遇害。第4名澳大利亚人（机械师Tim Croot）脱险。实际受害人国籍：3名澳大利亚、1名新西兰（Jamal Khan）、1名南非、2名尼日利亚公民。此前条目遗漏新西兰籍及两名尼日利亚受害者。7名被绑人员均于2016年6月26日周日（4天后）获释。麦克马洪随后于2016年10月28日终止卡拉巴合同并完全退出尼日利亚。[历史锚点记录——超出2018年以后主窗口；保留作模式参考。]"},{"incident_id":"NG-KG-2025-002","record_tier":"Flagship","date":"2025-12-14","state":"Kogi","lga":"Kabba/Bunu","location_detail":"First ECWA Church and Apostolic Church, Aiyetoro Kiri community","lat":7.82,"lng":6.07,"geo_confidence":3,"category_t1":"Kidnap for Ransom","category_t2":"Mass church abduction — Sunday service","sector_relevance":"None direct","target_profile":"37+ worshippers incl. 12+ children (3-8 yrs) and 10+ elderly (70+ yrs)","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":1,"injuries":2,"kidnapped":37,"ransom_reported_ngn":600000000,"outcome":"Partial release by January 2026: 7 released 1 Jan (3 corpses, 4 alive); 3 more released 12 Jan; 14 more released 13 Jan; 6 still captive at Jan 2026. Full ransom N15m confirmed paid per CSW; demand had been N600m","actor_attribution":"Bandits (Fulfude-speaking — Fulani militia)","actor_confidence":2,"narrative":"On Sunday 14 December 2025, bandits surrounded Aiyetoro Kiri during church service, attacking First ECWA Church and Apostolic Church simultaneously. Student Pastor Jimoh Adeyemi (JJ) killed; 37+ worshippers abducted including 12+ children aged 3-8 and 10+ elderly over 70. Attackers operated freely for hours, forcing some captives to return home to collect ransom money. Initial ransom demand ₦600 million (GBP 315k+), eventually settled at ₦15 million (GBP 7,900). Third major attack on Aiyetoro Kiri in 2025 (previous: 27 March, 26 November). Village became ghost town post-attack. Fulani militia designated as terrorists by Nigerian government in December 2025 under new counterterrorism doctrine.","source_1":"Sahara Reporters (2025-12-18)","source_2":"CSW Nigeria / CSW UK (2026-01-20)","source_3":"TV360 Nigeria (2026-01-14)","source_confidence":3,"language_of_primary_source":"English","cross_sector_notes":"RANSOM MARKET DATA — ₦600m demand negotiated to ₦15m (2.5% of demand) across 37 hostages = ~₦405k/head final settled. Contrast with Zamfara rural (N21m/46 = N456k) and Sokoto traditional leader (N1bn demand unconsummated). Indicates market-clearing price of around ₦400-500k/head for bulk rural hostages. 3 deaths in captivity = 8% fatality rate. Mass abduction trajectory in Kogi Kabba/Bunu LGA significantly raises the corridor risk for the Yagba West / Kabba-Lokoja axis — where Chinese miners have also been targeted.","captivity_duration_days":30,"resolution_pathway":"Partial release after ransom (N15m paid; 3 died in captivity; 6 still captive as of Jan 2026)","salience_ring":6,"category_t2_zh":"大规模教堂绑架——主日礼拜","target_profile_zh":"37名以上礼拜者，包括12名以上儿童（3至8岁）及10名以上老人（70岁以上）","narrative_zh":"2025年12月14日周日，匪徒在礼拜期间包围艾耶托罗基里镇，同时袭击第一ECWA教堂与使徒教堂。学生牧师Jimoh Adeyemi（JJ）遇害；37余名礼拜者遭绑架，含12名3至8岁儿童及10名70岁以上老人。袭击者连续行动数小时，甚至迫使部分被扣押者返回家中取赎金。初始赎金要求6亿奈拉（31.5万英镑以上），最终谈判至1,500万奈拉（7,900英镑）。为艾耶托罗基里2025年第三次重大袭击（前两次：3月27日、11月26日）。袭击后村庄成为空城。富拉尼民兵于2025年12月由尼日利亚政府依据新反恐教义正式列为恐怖组织。"},{"incident_id":"NG-KG-2025-003","record_tier":"Flagship","date":"2025-11-30","state":"Kogi","lga":"Yagba West","location_detail":"Cherubim and Seraphim Church, Ejiba","lat":8.29,"lng":5.79,"geo_confidence":3,"category_t1":"Kidnap for Ransom","category_t2":"Church abduction — pastor + infants","sector_relevance":"None direct","target_profile":"Presiding pastor 'Orlando' + 13 worshippers incl. 6 children from pastor's household","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":0,"injuries":null,"kidnapped":14,"ransom_reported_ngn":200000000,"outcome":"Ransom demand N500m reduced to N200m with 48-hour ultimatum; outcome not definitively reported","actor_attribution":"Bandits","actor_confidence":1,"narrative":"On Sunday 30 November 2025, bandits raided Cherubim and Seraphim Church in Ejiba, Yagba West LGA, Kogi State during service. Abducted presiding pastor 'Orlando' plus 13 worshippers including 6 children from the pastor's household — among them a 3-week-old baby and 4-month-old infant. Initial ransom demand ₦500 million reduced to ₦200 million with 48-hour ultimatum. Yagba West LGA is same zone as the October 2025 Chinese miners rescue (NG-KG-2025-001).","source_1":"Sahara Reporters (2025-12-10)","source_2":"Sahara Reporters (2025-12-14)","source_3":null,"source_confidence":2,"language_of_primary_source":"English","cross_sector_notes":"GEOGRAPHIC OVERLAP CRITICAL — Ejiba is in Yagba West LGA, the same LGA where 4 Chinese miners were rescued in October 2025 (NG-KG-2025-001). The two incidents within 6 weeks indicate sustained bandit presence in the LGA notwithstanding the rescue operation. Any Chinese operator in Yagba West / Kabba-Bunu corridor must treat the area as persistently contested.","captivity_duration_days":null,"resolution_pathway":"Unknown / negotiating","salience_ring":6,"category_t2_zh":"教堂绑架——牧师及婴幼儿","target_profile_zh":"主礼牧师\"Orlando\"及13名礼拜者，含牧师家中6名儿童","narrative_zh":"2025年11月30日周日，匪徒在礼拜进行中突袭科吉州雅格巴西地方政府辖区Ejiba的基路伯与撒拉弗教堂。绑架主礼牧师\"Orlando\"及13名礼拜者，其中包括牧师家中6名儿童——含一名出生3周的婴儿及一名4个月大的婴幼儿。初始赎金5亿奈拉降至2亿奈拉，限48小时。雅格巴西地方政府辖区与2025年10月中国矿工救援事件（NG-KG-2025-001）位于同一地区。"},{"incident_id":"NG-KD-2026-004","record_tier":"Flagship","date":"2026-01-18","state":"Kaduna","lga":"Kajuru","location_detail":"Three churches, Kurmin Wali community","lat":10.35,"lng":7.67,"geo_confidence":3,"category_t1":"Kidnap for Ransom","category_t2":"Mass church abduction — three simultaneous services","sector_relevance":"None direct","target_profile":"167 Christians across three churches","chinese_nationals_affected":"No","foreign_nationals_affected":"No","fatalities":null,"injuries":null,"kidnapped":167,"ransom_reported_ngn":null,"outcome":"Displacement of surrounding communities; CSW Nigeria raised dereliction alarm","actor_attribution":"Fulani militia (designated terrorists by Nigerian government Dec 2025)","actor_confidence":2,"narrative":"On 18 January 2026, armed militia attacked three simultaneous church services in Kurmin Wali community, Kajuru LGA, Kaduna State, abducting 167 Christians in a single coordinated operation. Fulani militia had been formally designated terrorists by Nigerian government in December 2025 under new counterterrorism doctrine. Surrounding communities abandoned homes. CSW Nigeria publicly described as 'clear dereliction of responsibility' by state and federal governments.","source_1":"CSW UK / CSW Nigeria (2026-01-20)","source_2":null,"source_3":null,"source_confidence":2,"language_of_primary_source":"English","cross_sector_notes":"SCALE ANCHOR — single-event 167-person abduction is one of the largest of the 2022-2026 period. Kajuru LGA sits on the Kaduna-Abuja road corridor approach — directly relevant to logistics planning for any Chinese personnel movement between the two cities. Attack scale indicates coordinated-force capability on the corridor.","captivity_duration_days":null,"resolution_pathway":"Still captive / displacement of community","salience_ring":6,"category_t2_zh":"大规模教堂绑架——三场礼拜同时进行中","target_profile_zh":"三座教堂共167名基督徒","narrative_zh":"2026年1月18日，武装民兵同时袭击卡杜纳州Kajuru地方政府辖区Kurmin Wali社区三场教堂礼拜，在单次协同行动中绑架167名
