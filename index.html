<script id="projects-data" type="application/json">
[{"id":"P-LEKKI-PORT","name":"Lekki Deep Sea Port","name_zh":"莱基深水港","category":"port","operator":"China Harbour Engineering Company (CHEC) / Tolaram / Lagos State / NPA","operator_zh":"中国港湾工程（CHEC）/ 新加坡Tolaram / 拉各斯州政府 / 尼港务局","chinese_involved":true,"status":"operational","status_zh":"运营中","state":"Lagos","lga":"Ibeju-Lekki","lat":6.44,"lng":4.0,"notes":"Nigeria's first deep sea port. $1.5bn project, EPC by CHEC/CHELE ($581m first phase), 75% financed by China Development Bank ($629m). Commissioned Jan 2023. 5 gantry cranes, 2.5km breakwater into Gulf of Guinea. Projected 200,000 direct/indirect jobs. Commercial operation by Lekki Free Port Terminal (CMA/CGM subsidiary). Strategic anchor of Lagos Free Zone.","notes_zh":"尼日利亚首个深水港。总投资15亿美元，由中国港湾工程公司/CHELE承建（首期EPC合同5.81亿美元），国家开发银行融资75%（6.29亿美元）。2023年1月投入运营。5台集装箱龙门吊，2.5公里防波堤延伸入几内亚湾。预计直接和间接就业20万人。商业运营由莱基自由港码头（法国达飞集团CMA/CGM子公司）负责。拉各斯自由贸易区的战略锚点。","year":"2023","sectors":["Logistics"]},{"id":"P-RAIL-LAG-IBA","name":"Lagos-Ibadan Standard Gauge Railway","name_zh":"拉各斯—伊巴丹标准轨铁路","category":"rail","operator":"China Civil Engineering Construction Corporation (CCECC)","operator_zh":"中国土木工程集团（中土集团）","chinese_involved":true,"status":"operational","status_zh":"运营中","state":"Lagos","lga":"Lagos Central to Ibadan (corridor)","lat":6.72,"lng":3.55,"notes":"First double-track standard gauge rail in West Africa. 157 km Lagos–Ibadan, 150 km/h design speed, built by CCECC under $1.5bn China Exim Bank loan. Construction 2017–2021, commercial opening June 2021. Passes through Abeokuta. Subject of ongoing Chinese-worker kidnap events (e.g. June 2021 Ogun attack, 4 Chinese abducted, police escort killed — see NG-OG-2021-001).","notes_zh":"西非首条复线标准轨铁路。拉各斯至伊巴丹段长157公里，设计时速150公里，由中土集团承建，中国进出口银行贷款15亿美元。2017年动工，2021年6月商业通车。途经阿贝奥库塔。曾多次发生中国工人遭绑架事件（如2021年6月奥贡袭击，4名中国公民遭绑架、1名警察护卫遇害——详见事件NG-OG-2021-001）。","year":"2021","sectors":["Construction","Logistics"]},{"id":"P-RAIL-ABJ-KAD","name":"Abuja-Kaduna Standard Gauge Railway","name_zh":"阿布贾—卡杜纳标准轨铁路","category":"rail","operator":"China Civil Engineering Construction Corporation (CCECC)","operator_zh":"中国土木工程集团（中土集团）","chinese_involved":true,"status":"operational","status_zh":"运营中","state":"FCT","lga":"Abuja to Kaduna (corridor)","lat":9.77,"lng":7.38,"notes":"187 km standard gauge linking Abuja to Kaduna. First segment of the broader Lagos–Kano rail modernisation. Construction began 2011, opened July 2016 under President Buhari. Cost $876m ($500m Exim Bank, balance GoN). Passenger service subject to high-profile security incidents (e.g. March 2022 train attack where >60 kidnapped).","notes_zh":"标准轨铁路187公里，连接阿布贾与卡杜纳。拉各斯—卡诺铁路现代化的首期区段。2011年动工，2016年7月由布哈里总统通车。投资8.76亿美元（进出口银行5亿美元，其余由尼政府出资）。客运曾发生重大安全事件（例如2022年3月列车遇袭，60余人遭绑架）。","year":"2016","sectors":["Construction","Logistics"]},{"id":"P-RAIL-IBA-KAN","name":"Ibadan-Kano Rail Extension (under construction)","name_zh":"伊巴丹—卡诺铁路延长线（建设中）","category":"rail","operator":"China Civil Engineering Construction Corporation (CCECC)","operator_zh":"中国土木工程集团（中土集团）","chinese_involved":true,"status":"under_construction","status_zh":"建设中","state":"Multi-state","lga":"Ibadan—Ilorin—Minna—Kaduna—Kano corridor","lat":9.5,"lng":6.0,"notes":"Extending the Lagos–Kano standard gauge railway beyond Ibadan. Four planned sections: Ibadan-Ilorin (200km), Ilorin-Minna (270km), Minna-Abuja-Kaduna, Kaduna-Kano (300km). Delayed by funding issues. Chinese CCECC site personnel routinely protected by NSCDC and MOPOL detachments; rail-corridor attacks and extortion on alignment-works a persistent risk.","notes_zh":"拉各斯—卡诺标准轨铁路向伊巴丹以北延伸。计划分四段：伊巴丹—伊洛林（200公里）、伊洛林—明纳（270公里）、明纳—阿布贾—卡杜纳、卡杜纳—卡诺（300公里）。因融资问题进度延后。中土集团现场人员通常由尼民防部队（NSCDC）与流动警察支队（MOPOL）保护；铁路沿线施工中的袭击与勒索是持续性风险。","year":"ongoing","sectors":["Construction"]},{"id":"P-ZUNGERU","name":"Zungeru Hydroelectric Power Plant (700 MW)","name_zh":"宗格鲁水电站（700兆瓦）","category":"power","operator":"Sinohydro + CNEEC consortium","operator_zh":"中国水电（Sinohydro）+ 中国电力工程（CNEEC）联营体","chinese_involved":true,"status":"operational","status_zh":"运营中","state":"Niger","lga":"Wushishi / Shiroro adjacent","lat":9.901,"lng":6.287,"notes":"Nigeria's second-largest hydroelectric plant (after Kainji). 4 × 175 MW Francis turbines, 2,400m RCC dam on Kaduna River. $1.3bn cost, 75% financed by China Exim Bank preferential buyer's credit ($984m at 2.5%, 20-year maturity). Construction 2013, fully commissioned 2023. Meets ~10% of Nigeria's domestic energy demand. Strategically important Chinese-built asset. Note: same Shiroro region saw major Chinese-worker kidnap attacks in Jan 2022 (Zunguru dam incident NG-NI-2022-002) and June 2022 (Ajata Aboki mining).","notes_zh":"尼日利亚第二大水电站（仅次于凯恩基水电站）。装机4台175兆瓦弗朗西斯水轮机，于卡杜纳河建2,400米碾压混凝土坝。总投资13亿美元，其中中国进出口银行优惠买方信贷融资75%（9.84亿美元，利率2.5%，期限20年）。2013年动工，2023年全面投产，供应尼日利亚约10%的国内电力需求。战略级中资资产。同在希罗罗地区，2022年1月宗古鲁坝事件（NG-NI-2022-002）及6月Ajata Aboki采矿袭击事件中均有中国工人遭绑架。","year":"2023","sectors":["Construction"]},{"id":"P-LEKKI-FZ","name":"Lekki Free Zone (CCECC / Lagos FZ)","name_zh":"莱基自由贸易区","category":"industrial_zone","operator":"Lekki Free Zone Development Company (Chinese consortium + Lagos State)","operator_zh":"莱基自贸区开发公司（中资联营体 + 拉各斯州）","chinese_involved":true,"status":"operational","status_zh":"运营中","state":"Lagos","lga":"Ibeju-Lekki","lat":6.42,"lng":3.95,"notes":"One of two Chinese-anchored free trade zones in Nigeria. Anchor tenant is CCECC. Hosts light industry and logistics firms. Co-located with Lekki Deep Sea Port and Dangote Refinery. Part of the broader Lagos Free Zone cluster. Concentration of Chinese and Indian expatriate workforce.","notes_zh":"尼日利亚两个中资主导的自由贸易区之一，中土集团为核心入驻企业。园区以轻工业和物流企业为主。与莱基深水港和丹格特炼油厂毗邻，属于大莱基自贸区群的一部分。集中了大量中国与印度籍外派员工。","year":"ongoing","sectors":["Logistics","Construction"]},{"id":"P-OGUN-GUANGDONG","name":"Ogun-Guangdong Free Trade Zone","name_zh":"奥贡—广东自由贸易区","category":"industrial_zone","operator":"China Africa Investment Company (CAIC, 82%) + Ogun State (18%)","operator_zh":"中非投资公司（CAIC，82%）+ 奥贡州政府（18%）","chinese_involved":true,"status":"operational","status_zh":"运营中","state":"Ogun","lga":"Ado-Odo/Ota (Igbesa)","lat":6.55,"lng":3.15,"notes":"Established 2008 as joint venture following 2006 China-Africa Summit. 10,000 hectares at Igbesa, 50km from Lagos. 82% Chinese ownership (Guangdong Xinguang Intl / CCNC Group / CAIC), 18% Ogun State. Zone houses light industry (furniture, ceramics, paper/packaging), steel, construction materials. Managed by CAIC. 100-year concession. Employs thousands; training programmes for ~30,000. One of Africa's flagship Chinese industrial zones.","notes_zh":"2008年依据2006年中非合作论坛设立的合资自贸区，位于奥贡州伊格贝萨，距拉各斯50公里，占地10,000公顷。中资（广东新广国际、中非投资公司等）持股82%，奥贡州政府18%。园区以家具、陶瓷、纸业包装、钢铁、建材等轻工业为主，由中非投资公司（CAIC）运营管理，特许经营期为100年。已雇佣数千人，为约3万人提供培训，是非洲最具代表性的中国工业园之一。","year":"2008","sectors":["Construction","Logistics"]},{"id":"P-MINING-OSUN","name":"Osun gold-mining cluster (Chinese informal)","name_zh":"奥孙州金矿群（中资非正规矿点）","category":"mining_cluster","operator":"Chinese-operated informal miners and clearing-house companies","operator_zh":"中资非正规矿商及清关代理公司","chinese_involved":true,"status":"operational_disputed","status_zh":"活跃（合法性存疑）","state":"Osun","lga":"Atakumosa West / Ilesa / Atorin-Ijesha zone","lat":7.55,"lng":4.8,"notes":"Cluster of Chinese-operated informal gold mines in Osun State, largely displaced from Zamfara after the April 2019 federal mining ban. Multiple Chinese kidnap incidents on record (NG-OS-2021-001, NG-OS-2021-002). Ongoing environmental and regulatory concerns (Osun River mercury pollution). Traditional ruler of Atorin-Ijesha publicly stated his people are being 'conquered' by Chinese miners.","notes_zh":"奥孙州中资非正规金矿群，其人员多自2019年4月联邦采矿禁令后从扎姆法拉州转移至此。已记录多起中国公民遭绑架事件（如NG-OS-2021-001、NG-OS-2021-002）。该区域面临持续的环境及监管问题（如奥孙河汞污染）。Atorin-Ijesha传统首领曾公开表示其社区正被中资矿商'占领'。","year":"ongoing","sectors":["Mining"]},{"id":"P-MINING-ZAMFARA","name":"Zamfara gold-mining cluster (Chinese informal, bandit-taxed)","name_zh":"扎姆法拉州金矿群（中资非正规矿点，受匪徒征税）","category":"mining_cluster","operator":"Chinese informal miners; reported 'rent' payments to armed militant groups","operator_zh":"中资非正规矿商；据报向武装匪徒团伙支付'租金'","chinese_involved":true,"status":"operational_disputed","status_zh":"活跃（高度危险）","state":"Zamfara","lga":"Anka / Maru / Bukkuyum","lat":12.1,"lng":6.0,"notes":"SBM Intelligence and Times of London documented videos of militant leaders boasting that Chinese miners pay them 'rent' to operate. Chinese nationals arrested for illegal mining in Bukkuyum (April 2020). Zamfara is the epicentre of Nigeria's banditry crisis (1,203 kidnappings July 2024-June 2025 per SBM). Gobirawa Chali village massacre April 2025 (21 killed, NG-ZM-2025-002). Chinese operating presence means Chinese exposure despite state-level governance collapse.","notes_zh":"SBM Intelligence与英国《泰晤士报》均记录有视频显示武装匪徒头目炫耀中国矿商需向其支付'租金'以维持作业。2020年4月布库尤姆有中国公民因非法采矿被捕。扎姆法拉是尼日利亚匪患最严重的州（据SBM数据，2024年7月至2025年6月共发生1,203起绑架）。2025年4月Gobirawa Chali村遭屠杀（21人遇难，事件NG-ZM-2025-002）。即便州级治理已近崩溃，中方人员仍在实地运营，因而暴露于高风险之中。","year":"ongoing","sectors":["Mining"]},{"id":"P-MINING-NIGER","name":"Niger State mining cluster (lithium/gold)","name_zh":"尼日尔州矿业群（锂矿/金矿）","category":"mining_cluster","operator":"Chinese operators + Nigerian partners","operator_zh":"中资矿商 + 尼日利亚合作方","chinese_involved":true,"status":"operational_contested","status_zh":"活跃（局势紧张）","state":"Niger","lga":"Shiroro / Munya / Rafi","lat":9.98,"lng":6.83,"notes":"Shiroro LGA saw 3 major Chinese-nationals kidnap incidents since 2022 (NG-NI-2022-001 Ajata Aboki June 2022, NG-NI-2022-002 Zunguru dam Jan 2022, NG-NI-2023-001 Dogo Gide protection-payment reports). Chinese miners documented paying Dogo Gide faction for access. Niger State is now the single highest-risk state for Chinese mining personnel.","notes_zh":"希罗罗LGA自2022年以来已发生3起重大中国公民遭绑架事件（NG-NI-2022-001 Ajata Aboki 2022年6月、NG-NI-2022-002 宗古鲁坝 2022年1月、NG-NI-2023-001 Dogo Gide'保护费'事件）。有记录显示中国矿工向Dogo Gide派系支付以获取通行权。尼日尔州目前是中国矿业人员面临风险最高的单一州。","year":"ongoing","sectors":["Mining"]},{"id":"P-MINING-KOGI","name":"Kogi State mining cluster (gold/lithium)","name_zh":"科吉州矿业群（金/锂）","category":"mining_cluster","operator":"Chinese operators (formal and informal)","operator_zh":"中资运营商（正规与非正规）","chinese_involved":true,"status":"operational","status_zh":"活跃","state":"Kogi","lga":"Yagba West / Ijumu / Lokoja belt","lat":8.0,"lng":5.75,"notes":"Chinese mining presence confirmed by October 2025 rescue of 4 Chinese miners after 7-day kidnap (NG-KG-2025-001, Yagba West). Part of the growing lithium extraction footprint linked to EV battery supply chains.","notes_zh":"该区域中方采矿存在，经2025年10月（NG-KG-2025-001，Yagba West）对4名遭绑7天的中国矿工的营救行动确认。该区锂矿开采与电动车电池供应链紧密相关，规模持续扩大。","year":"ongoing","sectors":["Mining"]},{"id":"P-MINING-KWARA","name":"Kwara mining cluster (granite/lepidolite)","name_zh":"夸拉州矿业群（花岗岩/锂辉石）","category":"mining_cluster","operator":"Chinese operators — W Mining Global Service and others","operator_zh":"中资运营商——W Mining Global Service等","chinese_involved":true,"status":"operational_contested","status_zh":"活跃（监管压力）","state":"Kwara","lga":"Moro / Edu / Kaiama / Ilorin belt","lat":8.6,"lng":4.2,"notes":"Kwara hosts significant Chinese granite and lithium (lepidolite) mining. EFCC arrested 13 Chinese W Mining Global Service workers July 2023 for illegal mining (NG-KW-2023-002). Kwara also hosts BUA Cement operations (site of NG-KW-2025-001 Dec 2025 Chinese kidnap) and Sam Xie Wie mining kidnap (NG-KW-2025-002 Jun 2025, N1bn demand).","notes_zh":"夸拉州拥有规模可观的中资花岗岩及锂辉石矿业。2023年7月，经济与金融犯罪委员会（EFCC）以非法采矿为由逮捕W Mining Global Service的13名中国员工（NG-KW-2023-002）。此外，州内有BUA水泥厂（2025年12月中国公民绑架事件NG-KW-2025-001发生地）以及2025年6月的Sam Xie Wie矿业绑架案（NG-KW-2025-002，赎金要求10亿奈拉）。","year":"ongoing","sectors":["Mining","Construction"]},{"id":"P-DANGOTE-REF","name":"Dangote Refinery","name_zh":"丹格特炼油厂","category":"commercial_site","operator":"Dangote Group","operator_zh":"丹格特集团","chinese_involved":false,"status":"operational","status_zh":"运营中","state":"Lagos","lga":"Ibeju-Lekki","lat":6.43,"lng":3.98,"notes":"Africa's largest single-train refinery. 650,000 bpd capacity, $19-20bn investment. Began diesel/aviation fuel production January 2024, petrol September 2024. Subject to attempted attack April 2025 (NG-LA-2025-001). Employs substantial Indian expatriate technical workforce. Dangote publicly accused 'oil mafia' of ongoing sabotage attempts.","notes_zh":"非洲规模最大的单系列炼油厂，产能65万桶/日，总投资190–200亿美元。2024年1月开始生产柴油与航空燃油，2024年9月开始生产汽油。2025年4月曾发生未遂袭击事件（NG-LA-2025-001）。大量印度籍技术外派员工在此工作。丹格特本人曾公开指责'石油黑帮'持续实施蓄意破坏。","year":"2024","sectors":["Multi-sector"]},{"id":"P-BUA-OKPELLA","name":"BUA Cement — Okpella plant","name_zh":"BUA水泥——Okpella厂","category":"commercial_site","operator":"BUA Group (with Chinese technical staff on site)","operator_zh":"BUA集团（厂区有中方技术人员驻场）","chinese_involved":true,"status":"operational_attacked","status_zh":"运营中（曾遭袭）","state":"Edo","lga":"Etsako East","lat":7.25,"lng":6.43,"notes":"Site of the 5 September 2025 flagship attack (NG-ED-2025-001) — 8 NSCDC personnel + 1 civilian killed, 1 Chinese national abducted (94-day captivity). Same LGA where Dangote Cement staff bus was ambushed 13 May 2024 (NG-ED-2024-001). Okpella cement corridor now established as a high-structural-risk zone.","notes_zh":"2025年9月5日旗舰级袭击事件发生地（NG-ED-2025-001）——8名民防部队（NSCDC）人员与1名平民遇害，1名中国公民遭绑架（被扣押94天）。同一LGA在2024年5月13日发生丹格特水泥厂员工大巴遇袭事件（NG-ED-2024-001）。Okpella水泥走廊现已被确认为结构性高风险区域。","year":"ongoing","sectors":["Construction"]},{"id":"P-OKOMU-OIL","name":"Okomu Oil Palm Company","name_zh":"Okomu油棕公司","category":"commercial_site","operator":"Okomu Oil Palm Plc (Socfin-majority, Dutch MD)","operator_zh":"Okomu油棕公司（Socfin控股，荷兰籍总经理）","chinese_involved":false,"status":"operational_attacked","status_zh":"运营中（遭持续袭击）","state":"Edo","lga":"Ovia South-West","lat":6.35,"lng":5.35,"notes":"Ijaw Freedom Fighters attacks May 2024 (NG-ED-2024-002) — 4 workers killed in escalating series, company publicly threatened shutdown. Template for how commercial-operations disputes escalate into political conflict in Edo.","notes_zh":"2024年5月遭'伊贾部落自由战士'（Ijaw Freedom Fighters）连续袭击（NG-ED-2024-002），4名员工遇难，公司公开威胁停运。该事件是商业运营纠纷在埃多州升级为政治冲突的典型案例。","year":"ongoing","sectors":["Multi-sector"]},{"id":"P-FOUANI-LAGOS","name":"Fouani Nigeria HQ (LG / Hisense / Huawei distributor)","name_zh":"Fouani尼日利亚总部（LG/海信/华为分销商）","category":"commercial_site","operator":"Fouani Nigeria Limited (Lebanese-owned)","operator_zh":"Fouani尼日利亚有限公司（黎巴嫩家族企业）","chinese_involved":true,"status":"operational_attacked","status_zh":"运营中（曾遭袭击）","state":"Lagos","lga":"Lagos Island","lat":6.44,"lng":3.42,"notes":"Leading Lebanese-owned distributor of Chinese consumer electronics (LG, Hisense, Huawei). MD Muhammed Fouani + 3 other executives kidnapped 14 June 2024 near Falomo Bridge on Apapa-Victoria Island waterway (NG-LA-2024-001). $1.5m USD ransom demand. Major datapoint for Chinese-brand commercial partner exposure.","notes_zh":"黎巴嫩家族拥有的中国消费电子产品主力分销商（代理LG、海信、华为）。总经理Muhammed Fouani及另外3名高管于2024年6月14日在Falomo桥附近的阿帕帕—维多利亚岛水道遭绑架（NG-LA-2024-001），绑匪索要150万美元赎金。此案是中国品牌在尼日利亚商业合作方面临风险的重要数据点。","year":"2024","sectors":["Logistics"]},{"id":"P-NLNG-BONNY","name":"Nigeria LNG — Bonny Island","name_zh":"尼日利亚液化天然气公司（NLNG）——Bonny岛","category":"oil_infra","operator":"NLNG (NNPC/Shell/Total/Eni joint venture)","operator_zh":"NLNG（尼日利亚国油/壳牌/道达尔/埃尼合资）","chinese_involved":false,"status":"operational","status_zh":"运营中","state":"Rivers","lga":"Bonny","lat":4.44,"lng":7.17,"notes":"Nigeria's flagship LNG export facility. 22.5 mtpa capacity. Niger Delta security environment deteriorated 2025 with MEND/LAND revival under Rivers State emergency (NG-RV-2025-001). Relevant to Chinese shipping clients loading LNG cargoes.","notes_zh":"尼日利亚旗舰级液化天然气出口设施，产能2,250万吨/年。2025年尼日尔三角洲安全形势因MEND/LAND组织在河流州紧急状态期间卷土重来而恶化（NG-RV-2025-001）。与装运该地液化天然气货物的中国航运客户存在直接关联。","year":"1999","sectors":["Multi-sector"]},{"id":"P-SHELL-PORT-HARCOURT","name":"Shell Nigeria operations — Port Harcourt","name_zh":"壳牌尼日利亚——哈科特港运营区","category":"oil_infra","operator":"Shell (SPDC; onshore stake sold to Renaissance 2024)","operator_zh":"壳牌（SPDC；2024年将陆上股权出售予Renaissance联营体）","chinese_involved":false,"status":"operational","status_zh":"运营中","state":"Rivers","lga":"Port Harcourt metro","lat":4.82,"lng":7.05,"notes":"Historic Niger Delta oil anchor. Shell onshore operations divested 2024 to Renaissance consortium. Persistent pipeline attacks through 2025 linked to MEND/LAND militancy. Chinese equity exposure via CNOOC historical interests.","notes_zh":"尼日尔三角洲历史核心油气锚点。壳牌已于2024年将陆上业务出售给Renaissance联营体。2025年管道袭击频发，与MEND/LAND武装组织活动相关。中资通过中海油历史持股存在间接敞口。","year":"1957","sectors":["Multi-sector"]},{"id":"P-CNPC-AGADEM","name":"CNPC Agadem oil field (cross-border context)","name_zh":"中石油阿加德姆油田（跨境背景）","category":"oil_infra","operator":"China National Petroleum Corporation (CNPC)","operator_zh":"中国石油天然气集团（CNPC）","chinese_involved":true,"status":"operational_attacked","status_zh":"运营中（遭袭）","state":"Multi-state","lga":"Agadez region, Niger Republic","lat":13.5,"lng":12.0,"notes":"Across Nigerian border in Niger Republic. Site of February 2025 ISIS Sahel attack: 2 CNPC Chinese kidnapped, 2 Nigerien guards killed. Connected to Niger-Benin pipeline. Cross-border context for Chinese clients operating in Sokoto/Kebbi with ISIS Sahel spillover risk.","notes_zh":"位于尼日利亚边境对岸的尼日尔共和国境内。2025年2月伊斯兰国（ISIS）萨赫勒分支袭击事件发生地：2名中石油籍中国公民遭绑架，2名尼日尔警卫遇害。该油田与尼—贝宁输油管道相连。对在索科托州、凯比州开展业务的中国客户而言，是ISIS萨赫勒分支跨境外溢风险的重要参考。","year":"2011","sectors":["Multi-sector"]}]

function t(key) {
  return (I18N[CUR_LANG] && I18N[CUR_LANG][key] !== undefined) ? I18N[CUR_LANG][key] : key;
}

function tCategory(cat) {
  const key = CATEGORY_MAP[cat];
  return key ? t(key) : cat;
}

// Return the language-appropriate value for a record field.
// Falls back to the English field when no _zh version exists.
function tField(record, fieldName) {
  if (CUR_LANG === 'zh') {
    const zhField = fieldName + '_zh';
    if (record[zhField]) return record[zhField];
  }
  return record[fieldName] || '';
}

function applyI18n() {

// DATA

// Ring 1 (Chinese direct) gets a slightly thicker outline rather than a size bump,
// so it reads as emphasised without distorting the visual semantics of the dot itself.
const RING_RADIUS = {1: 7, 3: 7, 4: 7, 5: 7, 6: 7};
const RING_OUTLINE_WEIGHT = {1: 2.2, 3: 1.5, 4: 1.5, 5: 1.5, 6: 1.5};

  d._chinese = typeof d.chinese_nationals_affected === 'string' &&
               d.chinese_nationals_affected.toLowerCase().startsWith('yes');

  showProjects: false,

function filtered() {
  return DATA.filter(d => {
    if (!state.rings.has(d.salience_ring)) return false;
    if (state.sector !== 'all' && d.sector_relevance !== state.sector) return false;
    if (state.categories.size > 0 && !state.categories.has(d.category_t1)) return false;
    if (d.date < state.dateFrom || d.date > state.dateTo) return false;

// MAP — dark tile layer matching Xuyou palette
let map = null;
let markerLayer = null;

function initMap() {
  if (typeof L === 'undefined') return false;
  try {
    map = L.map('map', {zoomControl: true, attributionControl: true}).setView([9.5, 7.8], 6);

    // Carto Voyager (no labels) — mid-tone neutral base, professional
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap · © CARTO',
      subdomains: 'abcd', maxZoom: 18
    }).addTo(map);

    // Dedicated pane for the state choropleth — placed BELOW the marker pane so that
    // clicks on incident markers reach the marker, not the underlying state polygon.
    // Default Leaflet panes: tilePane=200, overlayPane=400, markerPane=600, popupPane=700.
    // We want the state choropleth to render above tiles (so it tints the basemap) but
    // below markers, so clicks/hovers on incident dots fire incident handlers — not state ones.
    map.createPane('chorPane');
    map.getPane('chorPane').style.zIndex = 350;
    // Click events on the choropleth should still fire (so hover tooltips / state-zoom work
    // when the user clicks on EMPTY parts of a state) — but markers, sitting in the higher
    // markerPane, will receive their clicks first.

    // Labels overlay — Voyager labels
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png', {
      attribution: '', subdomains: 'abcd', maxZoom: 18, pane: 'markerPane'
    }).addTo(map);

    markerLayer = L.layerGroup().addTo(map);

    // Load Nigerian state boundaries from embedded JSON block
    try {
      const gj = document.getElementById('states-geojson');
      if (gj && gj.textContent.trim()) {
        STATES_GEOJSON = JSON.parse(gj.textContent);
        initChoropleth();
      }
    } catch (err) {
      console.warn('Could not load state boundaries for choropleth:', err);
    }

    // Initialise projects layer (data already loaded into PROJECTS array above)
    try {
      initProjectsLayer();
    } catch (err) {
      console.warn('Could not init projects layer:', err);
    }

    document.getElementById('mapLoading').classList.add('hidden');
    return true;
  } catch (e) {
    return false;
  }
}

function renderMarkers() {
  if (!map || !markerLayer) return;
  markerLayer.clearLayers();
  if (!state.showMarkers) return;
  const list = filtered();
  list.forEach(d => {
    if (!d.lat || !d.lng) return;
    const r = RING_RADIUS[d.salience_ring] || 7;
    const m = L.circleMarker([d.lat, d.lng], {
      radius: r,
      fillColor: RING_COLOURS[d.salience_ring] || '#888',
      color: '#FFFFFF',
      weight: RING_OUTLINE_WEIGHT[d.salience_ring] || 1.5,
      opacity: 0.95,
      fillOpacity: RING_OPACITY[d.salience_ring] || 0.7
    });

    const shortTitle = (tField(d, 'category_t2') || d.category_t1 || '').substring(0, 80);
    const popupHtml =
      '<div class="pop-date">' + d.date + ' · ' + d.incident_id + '</div>' +
      '<div class="pop-category">' + escapeHtml(tCategory(d.category_t1)) + '</div>' +
      '<div class="pop-title">' + escapeHtml(shortTitle) + '</div>' +
      '<div class="pop-loc">' + escapeHtml(d.lga || '') + (d.lga ? ', ' : '') + escapeHtml(d.state) + '</div>' +
      '<div class="pop-action" data-id="' + d.incident_id + '">' + t('pop_action') + '</div>';

    m.bindPopup(popupHtml, {maxWidth: 280, closeButton: false});
    // Click is handled via document-level event delegation (see initMap end).
    // We don't bind onclick in popupopen because that handler is fragile and
    // can be missed if the popup re-renders or DOM is rebuilt.
    m.on('click', () => m.openPopup());
    markerLayer.addLayer(m);
  });
}

function getStateInsight(stateName, s) {

  // Generic fallback — composite-driven analytical line, varies by signal mix
  if (!s || s.score <= 0) return null;

  if (direct > bg * 2 && s.chinese > 0) {
    return CUR_LANG === 'zh'
      ? "评分主要由中方直接事件驱动 — 历史敞口集中于此州。"
      : "Score is driven mainly by direct Chinese-touching incidents — historical exposure has concentrated in this state.";
  }

// Weighted scoring: ring weight × tier boost × fatality multiplier
const RING_WEIGHT = {1: 10, 3: 7, 4: 4, 5: 2, 6: 0.5};

function incidentScore(d) {
  let base = RING_WEIGHT[d.salience_ring] || 0;
  if (d.record_tier === 'Flagship') base *= 2;
  const fat = parseInt(d.fatalities) || 0;
  const fatMultiplier = Math.min(1 + (fat / 5), 2);
  return base * fatMultiplier;
}

// BACKGROUND THREAT DATA — state-level civilian violence 2020-2025
// Source: Council on Foreign Relations Nigeria Security Tracker (NST) 2020–Jun 2023 deaths & kidnappings,
// overlaid with SBM Intelligence "Locust Business" report kidnap numbers Jul 2024 – Jun 2025.
// Loaded from embedded JSON block at runtime.
let BG_THREAT = {};
try {
  const bgEl = document.getElementById('background-threat');
  if (bgEl && bgEl.textContent.trim()) {
    BG_THREAT = JSON.parse(bgEl.textContent);
  }
} catch (e) { console.warn('Could not load background threat data:', e); }

// States containing Chinese projects (computed from PROJECTS once at load)
let CHINESE_FOOTPRINT_STATES = new Set();

function populateFootprintStates() {
  CHINESE_FOOTPRINT_STATES = new Set();
  (PROJECTS || []).forEach(p => {
    if (p.chinese_involved && p.state) {
      const st = canonicalState(p.state);
      if (st) CHINESE_FOOTPRINT_STATES.add(st);
    }
  });
}

// Background-threat score: log-scaled composite of deaths + kidnappings
function backgroundScore(state) {
  const d = BG_THREAT[state];
  if (!d) return 0;
  // Deaths weighted higher (more severe threat environment); kidnap at 0.5 weight
  const raw = (d.nst_deaths || 0) + (d.composite_kidnap || 0) * 0.5;
  if (raw <= 0) return 0;
  // Log10 scaling so Borno (8,347) doesn't dominate and Plateau (1,066) still registers
  return Math.max(0, Math.log10(raw + 10) * 10 - 10);
}

// Compute composite score and breakdown per state from the currently-filtered incidents
function computeStateScores() {
  const scores = {};
  const list = filtered();

  // First pass — direct Chinese-operator exposure from filtered incidents
  list.forEach(d => {
    const canonical = canonicalState(d.state);
    if (!canonical) return;
    if (!scores[canonical]) {
      scores[canonical] = {
        score: 0, direct: 0, bg: 0,
        count: 0, chinese: 0, foreign: 0,
        fatalities: 0, kidnapped: 0, incidents: [],
        bg_deaths: 0, bg_kidnap: 0,
        has_footprint: false
      };
    }
    const s = scores[canonical];
    s.direct += incidentScore(d);
    s.count += 1;
    if (d._chinese) s.chinese += 1;
    else if (d._foreign) s.foreign += 1;
    s.fatalities += parseInt(d.fatalities) || 0;
    const k = parseInt(d.kidnapped);
    if (!isNaN(k)) s.kidnapped += k;
    s.incidents.push(d);
  });

  // Second pass — ensure every state with BG data is in scores, even if zero direct incidents
  Object.keys(BG_THREAT).forEach(st => {
    if (!scores[st]) {
      scores[st] = {
        score: 0, direct: 0, bg: 0,
        count: 0, chinese: 0, foreign: 0,
        fatalities: 0, kidnapped: 0, incidents: [],
        bg_deaths: 0, bg_kidnap: 0,
        has_footprint: false
      };
    }
  });

  // Third pass — layer in background threat + footprint multiplier, produce composite score
  Object.entries(scores).forEach(([st, s]) => {
    s.bg = backgroundScore(st);
    const bgData = BG_THREAT[st] || {};
    s.bg_deaths = bgData.nst_deaths || 0;
    s.bg_kidnap = bgData.composite_kidnap || 0;
    s.has_footprint = CHINESE_FOOTPRINT_STATES.has(st);
    const footprintMult = s.has_footprint ? 1.2 : 1.0;
    // Composite = direct + (background × 0.8), × footprint multiplier
    s.score = (s.direct + s.bg * 0.8) * footprintMult;
  });

  return scores;
}

// Colour ramp: pale amber → deep red; grey for sparse data
const CHORO_SPARSE_FILL = '#2A3A4C';
// Single-hue cool intensity scale — pale steel-blue → deepest navy.
// This reserves the entire red/amber spectrum for incident markers, removing the
// hue clash where Chinese-direct (red) markers sat on top of high-risk (red) states.
const CHORO_BANDS = [
  '#9FB4CC',  // 0 — LOWER (pale steel)
  '#7595B5',  // 1
  '#4F759C',  // 2 — ELEVATED
  '#2E5784',  // 3 — HIGH
  '#143B6B'   // 4 — SEVERE (deepest navy)
];
// Sparse threshold: state is considered "insufficient signal" only when BOTH direct incidents
// AND background threat are absent — i.e. a truly low-signal state. Under the composite model,
// a state like Borno with zero direct Chinese incidents but 8,347 background deaths will still
// render in the proper band (driven by background score), not grey.
function isSparse(s) {
  if (!s) return true;
  return s.score <= 0.1 && s.count === 0;
}

// Compute quantile breakpoints from non-sparse composite scores
function computeQuantileBreaks(scores) {
  const values = Object.values(scores)
    .filter(s => !isSparse(s))
    .map(s => s.score)
    .sort((a, b) => a - b);
  if (values.length === 0) return [0, 0, 0, 0];
  const q = [0.2, 0.4, 0.6, 0.8].map(p => {
    const idx = Math.floor(p * values.length);
    return values[Math.min(idx, values.length - 1)];
  });
  return q;
}

function bandForScore(score, breaks) {
  for (let i = 0; i < breaks.length; i++) {
    if (score <= breaks[i]) return i;
  }
  return breaks.length;
}

function stateStyleFn(scores, breaks) {
  return (feature) => {
    const name = feature.properties.name;
    const s = scores[name];
    if (isSparse(s)) {
      return {
        fillColor: CHORO_SPARSE_FILL,
        fillOpacity: 0.55,
        color: '#5A7090',
        weight: 0.6,
        opacity: 0.8
      };
    }
    const band = bandForScore(s.score, breaks);
    return {
      fillColor: CHORO_BANDS[band],
      fillOpacity: 0.55,
      color: '#ffffff',
      weight: 0.6,
      opacity: 0.7
    };
  };
}

function initChoropleth() {
  if (!map || !STATES_GEOJSON) return;
  stateLayer = L.geoJSON(STATES_GEOJSON, {
    pane: 'chorPane',  // Render below markerPane so incident clicks reach incident markers
    style: () => ({
      fillColor: CHORO_SPARSE_FILL,
      fillOpacity: 0.4,
      color: '#5A7090',
      weight: 0.6,
      opacity: 0.6
    }),
    onEachFeature: (feature, layer) => {
      layer.on({
        mouseover: (e) => {
          const l = e.target;
          l.setStyle({ weight: 2, color: '#F4A300', opacity: 1, fillOpacity: 0.75 });
          l.bringToFront();
          showStateTooltip(e, feature);
        },
        mousemove: (e) => moveStateTooltip(e),
        mouseout: (e) => {
          // Reapply the CURRENT dynamic choropleth style, not the initial sparse fill.
          // stateLayer.resetStyle() reverts to the original style function, which produces
          // grey — so the state gets stuck grey after hover. Use the cached style fn instead.
          if (stateLayer && stateLayer._currentStyleFn) {
            e.target.setStyle(stateLayer._currentStyleFn(feature));
          } else if (stateLayer) {
            stateLayer.resetStyle(e.target);
          }
          hideStateTooltip();
        },
        click: (e) => {
          map.fitBounds(e.target.getBounds(), {padding: [40, 40], maxZoom: 8});
        }
      });
    }
  });
  // Put choropleth below markers; use overlayPane (default for L.geoJSON) which is below markerPane
  if (state.showChoropleth) stateLayer.addTo(map);
}

function renderChoropleth() {
  if (!stateLayer) return;
  if (!state.showChoropleth) {
    if (map.hasLayer(stateLayer)) map.removeLayer(stateLayer);
    if (window._updateLegendVisibility) window._updateLegendVisibility();
    return;
  }
  if (!map.hasLayer(stateLayer)) stateLayer.addTo(map);
  if (window._updateLegendVisibility) window._updateLegendVisibility();
  const scores = computeStateScores();
  const breaks = computeQuantileBreaks(scores);
  const styleFn = stateStyleFn(scores, breaks);
  stateLayer.setStyle(styleFn);
  // Cache latest scores + style fn so tooltip and mouseout can reuse them
  stateLayer._latestScores = scores;
  stateLayer._latestBreaks = breaks;
  stateLayer._currentStyleFn = styleFn;
}

// STATE TOOLTIP
function showStateTooltip(e, feature) {
  const tt = document.getElementById('stateTooltip');
  const scores = (stateLayer && stateLayer._latestScores) || {};
  const name = feature.properties.name;
  const nameZh = feature.properties.name_zh;
  const s = scores[name];
  const sparse = isSparse(s);
  const breaks = (stateLayer && stateLayer._latestBreaks) || [];
  const displayName = (CUR_LANG === 'zh' && nameZh) ? nameZh : name;

  let bandLabel;
  if (sparse) bandLabel = t('sp_band_insufficient');
  else {
    const band = bandForScore(s.score, breaks);
    bandLabel = [t('sp_band_lower'), t('sp_band_low'), t('sp_band_mid'), t('sp_band_high'), t('sp_band_severe')][band];
  }

  let html = '<div class="st-name">' + escapeHtml(displayName);
  if (s && s.has_footprint) {
    html += '<span class="st-footprint-flag" title="' + escapeHtml(t('sp_footprint_tip')) + '">' + escapeHtml(t('sp_footprint')) + '</span>';
  }
  html += '</div>';

  if (sparse) {
    html += '<div class="st-score sparse">' + escapeHtml(bandLabel) + '</div>';
    html += '<div class="st-breakdown">0 ' + t('sp_breakdown_incidents') + '</div>' +
      '<div class="st-note">' + t('sp_sparse_msg_v2') + '</div>';
  } else {
    html += '<div class="st-score">' + escapeHtml(bandLabel) + ' · ' +
      t('sp_score_label') + ' ' + Math.round(s.score) + '</div>';

    // Composite score breakdown — show the three components
    html += '<div class="st-composite">';
    html += '<div class="st-comp-row"><span class="st-comp-lbl">' + t('sp_comp_direct') + '</span>' +
      '<span class="st-comp-val">' + Math.round(s.direct) + '</span></div>';
    html += '<div class="st-comp-row"><span class="st-comp-lbl">' + t('sp_comp_bg') + '</span>' +
      '<span class="st-comp-val">' + Math.round(s.bg * 0.8) + '</span></div>';
    if (s.has_footprint) {
      html += '<div class="st-comp-row footprint"><span class="st-comp-lbl">' + t('sp_comp_footprint') + '</span>' +
        '<span class="st-comp-val">×1.2</span></div>';
    }
    html += '</div>';

    // Direct incident breakdown (no header — hairline is enough visual separation)
    html += '<div class="st-section-rule"></div>';
    if (s.count > 0) {
      html += '<div class="st-breakdown">' +
        '<strong>' + s.count + '</strong> ' + t('sp_breakdown_incidents') + '<br>' +
        (s.chinese > 0 ? '<strong>' + s.chinese + '</strong> ' + t('sp_breakdown_chinese') + '<br>' : '') +
        (s.foreign > 0 ? '<strong>' + s.foreign + '</strong> ' + t('sp_breakdown_foreign') + '<br>' : '') +
        (s.fatalities > 0 ? '<strong>' + s.fatalities + '</strong> ' + t('sp_breakdown_fatalities') + '<br>' : '') +
        (s.kidnapped > 0 ? '<strong>' + s.kidnapped + '</strong> ' + t('sp_breakdown_kidnapped') : '') +
      '</div>';
    } else {
      html += '<div class="st-breakdown st-no-direct">' + t('sp_no_direct') + '</div>';
    }

    // Background threat breakdown
    if (s.bg_deaths > 0 || s.bg_kidnap > 0) {
      html += '<div class="st-section-rule"></div>';
      html += '<div class="st-breakdown">';
      if (s.bg_deaths > 0) html += '<strong>' + s.bg_deaths.toLocaleString() + '</strong> ' + t('sp_bg_deaths') + '<br>';
      if (s.bg_kidnap > 0) html += '<strong>' + s.bg_kidnap.toLocaleString() + '</strong> ' + t('sp_bg_kidnap');
      html += '</div>';
    }

    // Italic analytical closing line — bespoke for top-tier states, generic otherwise
    const insight = getStateInsight(name, s);
    if (insight) {
      html += '<div class="st-insight">' + escapeHtml(insight) + '</div>';
    }
  }

  tt.innerHTML = html;
  tt.classList.add('visible');
  moveStateTooltip(e);
}

function moveStateTooltip(e) {
  const tt = document.getElementById('stateTooltip');
  if (!tt.classList.contains('visible')) return;
  const mapRect = document.getElementById('map').getBoundingClientRect();
  const pt = e.originalEvent;
  const x = pt.clientX - mapRect.left;
  const y = pt.clientY - mapRect.top;
  // Position tooltip to right of cursor if room, else to left
  const ttW = tt.offsetWidth;
  const ttH = tt.offsetHeight;
  let left = x + 14;
  let top = y + 14;
  if (left + ttW > mapRect.width - 10) left = x - ttW - 14;
  if (top + ttH > mapRect.height - 10) top = y - ttH - 14;
  tt.style.left = left + 'px';
  tt.style.top = top + 'px';
}

function hideStateTooltip() {
  document.getElementById('stateTooltip').classList.remove('visible');
}

const PROJECT_CATEGORY_LABEL = {
  port: {en: 'Port', zh: '港口'},
  rail: {en: 'Rail', zh: '铁路'},
  power: {en: 'Power plant', zh: '发电站'},
  industrial_zone: {en: 'Industrial zone', zh: '工业园'},

  oil_infra: {en: 'Oil & gas', zh: '油气'},
  commercial_site: {en: 'Commercial site', zh: '商业点位'}
};

function tProjectCategory(cat) {
  const labels = PROJECT_CATEGORY_LABEL[cat];
  if (!labels) return cat;
  return CUR_LANG === 'zh' ? labels.zh : labels.en;
}

function initProjectsLayer() {
  if (!map || !PROJECTS.length) return;
  if (projectsLayer) {
    map.removeLayer(projectsLayer);
  }
  projectsLayer = L.layerGroup();

  PROJECTS.forEach(p => {
    if (typeof p.lat !== 'number' || typeof p.lng !== 'number') return;

    const icon = L.divIcon({
      className: '',
      html: '<span class="proj-marker cat-' + p.category +
            (p.chinese_involved ? '' : ' non-chinese') + '"></span>',
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });

    const m = L.marker([p.lat, p.lng], {icon: icon, zIndexOffset: 500});

    m.bindPopup(() => buildProjectPopupHtml(p), {
      maxWidth: 320,
      className: 'proj-popup-wrap',
      closeButton: true
    });

    projectsLayer.addLayer(m);
  });

  if (state.showProjects) projectsLayer.addTo(map);
}

function buildProjectPopupHtml(p) {
  const name = (CUR_LANG === 'zh' && p.name_zh) ? p.name_zh : p.name;
  const operator = (CUR_LANG === 'zh' && p.operator_zh) ? p.operator_zh : p.operator;
  const status = (CUR_LANG === 'zh' && p.status_zh) ? p.status_zh : p.status.replace('_', ' ');
  const notes = (CUR_LANG === 'zh' && p.notes_zh) ? p.notes_zh : p.notes;
  const flag = p.chinese_involved
    ? '<span class="pp-chinese-flag">' + (CUR_LANG === 'zh' ? '中资参与' : 'Chinese') + '</span>'
    : '';

  let html = '<div class="proj-popup">' +
    '<div class="pp-cat">' + escapeHtml(tProjectCategory(p.category)) + '</div>' +
    '<div class="pp-name">' + escapeHtml(name) + flag + '</div>';

  if (operator) {
    html += '<div class="pp-meta"><span class="lbl">' + t('pp_operator') + '</span> ' + escapeHtml(operator) + '</div>';
  }
  if (p.state || p.lga) {
    const loc = [p.lga, p.state].filter(Boolean).join(', ');
    html += '<div class="pp-meta"><span class="lbl">' + t('pp_location') + '</span> ' + escapeHtml(loc) + '</div>';
  }
  if (status) {
    html += '<div class="pp-meta"><span class="lbl">' + t('pp_status') + '</span> ' + escapeHtml(status) + '</div>';
  }
  if (p.year) {
    html += '<div class="pp-meta"><span class="lbl">' + t('pp_year') + '</span> ' + escapeHtml(String(p.year)) + '</div>';
  }
  if (notes) {
    html += '<div class="pp-notes">' + escapeHtml(notes) + '</div>';
  }
  html += '</div>';
  return html;
}

function renderProjectsLayer() {
  if (!projectsLayer) return;
  if (state.showProjects) {
    if (!map.hasLayer(projectsLayer)) projectsLayer.addTo(map);
  } else {
    if (map.hasLayer(projectsLayer)) map.removeLayer(projectsLayer);

}

// CATEGORY CHIPS
function renderCategoryChips() {
  const container = document.getElementById('categoryRow');
  if (!container) return;
  container.innerHTML = '';
  ALL_CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-chip' + (state.categories.has(cat) ? ' active' : '');
    btn.textContent = tCategory(cat);
    btn.dataset.category = cat;
    btn.onclick = () => {
      if (state.categories.has(cat)) state.categories.delete(cat);

      btn.classList.toggle('active');
      refresh();

    container.appendChild(btn);
  });

// LIST
function renderList() {
  const list = filtered().slice().sort((a,b) => b.date.localeCompare(a.date));
  document.getElementById('listCount').textContent = list.length;

  const html = list.map(d => {
    const chips = [];
    if (d.sector_relevance && d.sector_relevance !== 'None direct') {
      const sectorLabel = {Mining: t('sector_mining'), Logistics: t('sector_logistics'),
                           Construction: t('sector_construction'), 'Multi-sector': t('sector_multi')}[d.sector_relevance] || d.sector_relevance;
      chips.push('<span class="chip sector">' + escapeHtml(sectorLabel) + '</span>');

    else if (d._foreign) chips.push('<span class="chip foreign">' + t('foreign_suffix') + '</span>');

    if (d._captivity) chips.push('<span class="chip captive">' + d._captivity + t('captivity_suffix') + '</span>');

        '<span class="card-date">' + d.date + '</span>' +

  document.querySelectorAll('#view-list .incident-card').forEach(el => {

function renderPatternView() {
  const list = filtered();
  const byState = {};
  list.forEach(d => {
    if (!byState[d.state]) byState[d.state] = {count: 0, chinese: 0, killed: 0, kidnapped: 0};
    byState[d.state].count++;
    if (d._chinese) byState[d.state].chinese++;
    byState[d.state].killed += parseInt(d.fatalities) || 0;
    const k = parseInt(d.kidnapped);
    if (!isNaN(k)) byState[d.state].kidnapped += k;
  });

  const sorted = Object.entries(byState).sort((a,b) => b[1].count - a[1].count);
  const maxCount = sorted.length ? sorted[0][1].count : 1;

  const header =
    '<div style="padding:18px 24px 12px; border-bottom:1px solid var(--rule); background:var(--bg-panel);">' +
      '<div style="font-family:var(--serif); font-weight:500; font-size:13px; color:var(--text-primary); letter-spacing:-0.01em; margin-bottom:3px;">' + t('pattern_header_title') + '</div>' +
      '<div style="font-size:11px; color:var(--text-muted); line-height:1.55;">' + t('pattern_header_body') + '</div>' +
    '</div>';

  const rows = sorted.map(entry => {
    const stateName = entry[0];
    const s = entry[1];
    const pct = (s.count / maxCount) * 100;
    const chineseDot = s.chinese ? '<span style="color:var(--ring-1); font-weight:600;">' + s.chinese + ' ' + t('chinese_suffix') + '</span>' : '';
    return '<div class="pattern-group">' +
      '<h4>' + escapeHtml(stateName) + '</h4>' +
      '<div class="count-line">' + s.count + ' ' + t('incidents_suffix') + ' · ' + s.killed + ' ' + t('killed_suffix') + ' · ' + s.kidnapped + ' ' + t('kidnapped_suffix') + (chineseDot ? ' · ' + chineseDot : '') + '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
    '</div>';
  }).join('');

  document.getElementById('view-pattern').innerHTML = header + (rows ||
    '<div style="padding:24px; color:var(--text-muted); font-size:12px;">' + t('no_match') + '</div>');
}

function showDetail(incidentId) {
  console.log('[showDetail] called with', incidentId);
  const d = DATA.find(r => r.incident_id === incidentId);
  if (!d) {
    console.warn('[showDetail] incident not found:', incidentId);
    return;
  }
  console.log('[showDetail] record found, state.rightCollapsed =', state.rightCollapsed);

  state.activeIncident = incidentId;

  // Close any open Leaflet popup so its handlers don't block the detail rendering
  if (map) map.closePopup();

  // If the right panel is collapsed, expand it FIRST and defer rendering
  // until the next animation frame so the layout is settled before we paint.
  const wasCollapsed = state.rightCollapsed;
  if (wasCollapsed) {
    setCollapse('right', false);
  }

  const renderDetail = () => {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    const detailEl = document.getElementById('detail');
    if (!detailEl) {
      console.warn('showDetail: #detail element missing');
      return;
    }
    detailEl.classList.add('active');

    // Scroll the panel body to top so the detail is visible from the header
    const panelBody = document.querySelector('.panel-right .panel-body');
    if (panelBody) panelBody.scrollTop = 0;

    _renderDetailHtml(d, detailEl);
  };

  if (wasCollapsed) {
    // Wait one frame for the grid-template-columns transition to start, then render.
    requestAnimationFrame(() => requestAnimationFrame(renderDetail));
  } else {
    renderDetail();
  }
}

// Internal: build and inject the detail HTML for a given incident record.

  const ransom = d.ransom_reported_ngn ? '₦' + Number(d.ransom_reported_ngn).toLocaleString() : '—';
  const captivity = d._captivity !== null ? d._captivity + ' ' + t('days_suffix') : '—';

  const sources = [d.source_1, d.source_2, d.source_3].filter(x => x).map(x => '<span class="src-bullet">◆</span> ' + escapeHtml(x)).join('<br>');
  const actorConf = d.actor_confidence ? ' (' + (CUR_LANG === 'zh' ? '可信度' : 'confidence') + ' ' + d.actor_confidence + '/3)' : '';
  const sourceConf = d.source_confidence ? ' ' + d.source_confidence + '/3' : '';

  const tierText = d.record_tier === 'Flagship' ? (CUR_LANG === 'zh' ? '旗舰' : 'Flagship') :

      facts.map(f =>
        '<div class="fact">' +
          '<div class="fact-val ' + (f.accent ? 'accent' : '') + ' ' + (f.small ? 'small' : '') + '">' + escapeHtml(String(f.val)) + '</div>' +
          '<div class="fact-lbl">' + escapeHtml(f.lbl) + '</div>' +

      ).join('') +

      '<h3>' + t('detail_narrative') + '</h3>' +
      '<p>' + escapeHtml(tField(d, 'narrative') || '—') + '</p>' +
    '</div>' +
    '<div class="detail-section">' +
      '<h3>' + t('detail_classification') + '</h3>' +

        '<dt>' + t('detail_target') + '</dt><dd>' + escapeHtml(tField(d, 'target_profile') || '—') + '</dd>' +

  // Chinese projects / infrastructure in the same state — helps the reader

        const loc = p.lga || '';
        html += '<div class="detail-project-card">' +
          '<div class="dpc-header">' +
            '<span class="dpc-marker cat-' + escapeHtml(p.category || 'other') + '"></span>' +
            '<span class="dpc-name">' + escapeHtml(pname) + '</span>' +
            '<span class="dpc-cat">' + escapeHtml(pcat) + '</span>' +
          '</div>' +
          '<div class="dpc-meta">' +
            '<strong>' + t('pp_operator') + ':</strong> ' + escapeHtml(operator) +
            (loc ? ' · ' + escapeHtml(loc) : '') +
            (status ? ' · ' + escapeHtml(status) : '') +
          '</div>' +
          (p.notes ? '<div class="dpc-notes">' + escapeHtml((CUR_LANG === 'zh' && p.notes_zh) ? p.notes_zh : p.notes) + '</div>' : '') +
        '</div>';
      });
      html += '</div></div>';
    }
  }

  html += '<div class="detail-section">' +
    '<h3>' + t('detail_sources') + '</h3>' +
    '<div class="sources">' +
      (sources || '—') +
      (sourceConf ? '<br><br><span style="font-family:var(--mono); font-size:10px; color:var(--text-muted);">' +
        t('src_confidence') + sourceConf + ' · ' + t('src_language') + ': ' + escapeHtml(d.language_of_primary_source || '—') + '</span>' : '') +
    '</div>' +
  '</div>';

  detailEl.innerHTML = html;
  console.log('[showDetail] rendered, innerHTML length =', html.length, 'detail.active=', detailEl.classList.contains('active'));
  const backBtn = document.getElementById('backBtn');
  if (backBtn) backBtn.onclick = hideDetail;

  if (d.lat && d.lng && map) {
    map.flyTo([d.lat, d.lng], 9, {duration: 0.8});
  }
}

function hideDetail() {
  state.activeIncident = null;
  document.getElementById('detail').classList.remove('active');
  document.getElementById('view-' + state.currentView).classList.add('active');
}

function updateStats() {
  const list = filtered();
  document.getElementById('statTotal').textContent = list.length;
  document.getElementById('statChinese').textContent = list.filter(d => d._chinese).length;
  const fatal = list.reduce((s, d) => s + (parseInt(d.fatalities) || 0), 0);
  document.getElementById('statFatal').textContent = fatal;
  const kidnap = list.reduce((s, d) => {
    const k = parseInt(d.kidnapped);
    return s + (isNaN(k) ? 0 : k);
  }, 0);
  document.getElementById('statKidnap').textContent = kidnap;
}

function updateRingCounts() {
  [1, 3, 4, 5, 6].forEach(r => {
    const n = DATA.filter(d => d.salience_ring === r).length;
    const el = document.getElementById('count-' + r);
    if (el) el.textContent = n;
  });
}

function refresh() {
  renderChoropleth();
  renderMarkers();
  if (!state.activeIncident) {
    if (state.currentView === 'list') renderList();
    else if (state.currentView === 'captivity') renderCaptivityView();
    else if (state.currentView === 'pattern') renderPatternView();
  }
  updateStats();
}

function setCollapse(side, collapsed) {
  const app = document.getElementById('app');
  if (side === 'left') {
    state.leftCollapsed = collapsed;
    app.classList.toggle('left-collapsed', collapsed);
    document.getElementById('leftToggle').textContent = collapsed ? '›' : '‹';
  } else {
    state.rightCollapsed = collapsed;
    app.classList.toggle('right-collapsed', collapsed);
    document.getElementById('rightToggle').textContent = collapsed ? '‹' : '›';
  }
  setTimeout(() => { if (map) map.invalidateSize(); }, 350);
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

document.addEventListener('DOMContentLoaded', () => {
  applyI18n();
  updateRingCounts();

  // Document-level delegated listener for popup "Read full record" links.
  // Using delegation rather than per-popup binding because Leaflet popups
  // re-render their DOM and per-popup onclick handlers can be lost.
  document.addEventListener('click', (ev) => {
    const link = ev.target && ev.target.closest && ev.target.closest('.pop-action');
    if (!link) return;
    const id = link.getAttribute('data-id');
    if (id) {
      ev.preventDefault();
      ev.stopPropagation();
      showDetail(id);
    }
  });

  // Apply initial collapse states
  // Apply initial collapse states with the transition disabled so the layout
  // settles synchronously before the map initialises.
  const _app = document.getElementById('app');
  if (state.rightCollapsed || state.leftCollapsed) {
    const _origTransition = _app.style.transition;
    _app.style.transition = 'none';
    if (state.rightCollapsed) {
      _app.classList.add('right-collapsed');
      document.getElementById('rightToggle').textContent = '‹';
    }
    if (state.leftCollapsed) {
      _app.classList.add('left-collapsed');
      document.getElementById('leftToggle').textContent = '›';
    }
    // Force reflow so the new grid-template-columns is committed
    void _app.offsetWidth;
    // Restore transition for subsequent toggles
    requestAnimationFrame(() => { _app.style.transition = _origTransition; });
  }

  if (typeof L !== 'undefined') {
    if (initMap()) {
      refresh();
      // Belt-and-braces: re-measure after the next frame in case the browser
      // hadn't yet applied the grid layout when Leaflet measured.
      requestAnimationFrame(() => { if (map) map.invalidateSize(); });
      setTimeout(() => { if (map) map.invalidateSize(); }, 100);
    }
  } else {
    window.addEventListener('load', () => {
      if (typeof L !== 'undefined' && initMap()) {
        refresh();
        requestAnimationFrame(() => { if (map) map.invalidateSize(); });
        setTimeout(() => { if (map) map.invalidateSize(); }, 100);
      } else {
        document.getElementById('mapLoading').textContent = 'Map library unavailable. Please check internet connection and refresh.';
      }
    });
  }

  document.querySelectorAll('#ringControl .ring-row').forEach(row => {
    const ring = parseInt(row.dataset.ring);
    const checkbox = row.querySelector('input');
    row.onclick = (e) => {
      if (e.target.tagName !== 'INPUT') checkbox.checked = !checkbox.checked;
      if (checkbox.checked) state.rings.add(ring);
      else state.rings.delete(ring);
      refresh();
    };
  });

  document.querySelectorAll('#sectorRow .filter-chip').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('#sectorRow .filter-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.sector = btn.dataset.sector;
      refresh();
    };
  });

  document.getElementById('catClear').onclick = () => {
    state.categories.clear();
    renderCategoryChips();
    refresh();
  };

  document.getElementById('dateFrom').onchange = (e) => { state.dateFrom = e.target.value; refresh(); };
  document.getElementById('dateTo').onchange = (e) => { state.dateTo = e.target.value; refresh(); };

  document.querySelectorAll('.panel-tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      state.currentView = tab.dataset.view;
      state.activeIncident = null;
      document.getElementById('detail').classList.remove('active');
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + state.currentView).classList.add('active');
      if (state.currentView === 'list') renderList();
      else if (state.currentView === 'captivity') renderCaptivityView();
      else if (state.currentView === 'pattern') renderPatternView();
    };
  });

  document.getElementById('leftToggle').onclick = () => setCollapse('left', !state.leftCollapsed);
  document.getElementById('rightToggle').onclick = () => setCollapse('right', !state.rightCollapsed);

  // Help popover
  const helpBtn = document.getElementById('mapHelpBtn');
  const helpPop = document.getElementById('mapHelpPopover');
  const helpClose = document.getElementById('mapHelpClose');
  if (helpBtn && helpPop) {
    helpBtn.onclick = (e) => {
      e.stopPropagation();
      helpPop.classList.toggle('visible');
    };
    if (helpClose) helpClose.onclick = () => helpPop.classList.remove('visible');
    document.addEventListener('click', (e) => {
      if (!helpPop.contains(e.target) && e.target !== helpBtn) {
        helpPop.classList.remove('visible');
      }
    });
  }

  // Legend toggle — shows/hides both the marker legend and state-risk legend together.
  // Hidden by default per design, revealed on demand via the bottom-left LEGEND pill.
  const legendBtn = document.getElementById('legendToggleBtn');
  if (legendBtn) {
    const updateLegendVisibility = () => {
      const markerLegend = document.getElementById('markerLegend');
      const choroLegend = document.getElementById('choroLegend');
      if (state.legendsVisible) {
        legendBtn.classList.add('active');
        // Hide the floating LEGEND pill while legends are on screen — the
        // panels' own × close buttons are the way to dismiss them. This also
        // resolves the layout collision where the pill sits underneath the
        // marker legend in the bottom-left corner.
        legendBtn.style.display = 'none';
        if (markerLegend && state.showMarkers) markerLegend.classList.remove('hidden');
        if (choroLegend && state.showChoropleth) choroLegend.classList.remove('hidden');
      } else {
        legendBtn.classList.remove('active');
        legendBtn.style.display = '';
        if (markerLegend) markerLegend.classList.add('hidden');
        if (choroLegend) choroLegend.classList.add('hidden');
      }
    };
    legendBtn.onclick = () => {
      state.legendsVisible = !state.legendsVisible;
      updateLegendVisibility();
    };
    // Recompute on layer toggle so legends don't reappear for layers that are off
    window._updateLegendVisibility = updateLegendVisibility;

    // Individual close buttons on each legend panel — hide just that one,
    // and if both are now hidden, flip the global toggle off so the LEGEND
    // pill returns to its inactive state and a future click will re-show all.
    const markerLegendCloseBtn = document.getElementById('markerLegendClose');
    const choroLegendCloseBtn = document.getElementById('choroLegendClose');
    const onIndividualClose = () => {
      const ml = document.getElementById('markerLegend');
      const cl = document.getElementById('choroLegend');
      const mlVisible = ml && !ml.classList.contains('hidden');
      const clVisible = cl && !cl.classList.contains('hidden');
      if (!mlVisible && !clVisible) {
        state.legendsVisible = false;
        legendBtn.classList.remove('active');
        legendBtn.style.display = '';  // restore the LEGEND pill
      }
    };
    if (markerLegendCloseBtn) {
      markerLegendCloseBtn.onclick = (e) => {
        e.stopPropagation();
        const ml = document.getElementById('markerLegend');
        if (ml) ml.classList.add('hidden');
        onIndividualClose();
      };
    }
    if (choroLegendCloseBtn) {
      choroLegendCloseBtn.onclick = (e) => {
        e.stopPropagation();
        const cl = document.getElementById('choroLegend');
        if (cl) cl.classList.add('hidden');
        onIndividualClose();
      };
    }
  }

  // Layer toggles
  const choroToggle = document.getElementById('choroToggle');
  if (choroToggle) {
    choroToggle.onchange = () => {
      state.showChoropleth = choroToggle.checked;
      renderChoropleth();
      if (window._updateLegendVisibility) window._updateLegendVisibility();
    };
  }
  const markerToggle = document.getElementById('markerToggle');
  if (markerToggle) {
    markerToggle.onchange = () => {
      state.showMarkers = markerToggle.checked;
      renderMarkers();
      if (window._updateLegendVisibility) window._updateLegendVisibility();
    };
  }
  const projectsToggle = document.getElementById('projectsToggle');
  if (projectsToggle) {
    projectsToggle.onchange = () => {
      state.showProjects = projectsToggle.checked;
      renderProjectsLayer();
    };
  }

  document.getElementById('langEN').onclick = () => {
    if (CUR_LANG === 'en') return;
    CUR_LANG = 'en';
    document.getElementById('langEN').classList.add('active');
    document.getElementById('langZH').classList.remove('active');
    applyI18n();
    if (map) map.closePopup();
    refresh();
    if (state.activeIncident) showDetail(state.activeIncident);
  };
  document.getElementById('langZH').onclick = () => {
    if (CUR_LANG === 'zh') return;
    CUR_LANG = 'zh';
    document.getElementById('langZH').classList.add('active');
    document.getElementById('langEN').classList.remove('active');
    applyI18n();
    if (map) map.closePopup();
    refresh();
    if (state.activeIncident) showDetail(state.activeIncident);
  };
});
</script>

</body>
</html>
